    <div class="container">

      <div class="main-grid">

            >

免费、快速、安全的在线工具，助力开发者与设计师提升工作效率。</textarea
                >

                class="card-img"
                src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&q=80"
                alt="Preview"
              />
              <div class="card-meta">
                <div class="card-site" id="fbSite">EXAMPLE.COM</div>
                <div class="card-title" id="fbTitle">探索未来的 Web 工具集</div>
                <div class="card-desc" id="fbDesc">
                  免费、快速、安全的在线工具，助力开发者与设计师提升工作效率。

          <div class="platform-preview">

            </div>
            <div class="tw-card">

                id="twImg"
                class="tw-img"
                src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&q=80"
                alt="Preview"
              />
              <div class="tw-content">
                <div class="tw-url" id="twUrl">example.com</div>
                <div class="tw-title" id="twTitle">探索未来的 Web 工具集</div>
                <div class="tw-desc" id="twDesc">
                  免费、快速、安全的在线工具，助力开发者与设计师提升工作效率。
                </div>
              </div>
            </div>
          </div>
        </div>

    </div>

    <script>
      // 主题切换
      const themeToggle = document.getElementById("themeToggle");
      const html = document.documentElement;
      const savedTheme = localStorage.getItem("theme") || "dark";
      html.setAttribute("data-theme", savedTheme);
      themeToggle.textContent = savedTheme === "dark" ? "☀️" : "🌙";

      themeToggle.addEventListener("click", () => {
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        themeToggle.textContent = newTheme === "dark" ? "☀️" : "🌙";
      });

      // 预览逻辑
      function updatePreview() {
        const title = document.getElementById("titleInput").value;
        const desc = document.getElementById("descInput").value;
        const img =
          document.getElementById("imgInput").value ||
          "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&q=80";
        const url = document.getElementById("urlInput").value || "example.com";

        let domain = "EXAMPLE.COM";
        try {
          if (url.startsWith("http")) {
            domain = new URL(url).hostname.toUpperCase();
          } else {
            domain = url.split("/")[0].toUpperCase();
          }
        } catch (e) {}

        // FB
        document.getElementById("fbTitle").textContent = title;
        document.getElementById("fbDesc").textContent = desc;
        document.getElementById("fbImg").src = img;
        document.getElementById("fbSite").textContent = domain;

        // TW
        document.getElementById("twTitle").textContent = title;
        document.getElementById("twDesc").textContent = desc;
        document.getElementById("twImg").src = img;
        document.getElementById("twUrl").textContent = domain.toLowerCase();
      }

      // 初始渲染
      updatePreview();
    </script>
