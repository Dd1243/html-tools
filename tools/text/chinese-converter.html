        酿: "釀",
        鸟: "鳥",
        聂: "聶",
        宁: "寧",
        农: "農",
        诺: "諾",
        欧: "歐",
        苹: "蘋"
      };
      const t2sDict = Object.fromEntries(Object.entries(s2tDict).map(([k, v]) => [v, k]));

      const inputText = document.getElementById("inputText");
      const outputText = document.getElementById("outputText");
      const inputCount = document.getElementById("inputCount");
      const outputCount = document.getElementById("outputCount");

      function updateCount() {
        inputCount.textContent = inputText.value.length;
        outputCount.textContent = outputText.value.length;
      }

      inputText.oninput = () => {
        updateCount();
        saveToLocalStorage();
      };

      document.getElementById("toTraditional").onclick = () => {
        if (!inputText.value) return;
        outputText.value = inputText.value
          .split("")
          .map((c) => s2tDict[c] || c)
          .join("");
        updateCount();
      };

      document.getElementById("toSimplified").onclick = () => {
        if (!inputText.value) return;
        outputText.value = inputText.value
          .split("")
          .map((c) => t2sDict[c] || c)
          .join("");
        updateCount();
      };

      document.getElementById("swapBtn").onclick = () => {
        const temp = inputText.value;
        inputText.value = outputText.value;
        outputText.value = temp;
        updateCount();
        saveToLocalStorage();
      };

      document.getElementById("copyBtn").onclick = () => {
        if (!outputText.value) return;
        navigator.clipboard.writeText(outputText.value).then(() => {
          const originalText = copyBtn.textContent;
          copyBtn.textContent = "已复制结果";
          setTimeout(() => (copyBtn.textContent = originalText), 2000);
        });
      };

      document.getElementById("clearBtn").onclick = () => {
        if (inputText.value && confirm("确定清空内容吗？")) {
          inputText.value = "";
          outputText.value = "";
          updateCount();
          localStorage.removeItem("chinese_converter_content");
        }
      };

      function saveToLocalStorage() {
        localStorage.setItem("chinese_converter_content", inputText.value);
      }

      window.onload = () => {
        const saved = localStorage.getItem("chinese_converter_content");
        if (saved) {
          inputText.value = saved;
          updateCount();
        }
      };
    </script>
