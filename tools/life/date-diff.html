    <div class="container">
      <h1>рҹ“… ж—Ҙжңҹе·®и®Ўз®—еҷЁ</h1>
      <p class="subtitle">и®Ўз®—дёӨдёӘж—Ҙжңҹд№Ӣй—ҙзҡ„ж—¶й—ҙе·®пјҢжҲ–жҺЁз®—ж—Ҙжңҹ</p>

        <div class="panel active" id="diffPanel">

            <div class="form-group">

              <div class="quick-dates">

                <span class="quick-date" onclick="setQuickDate('end', 'year-end')">е№ҙжң«</span>
                <span class="quick-date" onclick="setQuickDate('end', 'month-end')">жңҲжң«</span>
              </div>
            </div>
          </div>
          <button class="btn" onclick="calculateDiff()" aria-label="и®Ўз®—ж—Ҙжңҹе·?>и®Ўз®—ж—Ҙжңҹе·?/button>
        </div>

        <!-- ж—ҘжңҹжҺЁз®— -->
        <div class="panel" id="calcPanel">
          <div class="form-group">
            <label for="input-----">еҹәеҮҶж—Ҙжңҹ</label>
            <input type="date" class="date-input" id="baseDate" aria-label="ж—ҘжңҹйҖүжӢ©еҷ? />
            <div class="quick-dates">
              <span class="quick-date" onclick="setQuickDate('base', 'today')">д»ҠеӨ©</span>
              <span class="quick-date" onclick="setQuickDate('base', 'year-start')">е№ҙеҲқ</span>
              <span class="quick-date" onclick="setQuickDate('base', 'month-start')">жңҲеҲқ</span>
            </div>
          </div>
          <div class="form-group">
            <label>ж—¶й—ҙй—ҙйҡ”</label>
            <div class="number-input">
              <input
                type="number"
                id="intervalValue"
                value="30"
                min="0"
                aria-label="ж•°еӯ—иҫ“е…ҘжЎ?
                placeholder="иҜ·иҫ“е…Ҙж•°еӯ—иҫ“е…ҘжЎҶ"
              />
              <select id="intervalUnit">
                <option value="days">еӨ?/option>
                <option value="weeks">е‘?/option>
                <option value="months">жң?/option>
                <option value="years">е№?/option>
              </select>
            </div>
            <div class="direction-btns">
              <button class="direction-btn active" id="dirAfter" onclick="setDirection('after')">
                д№ӢеҗҺ вҶ?
              </button>
              <button class="direction-btn" id="dirBefore" onclick="setDirection('before')">
                вҶ?д№ӢеүҚ
              </button>
            </div>
          </div>
          <button class="btn" onclick="calculateDate()" aria-label="и®Ўз®—ж—Ҙжңҹ">и®Ўз®—ж—Ҙжңҹ</button>
        </div>
      </div>

      <div id="resultContainer"></div>

    <script>
      let direction = "after";

      // еҲқе§ӢеҢ–ж—Ҙжң?
      function init() {
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("startDate").value = today;
        document.getElementById("endDate").value = today;
        document.getElementById("baseDate").value = today;
      }

      function switchTab(tab) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));

        if (tab === "diff") {
          document.querySelector(".tab:nth-child(1)").classList.add("active");
          document.getElementById("diffPanel").classList.add("active");
        } else {
          document.querySelector(".tab:nth-child(2)").classList.add("active");
          document.getElementById("calcPanel").classList.add("active");
        }

        document.getElementById("resultContainer").innerHTML = "";
      }

      function setQuickDate(field, type) {
        const today = new Date();
        let date;

        switch (type) {
          case "today":
            date = today;
            break;
          case "year-start":
            date = new Date(today.getFullYear(), 0, 1);
            break;
          case "year-end":
            date = new Date(today.getFullYear(), 11, 31);
            break;
          case "month-start":
            date = new Date(today.getFullYear(), today.getMonth(), 1);
            break;
          case "month-end":
            date = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            break;
        }

        const dateStr = date.toISOString().split("T")[0];

        if (field === "start") {
          document.getElementById("startDate").value = dateStr;
        } else if (field === "end") {
          document.getElementById("endDate").value = dateStr;
        } else {
          document.getElementById("baseDate").value = dateStr;
        }
      }

      function swapDates() {
        const start = document.getElementById("startDate").value;
        const end = document.getElementById("endDate").value;
        document.getElementById("startDate").value = end;
        document.getElementById("endDate").value = start;
      }

      function setDirection(dir) {
        direction = dir;
        document.getElementById("dirAfter").classList.toggle("active", dir === "after");
        document.getElementById("dirBefore").classList.toggle("active", dir === "before");
      }

      function calculateDiff() {
        const start = new Date(document.getElementById("startDate").value);
        const end = new Date(document.getElementById("endDate").value);

        if (isNaN(start.getTime()) || isNaN(end.getTime())) {
          alert("иҜ·йҖүжӢ©жңүж•Ҳзҡ„ж—Ҙжң?);
          return;
        }

        const diffTime = Math.abs(end - start);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        const diffWeeks = Math.floor(diffDays / 7);
        const diffMonths = monthDiff(start, end);
        const diffYears = Math.floor(diffMonths / 12);

        const hours = Math.floor(diffTime / (1000 * 60 * 60));
        const minutes = Math.floor(diffTime / (1000 * 60));
        const seconds = Math.floor(diffTime / 1000);

        // и®Ўз®—иҜҰз»Ҷзҡ„е№ҙжңҲж—Ҙ
        const detailed = getDetailedDiff(start, end);

        const weekday = ["ж—?, "дёҖ", "дә?, "дё?, "еӣ?, "дә?, "е…?];

        document.getElementById("resultContainer").innerHTML = `
                <div class="result-card">
                    <div class="result-main">${diffDays}</div>
                    <div class="result-unit">еӨ?/div>
                    <div class="result-details">
                        <div class="detail-item">
                            <div class="detail-value">${diffWeeks}</div>
                            <div class="detail-label">е‘?/div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-value">${diffMonths}</div>
                            <div class="detail-label">жң?/div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-value">${diffYears}</div>
                            <div class="detail-label">е№?/div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">иҜҰз»Ҷж—¶й—ҙе·?/span>
                            <span class="info-value">${detailed}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">жҖ»е°Ҹж—¶ж•°</span>
                            <span class="info-value">${hours.toLocaleString()} е°Ҹж—¶</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">жҖ»еҲҶй’ҹж•°</span>
                            <span class="info-value">${minutes.toLocaleString()} еҲҶй’ҹ</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">жҖ»з§’ж•?/span>
                            <span class="info-value">${seconds.toLocaleString()} з§?/span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">ејҖе§Ӣж—Ҙжң?/span>
                            <span class="info-value">${formatDate(start)} е‘?{weekday[start.getDay()]}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">з»“жқҹж—Ҙжңҹ</span>
                            <span class="info-value">${formatDate(end)} е‘?{weekday[end.getDay()]}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">е·ҘдҪңж—ҘеӨ©ж•?/span>
                            <span class="info-value">${countWorkdays(start, end)} еӨ?/span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">е‘Ёжң«еӨ©ж•°</span>
                            <span class="info-value">${diffDays - countWorkdays(start, end)} еӨ?/span>
                        </div>
                    </div>
                </div>
            `;
      }

      function calculateDate() {
        const base = new Date(document.getElementById("baseDate").value);
        const value = parseInt(document.getElementById("intervalValue").value) || 0;
        const unit = document.getElementById("intervalUnit").value;

        if (isNaN(base.getTime())) {
          alert("иҜ·йҖүжӢ©жңүж•Ҳзҡ„еҹәеҮҶж—Ҙжң?);
          return;
        }

        let result = new Date(base);
        const multiplier = direction === "after" ? 1 : -1;

        switch (unit) {
          case "days":
            result.setDate(result.getDate() + value * multiplier);
            break;
          case "weeks":
            result.setDate(result.getDate() + value * 7 * multiplier);
            break;
          case "months":
            result.setMonth(result.getMonth() + value * multiplier);
            break;
          case "years":
            result.setFullYear(result.getFullYear() + value * multiplier);
            break;
        }

        const weekday = ["ж—?, "дёҖ", "дә?, "дё?, "еӣ?, "дә?, "е…?];
        const dirText = direction === "after" ? "д№ӢеҗҺ" : "д№ӢеүҚ";
        const unitText = { days: "еӨ?, weeks: "е‘?, months: "жң?, years: "е№? };

        document.getElementById("resultContainer").innerHTML = `
                <div class="result-card">
                    <div class="result-date">
                        <div class="result-date-label">${formatDate(base)} ${dirText} ${value} ${unitText[unit]}</div>
                        <div class="result-date-value">${formatDate(result)} е‘?{weekday[result.getDay()]}</div>
                    </div>
                </div>
                <div class="card">
                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">еҹәеҮҶж—Ҙжңҹ</span>
                            <span class="info-value">${formatDate(base)} е‘?{weekday[base.getDay()]}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">и®Ўз®—з»“жһң</span>
                            <span class="info-value">${formatDate(result)} е‘?{weekday[result.getDay()]}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">и·қд»ҠеӨ?/span>
                            <span class="info-value">${getDaysFromToday(result)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">жҳҜеҗҰе‘Ёжң«</span>
                            <span class="info-value">${result.getDay() === 0 || result.getDay() === 6 ? "жҳ? : "еҗ?}</span>
                        </div>
                    </div>
                </div>
            `;
      }

      function monthDiff(start, end) {
        const d1 = start < end ? start : end;
        const d2 = start < end ? end : start;
        return (d2.getFullYear() - d1.getFullYear()) * 12 + d2.getMonth() - d1.getMonth();
      }

      function getDetailedDiff(start, end) {
        const d1 = start < end ? new Date(start) : new Date(end);
        const d2 = start < end ? new Date(end) : new Date(start);

        let years = d2.getFullYear() - d1.getFullYear();
        let months = d2.getMonth() - d1.getMonth();
        let days = d2.getDate() - d1.getDate();

        if (days < 0) {
          months--;
          const prevMonth = new Date(d2.getFullYear(), d2.getMonth(), 0);
          days += prevMonth.getDate();
        }

        if (months < 0) {
          years--;
          months += 12;
        }

        const parts = [];
        if (years > 0) parts.push(`${years}е№ҙ`);
        if (months > 0) parts.push(`${months}жңҲ`);
        if (days > 0) parts.push(`${days}еӨ©`);

        return parts.length > 0 ? parts.join(" ") : "0еӨ?;
      }

      function countWorkdays(start, end) {
        const d1 = start < end ? start : end;
        const d2 = start < end ? end : start;

        let count = 0;
        const current = new Date(d1);

        while (current <= d2) {
          const day = current.getDay();
          if (day !== 0 && day !== 6) {
            count++;
          }
          current.setDate(current.getDate() + 1);
        }

        return count;
      }

      function formatDate(date) {
        return `${date.getFullYear()}е№?{date.getMonth() + 1}жң?{date.getDate()}ж—Ҙ`;
      }

      function getDaysFromToday(date) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        date.setHours(0, 0, 0, 0);

        const diff = Math.floor((date - today) / (1000 * 60 * 60 * 24));

        if (diff === 0) return "д»ҠеӨ©";
        if (diff === 1) return "жҳҺеӨ©";
        if (diff === -1) return "жҳЁеӨ©";
        if (diff > 0) return `${diff}еӨ©еҗҺ`;
        return `${Math.abs(diff)}еӨ©еүҚ`;
      }

      init();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
  </body>
