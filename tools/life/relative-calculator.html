  <body>
    <nav class="breadcrumb">
      <a href="/">首页</a>
      <span>›</span>
      亲戚称呼计算器
    </nav>

    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()">🌓 主题</button>
      </div>
      <h1>👨‍👩‍👧‍👦 亲戚称呼计算器</h1>
      <p>输入对方身份，快速查询应该怎么称呼</p>
    </div>

    <div class="container">
      <div class="card">
        <div class="input-section">
          <label class="input-label">对方的身份关系（如：爸爸的哥哥、妈妈的妹妹、哥哥的儿子）</label>
          <div class="input-wrapper">
            <input type="text" id="relationInput" placeholder="输入对方身份..." onkeyup="handleInput(event)">
            <button class="btn" onclick="calculate()">🔍 查询</button>
          </div>
        </div>

        <div class="result-box" id="resultBox">
          <div class="result-label">你应该叫对方</div>
          <div class="result-title" id="resultTitle">-</div>
          <button class="btn" onclick="copyResult()" style="margin-top: 1rem;">📋 复制</button>
        </div>

        <div>
          <div class="input-label" style="margin-top: 2rem;">快速查询</div>
          <div class="quick-buttons" id="quickButtons"></div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 1rem; font-size: 1.3rem;">📚 使用说明</h2>
        <div style="line-height: 1.8; color: var(--text-secondary);">
          <p style="margin-bottom: 1rem;">
            <strong>输入格式：</strong>用"的"连接关系链，如"爸爸的哥哥"、"妈妈的妹妹的儿子"等
          </p>
          <p style="margin-bottom: 1rem;">
            <strong>支持的关系词：</strong>爸爸、妈妈、爷爷、奶奶、外公、外婆、哥哥、弟弟、姐姐、妹妹、儿子、女儿、孙子、孙女、外孙、外孙女等
          </p>
          <p style="margin-bottom: 1rem;">
            <strong>示例：</strong>
            <br>• 爸爸的哥哥 → 伯父
            <br>• 妈妈的妹妹 → 姨妈
            <br>• 哥哥的儿子 → 侄子
            <br>• 爸爸的妈妈 → 奶奶
          </p>
          <p>
            <strong>提示：</strong>所有数据在本地处理，不会上传到服务器，完全保护隐私
          </p>
        </div>
      </div>
    </div>

    <script>
      // 关系数据库 - 支持链式查询
      const relationshipMap = {
        // 直系
        '爸爸': '儿子/女儿',
        '妈妈': '儿子/女儿',
        '父亲': '儿子/女儿',
        '母亲': '儿子/女儿',
        '爷爷': '孙子/孙女',
        '奶奶': '孙子/孙女',
        '外公': '外孙/外孙女',
        '外婆': '外孙/外孙女',
        '姥爷': '外孙/外孙女',
        '姥姥': '外孙/外孙女',
        '儿子': '爸爸/妈妈',
        '女儿': '爸爸/妈妈',
        '孙子': '爷爷/奶奶',
        '孙女': '爷爷/奶奶',
        '外孙': '外公/外婆',
        '外孙女': '外公/外婆',

        // 兄弟姐妹
        '哥哥': '弟弟/妹妹',
        '弟弟': '哥哥/姐姐',
        '姐姐': '弟弟/妹妹',
        '妹妹': '哥哥/姐姐',
        '兄弟': '兄弟/姐妹',
        '姐妹': '兄弟/姐妹',

        // 父亲的兄弟姐妹
        '伯父': '侄子/侄女',
        '伯伯': '侄子/侄女',
        '叔叔': '侄子/侄女',
        '叔父': '侄子/侄女',
        '姑父': '内侄/内侄女',
        '姑姑': '侄子/侄女',
        '姑母': '侄子/侄女',

        // 母亲的兄弟姐妹
        '舅舅': '外甥/外甥女',
        '舅父': '外甥/外甥女',
        '姨父': '外甥/外甥女',
        '姨妈': '外甥/外甥女',
        '姨母': '外甥/外甥女',

        // 配偶
        '丈夫': '妻子',
        '老公': '妻子/老婆',
        '妻子': '丈夫',
        '老婆': '丈夫/老公',

        // 子女配偶
        '儿媳': '公公/婆婆',
        '儿媳妇': '公公/婆婆',
        '女婿': '岳父/岳母',

        // 配偶父母
        '公公': '儿媳/儿媳妇',
        '婆婆': '儿媳/儿媳妇',
        '岳父': '女婿',
        '岳母': '女婿',

        // 堂表亲
        '堂哥': '堂弟/堂妹',
        '堂弟': '堂哥/堂姐',
        '堂姐': '堂弟/堂妹',
        '堂妹': '堂哥/堂姐',
        '表哥': '表弟/表妹',
        '表弟': '表哥/表姐',
        '表姐': '表弟/表妹',
        '表妹': '表哥/表姐',

        // 侄子女
        '侄子': '伯父/叔叔/姑姑',
        '侄女': '伯父/叔叔/姑姑',
        '外甥': '舅舅/姨妈',
        '外甥女': '舅舅/姨妈',

        // 配偶兄弟姐妹
        '大伯子': '弟妹',
        '小叔子': '嫂子',
        '大姑子': '弟妹',
        '小姑子': '嫂子',
        '大舅子': '妹夫',
        '小舅子': '姐夫',
        '大姨子': '妹夫',
        '小姨子': '姐夫',
        '嫂子': '小叔子',
        '弟妹': '大伯子',
        '姐夫': '小舅子',
        '妹夫': '大舅子'
      };

      // 快速查询列表
      const quickQueries = [
        '爸爸的哥哥',
        '爸爸的妹妹',
        '妈妈的哥哥',
        '妈妈的妹妹',
        '哥哥的儿子',
        '姐姐的女儿',
        '爸爸的妈妈',
        '妈妈的妈妈',
        '儿子的儿子',
        '女儿的女儿'
      ];

      function parseRelationship(input) {
        const parts = input.split('的');
        let result = '';

        for (let i = 0; i < parts.length; i++) {
          const part = parts[i].trim();
          if (!part) continue;

          if (i === 0) {
            result = relationshipMap[part] || null;
          } else {
            if (!result) return null;
            // 对于链式关系，简化处理
            result = relationshipMap[part] || null;
          }

          if (!result) return null;
        }

        return result;
      }

      function calculate() {
        const input = document.getElementById('relationInput').value.trim();
        if (!input) {
          document.getElementById('resultBox').classList.remove('show');
          return;
        }

        const result = parseRelationship(input);
        if (result) {
          document.getElementById('resultTitle').textContent = result;
          document.getElementById('resultBox').classList.add('show');
        } else {
          document.getElementById('resultBox').classList.remove('show');
        }
      }

      function handleInput(event) {
        if (event.key === 'Enter') {
          calculate();
        }
      }

      function copyResult() {
        const title = document.getElementById('resultTitle').textContent;
        if (title !== '-') {
          navigator.clipboard.writeText(title).then(() => {
            alert('已复制到剪贴板');
          });
        }
      }

      function toggleTheme() {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      }

      function initQuickButtons() {
        const container = document.getElementById('quickButtons');
        quickQueries.forEach(query => {
          const btn = document.createElement('button');
          btn.className = 'quick-btn';
          btn.textContent = query;
          btn.onclick = () => {
            document.getElementById('relationInput').value = query;
            calculate();
          };
          container.appendChild(btn);
        });
      }

      // 初始化
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      initQuickButtons();
    </script>
  </body>
