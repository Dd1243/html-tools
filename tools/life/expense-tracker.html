  <body>
    <div class="container">
      <nav class="breadcrumb">
        <a href="/">首页</a>
        <span>/</span>
        <a href="/#life">生活工具</a>
        <span>/</span>
        <span>记账本</span>
      </nav>

      <div class="header">
        <h1>💰 记账本</h1>
        <p>免费在线记账工具，轻松管理你的收支，掌握财务状况</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">总收入</div>
          <div class="stat-value income" id="totalIncome">¥0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总支出</div>
          <div class="stat-value expense" id="totalExpense">¥0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">余额</div>
          <div class="stat-value balance" id="balance">¥0.00</div>
        </div>
      </div>

      <div class="main">
        <div class="card">
          <h2>添加交易</h2>
          <form id="transactionForm" onsubmit="addTransaction(event)">
            <div class="form-group">
              <label for="desc">描述</label>
              <input type="text" id="desc" placeholder="例如：午餐、工资、房租" required />
            </div>
            <div class="form-group">
              <label for="amount">金额</label>
              <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required />
            </div>
            <div class="form-group">
              <label for="type">类型</label>
              <select id="type" required>
                <option value="expense">支出</option>
                <option value="income">收入</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">添加交易</button>
          </form>
        </div>

        <div class="card">
          <h2>最近交易</h2>
          <div class="transactions" id="transactionsList">
            <div class="empty-state">
              <div class="empty-state-icon">📝</div>
              <p>暂无交易记录</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>所有交易</h2>
        <div style="margin-bottom: 1rem;">
          <button class="btn btn-secondary btn-sm" onclick="exportData()">导出为 CSV</button>
          <button class="btn btn-secondary btn-sm" onclick="clearAllData()" style="margin-left: 0.5rem;">清空所有数据</button>
        </div>
        <div class="transactions" id="allTransactionsList">
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <p>暂无交易记录</p>
          </div>
        </div>
      </div>

      <div class="footer">
        <p>本工具由 <a href="/">WebUtils</a> 提供 · 所有数据保存在浏览器本地，不上传服务器 · <a href="/">隐私政策</a></p>
      </div>
    </div>

    <script>
      let transactions = JSON.parse(localStorage.getItem("expense_tracker_v1") || "[]");

      function save() {
        localStorage.setItem("expense_tracker_v1", JSON.stringify(transactions));
        render();
      }

      function render() {
        const income = transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
        const expense = transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
        const balance = income - expense;

        document.getElementById("totalIncome").textContent = "¥" + income.toFixed(2);
        document.getElementById("totalExpense").textContent = "¥" + expense.toFixed(2);
        document.getElementById("balance").textContent = "¥" + balance.toFixed(2);

        const recent = transactions.slice().reverse().slice(0, 5);
        const recentHtml = recent.length ? recent.map((t, i) => `
          <div class="transaction-item">
            <div class="transaction-info">
              <div class="transaction-desc">${escapeHtml(t.desc)}</div>
              <div class="transaction-date">${new Date(t.date).toLocaleDateString("zh-CN")}</div>
            </div>
            <div class="transaction-amount ${t.type}">${t.type === "income" ? "+" : "-"}¥${t.amount.toFixed(2)}</div>
            <div class="transaction-actions">
              <button class="btn btn-danger btn-sm" onclick="deleteTransaction(${transactions.length - 1 - recent.indexOf(t)})">删除</button>
            </div>
          </div>
        `).join("") : '<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无交易记录</p></div>';

        document.getElementById("transactionsList").innerHTML = recentHtml;

        const allHtml = transactions.length ? transactions.slice().reverse().map((t, i) => `
          <div class="transaction-item">
            <div class="transaction-info">
              <div class="transaction-desc">${escapeHtml(t.desc)}</div>
              <div class="transaction-date">${new Date(t.date).toLocaleDateString("zh-CN")}</div>
            </div>
            <div class="transaction-amount ${t.type}">${t.type === "income" ? "+" : "-"}¥${t.amount.toFixed(2)}</div>
            <div class="transaction-actions">
              <button class="btn btn-danger btn-sm" onclick="deleteTransaction(${transactions.length - 1 - i})">删除</button>
            </div>
          </div>
        `).join("") : '<div class="empty-state"><div class="empty-state-icon">📊</div><p>暂无交易记录</p></div>';

        document.getElementById("allTransactionsList").innerHTML = allHtml;
      }

      function addTransaction(e) {
        e.preventDefault();
        const desc = document.getElementById("desc").value.trim();
        const amount = parseFloat(document.getElementById("amount").value);
        const type = document.getElementById("type").value;

        if (desc && amount > 0) {
          transactions.push({
            desc,
            amount,
            type,
            date: new Date().toISOString()
          });
          save();
          document.getElementById("transactionForm").reset();
        }
      }

      function deleteTransaction(index) {
        if (confirm("确定要删除这条记录吗？")) {
          transactions.splice(index, 1);
          save();
        }
      }

      function exportData() {
        if (transactions.length === 0) {
          alert("没有数据可导出");
          return;
        }

        let csv = "日期,描述,金额,类型\n";
        transactions.forEach(t => {
          const date = new Date(t.date).toLocaleDateString("zh-CN");
          csv += `${date},"${t.desc}",${t.amount},${t.type === "income" ? "收入" : "支出"}\n`;
        });

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `记账本_${new Date().toLocaleDateString("zh-CN")}.csv`;
        link.click();
      }

      function clearAllData() {
        if (confirm("确定要清空所有数据吗？此操作不可撤销！")) {
          transactions = [];
          save();
        }
      }

      function escapeHtml(text) {
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        };
        return text.replace(/[&<>"']/g, m => map[m]);
      }

      render();
    </script>
  </body>
