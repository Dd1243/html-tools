<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书签管理器 - 在线网址收藏整理工具 - WebUtils</title>
    <meta name="description" content="在线书签管理器，轻松整理和管理你的网址收藏。支持分类管理、快速搜索、本地存储、一键访问，让你的常用网站井井有条，随时随地快速访问。" />
    <meta name="keywords" content="书签管理器,网址收藏,书签整理,网址管理,收藏夹,浏览器书签" />
    <link rel="canonical" href="https://essays4u.net/tools/life/bookmark-manager" />

    <!-- Open Graph -->
    <meta property="og:title" content="书签管理器 - 在线网址收藏整理工具 - WebUtils" />
    <meta property="og:description" content="在线书签管理器，轻松整理和管理你的网址收藏。支持分类管理、快速搜索、本地存储，让你的常用网站井井有条。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://essays4u.net/tools/life/bookmark-manager" />
    <meta property="og:image" content="https://essays4u.net/social-preview.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #0ea5e9;
        --primary-dark: #0284c7;
        --primary-light: #e0f2fe;
        --secondary: #8b5cf6;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        --radius: 0.75rem;
        --radius-sm: 0.5rem;
        --radius-lg: 1rem;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 2rem 1rem;
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 3rem;
        animation: fadeInDown 0.6s ease-out;
      }

      .header h1 {
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        margin-bottom: 0.5rem;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
      }

      .header p {
        font-size: 1.125rem;
        color: rgba(255, 255, 255, 0.9);
      }

      /* Stats Bar */
      .stats-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
        animation: fadeIn 0.6s ease-out 0.2s both;
      }

      .stat-card {
        background: white;
        padding: 1.5rem;
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        gap: 1rem;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-xl);
      }

      .stat-icon {
        width: 3rem;
        height: 3rem;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
      }

      .stat-icon.primary { background: var(--primary-light); }
      .stat-icon.secondary { background: #ede9fe; }
      .stat-icon.success { background: #d1fae5; }

      .stat-content h3 {
        font-size: 1.875rem;
        font-weight: 700;
        color: var(--gray-900);
      }

      .stat-content p {
        font-size: 0.875rem;
        color: var(--gray-500);
      }

      /* Main Card */
      .main-card {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        overflow: hidden;
        animation: fadeInUp 0.6s ease-out 0.3s both;
      }

      /* Toolbar */
      .toolbar {
        padding: 1.5rem;
        background: var(--gray-50);
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .search-box {
        flex: 1;
        min-width: 250px;
        position: relative;
      }

      .search-box input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 0.9375rem;
        transition: all 0.2s;
      }

      .search-box input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }

      .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        font-size: 1.125rem;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: var(--radius);
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      /* Categories */
      .categories {
        padding: 1.5rem;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .categories-label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--gray-600);
      }

      .category-tag {
        padding: 0.5rem 1rem;
        border: 2px solid var(--gray-200);
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--gray-700);
        background: white;
        cursor: pointer;
        transition: all 0.2s;
      }

      .category-tag:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      .category-tag.active {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
      }

      /* Bookmarks List */
      .bookmarks-container {
        padding: 1.5rem;
        min-height: 400px;
      }

      .bookmarks-grid {
        display: grid;
        gap: 1rem;
      }

      .bookmark-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        border: 2px solid var(--gray-100);
        border-radius: var(--radius);
        background: white;
        transition: all 0.2s;
        animation: fadeIn 0.3s ease-out;
      }

      .bookmark-item:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow-md);
        transform: translateX(4px);
      }

      .bookmark-favicon {
        width: 3rem;
        height: 3rem;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.25rem;
        font-weight: 700;
        flex-shrink: 0;
        box-shadow: var(--shadow);
      }

      .bookmark-info {
        flex: 1;
        min-width: 0;
      }

      .bookmark-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--gray-900);
        margin-bottom: 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bookmark-url {
        font-size: 0.875rem;
        color: var(--gray-500);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bookmark-category {
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
        background: var(--gray-100);
        color: var(--gray-600);
      }

      .bookmark-actions {
        display: flex;
        gap: 0.5rem;
      }

      .icon-btn {
        width: 2.25rem;
        height: 2.25rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--gray-100);
        color: var(--gray-600);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 1rem;
      }

      .icon-btn:hover {
        background: var(--primary-light);
        color: var(--primary);
      }

      .icon-btn.danger:hover {
        background: #fee2e2;
        color: var(--danger);
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
      }

      .empty-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      .empty-state h3 {
        font-size: 1.25rem;
        color: var(--gray-900);
        margin-bottom: 0.5rem;
      }

      .empty-state p {
        color: var(--gray-500);
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        animation: fadeIn 0.2s ease-out;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        animation: slideUp 0.3s ease-out;
      }

      .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--gray-200);
      }

      .modal-header h2 {
        font-size: 1.5rem;
        color: var(--gray-900);
      }

      .modal-body {
        padding: 1.5rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
      }

      .form-input,
      .form-select {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 0.9375rem;
        transition: all 0.2s;
      }

      .form-input:focus,
      .form-select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }

      .modal-footer {
        padding: 1.5rem;
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
      }

      .btn-secondary {
        background: var(--gray-100);
        color: var(--gray-700);
      }

      .btn-secondary:hover {
        background: var(--gray-200);
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        body {
          padding: 1rem 0.5rem;
        }

        .header h1 {
          font-size: 2rem;
        }

        .toolbar {
          flex-direction: column;
        }

        .search-box {
          min-width: 100%;
        }

        .bookmark-item {
          flex-wrap: wrap;
        }

        .bookmark-actions {
          width: 100%;
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔖 书签管理器</h1>
        <p>轻松整理和管理你的网址收藏</p>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-icon primary">📚</div>
          <div class="stat-content">
            <h3 id="totalCount">0</h3>
            <p>总书签数</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon secondary">📁</div>
          <div class="stat-content">
            <h3 id="categoryCount">0</h3>
            <p>分类数</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon success">⭐</div>
          <div class="stat-content">
            <h3 id="recentCount">0</h3>
            <p>最近添加</p>
          </div>
        </div>
      </div>

      <!-- Main Card -->
      <div class="main-card">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索书签..." />
          </div>
          <button class="btn btn-primary" onclick="openModal()">
            ➕ 添加书签
          </button>
        </div>

        <!-- Categories -->
        <div class="categories">
          <span class="categories-label">分类：</span>
          <div id="categoriesContainer"></div>
        </div>

        <!-- Bookmarks List -->
        <div class="bookmarks-container">
          <div class="bookmarks-grid" id="bookmarksList"></div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">添加书签</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" id="titleInput" placeholder="输入书签标题" />
          </div>
          <div class="form-group">
            <label class="form-label">网址</label>
            <input type="url" class="form-input" id="urlInput" placeholder="https://example.com" />
          </div>
          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-select" id="categoryInput">
              <option value="常用">常用</option>
              <option value="工作">工作</option>
              <option value="学习">学习</option>
              <option value="娱乐">娱乐</option>
              <option value="购物">购物</option>
              <option value="其他">其他</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
        </div>
      </div>
    </div>

    <script>
      let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
      let editingId = null;
      let activeCategory = '全部';

      function init() {
        render();
        document.getElementById('searchInput').addEventListener('input', render);
      }

      function updateStats() {
        const total = bookmarks.length;
        const categories = new Set(bookmarks.map(b => b.category)).size;
        const recent = bookmarks.filter(b => {
          const dayAgo = Date.now() - 24 * 60 * 60 * 1000;
          return b.createdAt > dayAgo;
        }).length;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('categoryCount').textContent = categories;
        document.getElementById('recentCount').textContent = recent;
      }

      function renderCategories() {
        const categories = ['全部', ...new Set(bookmarks.map(b => b.category))];
        const container = document.getElementById('categoriesContainer');

        container.innerHTML = categories.map(cat =>
          `<button class="category-tag ${cat === activeCategory ? 'active' : ''}"
                   onclick="setCategory('${cat}')">${cat}</button>`
        ).join('');
      }

      function setCategory(category) {
        activeCategory = category;
        render();
      }

      function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filtered = bookmarks.filter(b => {
          const matchCategory = activeCategory === '全部' || b.category === activeCategory;
          const matchSearch = !search ||
            b.title.toLowerCase().includes(search) ||
            b.url.toLowerCase().includes(search);
          return matchCategory && matchSearch;
        });

        const container = document.getElementById('bookmarksList');

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <h3>暂无书签</h3>
              <p>点击"添加书签"按钮开始收藏你喜欢的网站</p>
            </div>
          `;
        } else {
          container.innerHTML = filtered.map(b => `
            <div class="bookmark-item">
              <div class="bookmark-favicon">${getFavicon(b.url)}</div>
              <div class="bookmark-info">
                <div class="bookmark-title">${escapeHtml(b.title)}</div>
                <div class="bookmark-url">${escapeHtml(b.url)}</div>
              </div>
              <span class="bookmark-category">${b.category}</span>
              <div class="bookmark-actions">
                <button class="icon-btn" onclick="window.open('${b.url}', '_blank')" title="访问">🔗</button>
                <button class="icon-btn" onclick="editBookmark(${b.id})" title="编辑">✏️</button>
                <button class="icon-btn danger" onclick="deleteBookmark(${b.id})" title="删除">🗑️</button>
              </div>
            </div>
          `).join('');
        }

        updateStats();
        renderCategories();
      }

      function getFavicon(url) {
        try {
          const domain = new URL(url).hostname;
          return domain.charAt(0).toUpperCase();
        } catch {
          return '🔗';
        }
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function openModal(id = null) {
        editingId = id;
        const bookmark = id ? bookmarks.find(b => b.id === id) : null;

        document.getElementById('modalTitle').textContent = id ? '编辑书签' : '添加书签';
        document.getElementById('titleInput').value = bookmark ? bookmark.title : '';
        document.getElementById('urlInput').value = bookmark ? bookmark.url : '';
        document.getElementById('categoryInput').value = bookmark ? bookmark.category : '常用';

        document.getElementById('modal').classList.add('show');
      }

      function closeModal() {
        document.getElementById('modal').classList.remove('show');
        editingId = null;
      }

      function saveBookmark() {
        const title = document.getElementById('titleInput').value.trim();
        const url = document.getElementById('urlInput').value.trim();
        const category = document.getElementById('categoryInput').value;

        if (!title || !url) {
          alert('请填写标题和网址');
          return;
        }

        if (editingId) {
          const bookmark = bookmarks.find(b => b.id === editingId);
          if (bookmark) {
            bookmark.title = title;
            bookmark.url = url;
            bookmark.category = category;
          }
        } else {
          bookmarks.unshift({
            id: Date.now(),
            title,
            url,
            category,
            createdAt: Date.now()
          });
        }

        localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        render();
        closeModal();
      }

      function editBookmark(id) {
        openModal(id);
      }

      function deleteBookmark(id) {
        if (confirm('确定要删除这个书签吗？')) {
          bookmarks = bookmarks.filter(b => b.id !== id);
          localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
          render();
        }
      }

      // Close modal on outside click
      document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') {
          closeModal();
        }
      });

      // Initialize
      init();
    </script>
  </body>
</html>
