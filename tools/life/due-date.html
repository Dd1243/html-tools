    <script>

        10: { icon: "рҹҘң", size: "3cm", weight: "4g", desc: "жүӢжҢҮи„ҡи¶ҫе®Ңе…ЁеҲҶејҖпјҢжҢҮз”ІејҖе§Ӣз”ҹй•? },
        11: { icon: "рҹҚҮ", size: "4cm", weight: "7g", desc: "еӨ–з”ҹж®–еҷЁејҖе§ӢеҸ‘иӮ? },

        13: { icon: "рҹҚӢ", size: "7cm", weight: "25g", desc: "еЈ°еёҰеҪўжҲҗпјҢеҸҜд»Ҙжү“е—? },
        14: { icon: "рҹҚӢ", size: "8.7cm", weight: "43g", desc: "ејҖе§Ӣй•ҝеҮәиғҺжҜ? },

        16: { icon: "рҹҚҺ", size: "11.6cm", weight: "100g", desc: "еҸҜиғҪејҖе§Ӣж„ҹеҸ—еҲ°иғҺеҠЁ" },
        17: { icon: "рҹҘ‘", size: "13cm", weight: "140g", desc: "и„ӮиӮӘејҖе§Ӣз§Ҝзҙ? },
        18: { icon: "рҹҘ‘", size: "14cm", weight: "190g", desc: "еҸҜд»Ҙеҗ¬еҲ°еЈ°йҹі" },
        19: { icon: "рҹҘӯ", size: "15cm", weight: "240g", desc: "ж„ҹи§үеҷЁе®ҳеҝ«йҖҹеҸ‘иӮ? },
        20: { icon: "рҹҘӯ", size: "16cm", weight: "300g", desc: "еҸҜйҖҡиҝҮBи¶…зЎ®е®ҡжҖ§еҲ«пјҢеӯ•жңҹиҝҮеҚ? },
        21: { icon: "рҹҚҢ", size: "27cm", weight: "360g", desc: "зңүжҜӣе’Ңзңјзқ‘еҸ‘иӮІе®Ңе–? },
        22: { icon: "рҹҚҢ", size: "28cm", weight: "430g", desc: "еҳҙе”Үе’ҢзңүжҜӣжӣҙеҠ жё…жҷ? },
        23: { icon: "рҹҘ’", size: "29cm", weight: "500g", desc: "зҡ®иӮӨејҖе§ӢеҸҳеҫ—дёҚйҖҸжҳҺ" },
        24: { icon: "рҹҘ’", size: "30cm", weight: "600g", desc: "иӮәйғЁејҖе§Ӣдә§з”ҹиЎЁйқўжҙ»жҖ§зү©иҙ? },
        25: { icon: "рҹҢҪ", size: "35cm", weight: "660g", desc: "ејҖе§Ӣжңүи§„еҫӢзҡ„зқЎзң е‘Ёжң? },
        26: { icon: "рҹҢҪ", size: "36cm", weight: "760g", desc: "зңјзқӣеҸҜд»ҘзқҒејҖ" },
        27: { icon: "рҹҘ¬", size: "37cm", weight: "875g", desc: "еӨ§и„‘еҝ«йҖҹеҸ‘иӮ? },
        28: { icon: "рҹҘ¬", size: "38cm", weight: "1kg", desc: "еҸҜд»ҘеҒҡжўҰдә? },
        29: { icon: "рҹҚҶ", size: "39cm", weight: "1.2kg", desc: "йӘЁйӘјеҸҳеҫ—жӣҙеқҡзЎ? },
        30: { icon: "рҹҚҶ", size: "40cm", weight: "1.3kg", desc: "ејҖе§ӢеӮЁеӯҳй“ҒгҖҒй’ҷзӯүзҹҝзү©иҙЁ" },
        31: { icon: "рҹҘҘ", size: "41cm", weight: "1.5kg", desc: "и„‘йғЁеҸ‘иӮІиҝӣе…Ҙй«ҳеі°жң? },
        32: { icon: "рҹҘҘ", size: "42cm", weight: "1.7kg", desc: "жҢҮз”Ій•ҝеҲ°жҢҮе°–" },
        33: { icon: "рҹҚҚ", size: "43cm", weight: "1.9kg", desc: "е…Қз–«зі»з»ҹеҸ‘иӮІ" },
        34: { icon: "рҹҚҚ", size: "45cm", weight: "2.1kg", desc: "иӮәйғЁжҺҘиҝ‘жҲҗзҶҹ" },
        35: { icon: "рҹҚҲ", size: "46cm", weight: "2.4kg", desc: "еӨ§йғЁеҲҶеҷЁе®ҳе·Із»ҸжҲҗзҶ? },
        36: { icon: "рҹҚҲ", size: "47cm", weight: "2.6kg", desc: "иғҺдҪҚеӨ§еӨҡе·Іеӣәе®? },
        37: { icon: "рҹҺғ", size: "48cm", weight: "2.9kg", desc: "и¶іжңҲпјҒйҡҸж—¶еҸҜиғҪеҮәз”? },
        38: { icon: "рҹҺғ", size: "49cm", weight: "3.1kg", desc: "еҗ„еҷЁе®ҳе·Іе®Ңе…ЁжҲҗзҶҹ" },
        39: { icon: "рҹҚү", size: "50cm", weight: "3.3kg", desc: "зӯүеҫ…еҲҶеЁ©дҝЎеҸ·" },
        40: { icon: "рҹҚү", size: "51cm", weight: "3.5kg", desc: "йў„дә§жңҹеҲ°жқҘпјҢеҮҶеӨҮиҝҺжҺҘе®қе®қпј? }
      };

      // дә§жЈҖж—¶й—ҙиЎ?
      const checkupSchedule = [
        { week: 6, title: "йҰ–ж¬Ўдә§жЈҖ", desc: "зЎ®и®ӨеҰҠеЁ пјҢBи¶…жЈҖжҹҘиғҺеҝ? },
        { week: 12, title: "NTжЈҖжҹ?, desc: "жөӢйҮҸиғҺе„ҝйўҲйғЁйҖҸжҳҺеұӮеҺҡеә? },
        { week: 16, title: "е”җж°ҸзӯӣжҹҘ", desc: "жҠҪиЎҖжЈҖжҹҘжҹ“иүІдҪ“ејӮеёёйЈҺйҷ©" },
        { week: 20, title: "еӨ§жҺ’з•ёBи¶?, desc: "е…ЁйқўжЈҖжҹҘиғҺе„ҝз»“жһ„еҸ‘иӮ? },
        { week: 24, title: "зі–иҖҗйҮҸжөӢиҜ•", desc: "зӯӣжҹҘеҰҠеЁ жңҹзі–е°ҝз—…" },
        { week: 28, title: "еёёи§„дә§жЈҖ", desc: "ејҖе§ӢжҜҸдёӨе‘Ёдә§жЈҖдёҖж¬? },
        { week: 32, title: "Bи¶…жЈҖжҹ?, desc: "иҜ„дј°иғҺе„ҝеӨ§е°Ҹе’ҢзҫҠж°ҙйҮҸ" },
        { week: 36, title: "и¶іжңҲжЈҖжҹ?, desc: "ејҖе§ӢжҜҸе‘Ёдә§жЈҖпјҢиҜ„дј°еҲҶеЁ©жқЎд»? },
        { week: 37, title: "е…ҘйҷўеҮҶеӨҮ", desc: "еҮҶеӨҮеҫ…дә§еҢ…пјҢдәҶи§ЈеҲҶеЁ©еҫҒе…Ҷ" },
        { week: 40, title: "йў„дә§жң?, desc: "зӯүеҫ…еҲҶеЁ©пјҢи¶…иҝ?1е‘ЁйңҖиҜ„дј°" }
      ];

      document.addEventListener("DOMContentLoaded", () => {
        // и®ҫзҪ®й»ҳи®Өж—Ҙжңҹ
        const today = new Date();
        document.getElementById("lmpDate").value = getDateWeeksAgo(today, 8);
        document.getElementById("ultrasoundDate").value = today.toISOString().split("T")[0];
        document.getElementById("ivfDate").value = getDateWeeksAgo(today, 6);
      });

      function getDateWeeksAgo(date, weeks) {
        const result = new Date(date);
        result.setDate(result.getDate() - weeks * 7);
        return result.toISOString().split("T")[0];
      }

      function switchMethod(method) {
        currentMethod = method;

        document.querySelectorAll(".method-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.method === method);
        });

        document.querySelectorAll(".method-section").forEach((section) => {
          section.classList.remove("show");
        });
        document.getElementById(method + "Section").classList.add("show");
      }

      function calculate() {
        let lmpDate; // жң«ж¬ЎжңҲз»Ҹж—Ҙжңҹ

        switch (currentMethod) {
          case "lmp": {
            const inputDate = document.getElementById("lmpDate").value;
            if (!inputDate) {
              alert("иҜ·йҖүжӢ©жң«ж¬ЎжңҲз»Ҹж—Ҙжңҹ");
              return;
            }
            lmpDate = new Date(inputDate);

            // ж №жҚ®жңҲз»Ҹе‘Ёжңҹи°ғж•ҙ
            const cycleLength = parseInt(document.getElementById("cycleLength").value);
            const cycleDiff = cycleLength - 28;
            lmpDate.setDate(lmpDate.getDate() + cycleDiff);
            break;
          }

          case "ultrasound": {
            const ultrasoundDate = document.getElementById("ultrasoundDate").value;
            const weeks = parseInt(document.getElementById("ultrasoundWeeks").value) || 0;
            const days = parseInt(document.getElementById("ultrasoundDays").value) || 0;

            if (!ultrasoundDate || weeks < 4) {
              alert("иҜ·еЎ«еҶҷBи¶…жЈҖжҹҘж—Ҙжңҹе’Ңеӯ•е‘Ё");
              return;
            }

            const totalDays = weeks * 7 + days;
            lmpDate = new Date(ultrasoundDate);
            lmpDate.setDate(lmpDate.getDate() - totalDays);
            break;
          }

          case "ivf": {
            const ivfDate = document.getElementById("ivfDate").value;
            const embryoType = parseInt(document.getElementById("embryoType").value);

            if (!ivfDate) {
              alert("иҜ·йҖүжӢ©з§»жӨҚж—Ҙжңҹ");
              return;
            }

            // иҜ•з®Ўе©ҙе„ҝLMPи®Ўз®—пјҡз§»жӨҚж—Ҙжң?- (14 + иғҡиғҺеӨ©ж•°) еӨ?
            lmpDate = new Date(ivfDate);
            lmpDate.setDate(lmpDate.getDate() - 14 - embryoType);
            break;
          }
        }

        // и®Ўз®—йў„дә§жңҹпјҲLMP + 280еӨ©пјү
        const dueDate = new Date(lmpDate);
        dueDate.setDate(dueDate.getDate() + 280);

        // и®Ўз®—еҪ“еүҚеӯ•е‘Ё
        const today = new Date();
        const daysSinceLMP = Math.floor((today - lmpDate) / (1000 * 60 * 60 * 24));
        const currentWeeks = Math.floor(daysSinceLMP / 7);
        const currentDays = daysSinceLMP % 7;

        // и®Ўз®—и·қзҰ»йў„дә§жңҹеӨ©ж•?
        const daysUntilDue = Math.floor((dueDate - today) / (1000 * 60 * 60 * 24));

        // и®Ўз®—иҝӣеәҰ
        const progress = Math.min(100, Math.max(0, (daysSinceLMP / 280) * 100));

        // жҳҫзӨәз»“жһң
        document.getElementById("resultSection").classList.add("show");

        // дё»иҰҒж•°жҚ®
        document.getElementById("dueDateResult").textContent = formatDate(dueDate);
        document.getElementById("weeksResult").textContent = `${currentWeeks}е‘?{currentDays}еӨ©`;
        document.getElementById("daysLeftResult").textContent =
          daysUntilDue > 0 ? `${daysUntilDue}еӨ©` : "е·ІеҲ°жң?;
        document.getElementById("progressResult").textContent = progress.toFixed(1) + "%";

        // иҝӣеәҰжқ?
        document.getElementById("progressBar").style.width = progress + "%";
        document.getElementById("progressText").textContent = `${currentWeeks}/40е‘Ё`;

        // еӯ•жңҹйҳ¶ж®ө
        let trimester, trimesterClass;
        if (currentWeeks < 13) {
          trimester = "еӯ•ж—©жң?;
          trimesterClass = "trimester-1";
        } else if (currentWeeks < 28) {
          trimester = "еӯ•дёӯжң?;
          trimesterClass = "trimester-2";
        } else {
          trimester = "еӯ•жҷҡжң?;
          trimesterClass = "trimester-3";
        }
        const badge = document.getElementById("trimesterBadge");
        badge.textContent = trimester;
        badge.className = `trimester-badge ${trimesterClass}`;

        // иғҺе„ҝеҸ‘иӮІ
        const weekData =
          fetalDevelopment[Math.min(40, Math.max(4, currentWeeks))] || fetalDevelopment[40];
        document.getElementById("fetalIcon").textContent = weekData.icon;
        document.getElementById("fetalTitle").textContent = `з¬?{currentWeeks}е‘Ё`;
        document.getElementById("fetalDesc").textContent = weekData.desc;
        document.getElementById("fetalSize").innerHTML = `
                <div class="size-item">рҹ“Ҹ зә?${weekData.size}</div>
                <div class="size-item">вҡ–пёҸ зә?${weekData.weight}</div>
            `;

        // ж—¶й—ҙзә?
        renderTimeline(lmpDate, currentWeeks);

        // ж»ҡеҠЁеҲ°з»“жһ?
        document.getElementById("resultSection").scrollIntoView({ behavior: "smooth" });
      }

      function renderTimeline(lmpDate, currentWeeks) {
        const timeline = document.getElementById("timeline");

        timeline.innerHTML = checkupSchedule
          .map((item) => {
            const checkupDate = new Date(lmpDate);
            checkupDate.setDate(checkupDate.getDate() + item.week * 7);

            let dotClass = "future";
            if (item.week < currentWeeks) {
              dotClass = "passed";
            } else if (item.week <= currentWeeks + 1) {
              dotClass = "current";
            }

            return `
                    <div class="timeline-item">
                        <div class="timeline-dot ${dotClass}"></div>
                        <div class="timeline-date">${formatDate(checkupDate)} В· еӯ?{item.week}е‘?/div>
                        <div class="timeline-title">${item.title}</div>
                        <div class="timeline-desc">${item.desc}</div>
                    </div>
                `;
          })
          .join("");
      }

      function formatDate(date) {
        return date.toLocaleDateString("zh-CN", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
