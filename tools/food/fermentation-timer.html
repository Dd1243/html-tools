      let totalSeconds = 5400;
      let remainingSeconds = 5400;
      let timerInterval = null;
      let isRunning = false;
      let currentPreset = "bread";
      let history = JSON.parse(localStorage.getItem("fermentHistory") || "[]");

      function selectPreset(type) {
        currentPreset = type;
        const preset = presets[type];

        document.querySelectorAll(".preset-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.type === type);
        });

        document.getElementById("minutes").value = preset.minutes;
        document.getElementById("timerLabel").textContent = preset.name;

      function updateCustomTime() {
        const days = parseInt(document.getElementById("days").value) || 0;
        const hours = parseInt(document.getElementById("hours").value) || 0;
        const minutes = parseInt(document.getElementById("minutes").value) || 0;

        totalSeconds = days * 24 * 3600 + hours * 3600 + minutes * 60;
        remainingSeconds = totalSeconds;
        updateDisplay();
      }

      function updateTemp() {
        const temp = document.getElementById("tempSlider").value;
        document.getElementById("tempValue").textContent = temp + "┬░C";

        const baseFactor = 1;
        const factor = 1 + (temp - 25) * 0.05;
        const adjusted = Math.round(totalSeconds / factor);
        remainingSeconds = adjusted;
        updateDisplay();
      }

      function formatTime(seconds) {
        const d = Math.floor(seconds / 86400);
        const h = Math.floor((seconds % 86400) / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;

        if (d > 0) {
          return (
            d +
            "тц?" +
            String(h).padStart(2, "0") +
            ":" +
            String(m).padStart(2, "0") +
            ":" +
            String(s).padStart(2, "0")
          );
        }
        return (
          String(h).padStart(2, "0") +
          ":" +
          String(m).padStart(2, "0") +
          ":" +
          String(s).padStart(2, "0")
        );
      }

      function updateDisplay() {
        document.getElementById("timerDisplay").textContent = formatTime(remainingSeconds);

        const progress = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
        const circumference = 2 * Math.PI * 90;
        const offset = circumference * (1 - progress);
        document.getElementById("progressCircle").style.strokeDashoffset = offset;
      }

      function toggleTimer() {
        if (isRunning) {
          clearInterval(timerInterval);
          isRunning = false;
          document.getElementById("startBtn").textContent = "у╗Ду╗Г";
        } else {
          isRunning = true;
          document.getElementById("startBtn").textContent = "ТџѓтЂю";
          timerInterval = setInterval(function () {
            if (remainingSeconds > 0) {
              remainingSeconds--;
              updateDisplay();
            } else {
              clearInterval(timerInterval);
              isRunning = false;
              document.getElementById("startBtn").textContent = "т╝ђтД?;
              notifyComplete();
            }
          }, 1000);
        }
      }

      function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        remainingSeconds = totalSeconds;
        document.getElementById("startBtn").textContent = "т╝ђтД?;
        updateDisplay();
      }

      function notifyComplete() {
        const preset = presets[currentPreset] || { name: "УЄфт«џС╣? };

        history.unshift({
          name: preset.name,
          time: formatTime(totalSeconds),
          date: new Date().toLocaleString("zh-CN")
        });

        if (history.length > 10) history.pop();
        localStorage.setItem("fermentHistory", JSON.stringify(history));
        renderHistory();

        if ("Notification" in window && Notification.permission === "granted") {
          new Notification("тЈЉжЁхт«їТѕљ№╝?, { body: preset.name + " тЈЉжЁхУ«АТЌХу╗ЊТЮЪ" });
        }
        alert("тЈЉжЁхт«їТѕљ№╝?);
      }

      function renderHistory() {
        const list = document.getElementById("historyList");
        while (list.firstChild) list.removeChild(list.firstChild);

        if (history.length === 0) {
          const empty = document.createElement("div");
          empty.style.cssText = "color: var(--text-secondary); text-align: center; padding: 20px;";
          empty.textContent = "ТџѓТЌаУ«░тйЋ";
          list.appendChild(empty);
          return;
        }

        history.forEach(function (item) {
          const div = document.createElement("div");
          div.className = "history-item";

          const info = document.createElement("div");
          info.className = "info";
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = item.name;
          const time = document.createElement("div");
          time.className = "time";
          time.textContent = item.time;
          info.appendChild(name);
          info.appendChild(time);

          const status = document.createElement("div");
          status.className = "status";
          status.textContent = item.date;

          div.appendChild(info);
          div.appendChild(status);
          list.appendChild(div);
        });
      }

      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      selectPreset("bread");
      renderHistory();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "Рўђ№И? : "­ЪїЎ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "Рўђ№И?;
      }
    </script>
  </body>
</html>
