  <body>

    <div class="container">
      <a href="../../index.html" class="back-link">вҶ?иҝ”еӣһ</a>
      <h1>иҙӯзү©жё…еҚ•</h1>
      <p class="subtitle">иҪ»жқҫз®ЎзҗҶдҪ зҡ„иҙӯзү©и®ЎеҲ’</p>

      <div class="card">
        <div class="add-form">
          <input
            type="text"
            id="itemInput"
            placeholder="ж·»еҠ зү©е“Ғ..."
            onkeypress="handleKeyPress(event)"
          />
          <button onclick="addItem()">ж·»еҠ </button>
        </div>

        <div class="quick-add">
          <button class="quick-btn" onclick="quickAdd('зүӣеҘ¶', 'dairy')">зүӣеҘ¶</button>
          <button class="quick-btn" onclick="quickAdd('йёЎиӣӢ', 'dairy')">йёЎиӣӢ</button>
          <button class="quick-btn" onclick="quickAdd('йқўеҢ…', 'bakery')">йқўеҢ…</button>
          <button class="quick-btn" onclick="quickAdd('иӢ№жһң', 'produce')">иӢ№жһң</button>
          <button class="quick-btn" onclick="quickAdd('йёЎиғёиӮ?, 'meat')">йёЎиғёиӮ?/button>
          <button class="quick-btn" onclick="quickAdd('зұійҘӯ', 'pantry')">зұійҘӯ</button>
          <button class="quick-btn" onclick="quickAdd('й…ұжІ№', 'pantry')">й…ұжІ№</button>
          <button class="quick-btn" onclick="quickAdd('жҙ—жҙҒзІ?, 'household')">жҙ—жҙҒзІ?/button>
        </div>
      </div>

      <div class="summary-bar">
        <div class="progress">
          <div class="progress-text" id="progressText">0 / 0 е·Іе®ҢжҲ?/div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>
        <div class="action-btns">
          <button class="action-btn" onclick="copyList()">еӨҚеҲ¶</button>
          <button class="action-btn" onclick="clearChecked()">жё…йҷӨе·Іиҙӯ</button>
        </div>
      </div>

      <div class="card" style="margin-top: 20px">
        <div class="category-filter">
          <button class="filter-btn active" data-cat="all" onclick="filterCategory('all')">
            е…ЁйғЁ
          </button>
          <button class="filter-btn" data-cat="produce" onclick="filterCategory('produce')">
            и”¬жһң
          </button>
          <button class="filter-btn" data-cat="meat" onclick="filterCategory('meat')">иӮүзұ»</button>
          <button class="filter-btn" data-cat="dairy" onclick="filterCategory('dairy')">
            д№іеҲ¶е“?
          </button>
          <button class="filter-btn" data-cat="bakery" onclick="filterCategory('bakery')">
            зғҳз„ҷ
          </button>
          <button class="filter-btn" data-cat="pantry" onclick="filterCategory('pantry')">
            жқӮиҙ§
          </button>
          <button class="filter-btn" data-cat="household" onclick="filterCategory('household')">
            ж—Ҙз”Ёе“?
          </button>
        </div>

        <div class="shopping-list" id="shoppingList"></div>
      </div>
    </div>

    <script>
      const categories = {
        produce: { name: "и”¬жһң", icon: "рҹҘ¬" },
        meat: { name: "иӮүзұ»", icon: "рҹҘ©" },
        dairy: { name: "д№іеҲ¶е“?, icon: "рҹҘӣ" },
        bakery: { name: "зғҳз„ҷ", icon: "рҹҚһ" },
        pantry: { name: "жқӮиҙ§", icon: "рҹҸӘ" },
        household: { name: "ж—Ҙз”Ёе“?, icon: "рҹ§№" }
      };

      let items = JSON.parse(localStorage.getItem("shoppingList") || "[]");
      let currentFilter = "all";

      function saveItems() {
        localStorage.setItem("shoppingList", JSON.stringify(items));
      }

      function handleKeyPress(e) {
        if (e.key === "Enter") addItem();
      }

      function addItem() {
        const input = document.getElementById("itemInput");
        const name = input.value.trim();
        if (!name) return;

        const category = guessCategory(name);
        items.push({ id: Date.now(), name: name, category: category, checked: false });
        input.value = "";
        saveItems();
        renderList();
      }

      function quickAdd(name, category) {
        items.push({ id: Date.now(), name: name, category: category, checked: false });
        saveItems();
        renderList();
      }

      function guessCategory(name) {
        const keywords = {
          produce: [
            "иҸ?,
            "жһ?,
            "и”?,
            "з“?,
            "иҗқеҚң",
            "зҷҪиҸң",
            "йқ’иҸң",
            "иӢ№жһң",
            "йҰҷи•ү",
            "ж©?,
            "и‘?,
            "е§?,
            "и’?
          ],
          meat: ["иӮ?, "йё?, "йұ?, "иҷ?, "зү?, "зҢ?, "зҫ?, "жҺ’йӘЁ", "йё?],
          dairy: ["еҘ?, "иӣ?, "й…ёеҘ¶", "иҠқеЈ«", "й»„жІ№", "еҘ¶й…Ә"],
          bakery: ["йқўеҢ…", "иӣӢзі•", "йҘје№І", "зі•зӮ№"],
          pantry: ["зұ?, "йқ?, "жІ?, "зӣ?, "й…?, "йҶ?, "зі?, "и°ғж–ҷ", "й…ұжІ№", "йҶ?],
          household: ["зә?, "жҙ?, "жё…жҙҒ", "еһғеңҫиў?, "дҝқйІң", "жҙ—иЎЈ", "зү?]
        };

        for (var cat in keywords) {
          if (keywords.hasOwnProperty(cat)) {
            for (var i = 0; i < keywords[cat].length; i++) {
              if (name.includes(keywords[cat][i])) return cat;
            }
          }
        }
        return "pantry";
      }

      function toggleItem(id) {
        items = items.map(function (item) {
          if (item.id === id) item.checked = !item.checked;
          return item;
        });
        saveItems();
        renderList();
      }

      function deleteItem(id) {
        items = items.filter(function (item) {
          return item.id !== id;
        });
        saveItems();
        renderList();
      }

      function filterCategory(cat) {
        currentFilter = cat;
        document.querySelectorAll(".filter-btn").forEach(function (btn) {
          btn.classList.toggle("active", btn.dataset.cat === cat);
        });
        renderList();
      }

      function clearChecked() {
        items = items.filter(function (item) {
          return !item.checked;
        });
        saveItems();
        renderList();
      }

      function copyList() {
        const unchecked = items.filter(function (item) {
          return !item.checked;
        });
        let text = "иҙӯзү©жё…еҚ•\n" + "=".repeat(20) + "\n";

        for (var cat in categories) {
          if (categories.hasOwnProperty(cat)) {
            const catItems = unchecked.filter(function (item) {
              return item.category === cat;
            });
            if (catItems.length > 0) {
              text += "\n" + categories[cat].icon + " " + categories[cat].name + "\n";
              catItems.forEach(function (item) {
                text += "  - " + item.name + "\n";
              });
            }
          }
        }

        navigator.clipboard.writeText(text).then(function () {
          alert("е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқ?);
        });
      }

      function renderList() {
        const list = document.getElementById("shoppingList");
        while (list.firstChild) list.removeChild(list.firstChild);

        const filtered =
          currentFilter === "all"
            ? items
            : items.filter(function (item) {
                return item.category === currentFilter;
              });

        const grouped = {};
        filtered.forEach(function (item) {
          if (!grouped[item.category]) grouped[item.category] = [];
          grouped[item.category].push(item);
        });

        for (var cat in categories) {
          if (categories.hasOwnProperty(cat) && grouped[cat] && grouped[cat].length > 0) {
            const section = document.createElement("div");
            section.className = "category-section";

            const header = document.createElement("div");
            header.className = "category-header";
            const h3 = document.createElement("h3");
            h3.textContent = categories[cat].icon + " " + categories[cat].name;
            const count = document.createElement("span");
            count.className = "count";
            count.textContent = grouped[cat].length;
            header.appendChild(h3);
            header.appendChild(count);

            const itemList = document.createElement("div");
            itemList.className = "item-list";

            grouped[cat].forEach(function (item) {
              const itemEl = document.createElement("div");
              itemEl.className = "shopping-item" + (item.checked ? " checked" : "");

              const checkbox = document.createElement("div");
              checkbox.className = "item-checkbox" + (item.checked ? " checked" : "");
              checkbox.addEventListener("click", function () {
                toggleItem(item.id);
              });

              const name = document.createElement("span");
              name.className = "item-name";
              name.textContent = item.name;

              const deleteBtn = document.createElement("button");
              deleteBtn.className = "item-delete";
              deleteBtn.textContent = "Г—";
              deleteBtn.addEventListener("click", function () {
                deleteItem(item.id);
              });

              itemEl.appendChild(checkbox);
              itemEl.appendChild(name);
              itemEl.appendChild(deleteBtn);
              itemList.appendChild(itemEl);
            });

            section.appendChild(header);
            section.appendChild(itemList);
            list.appendChild(section);
          }
        }

        const total = items.length;
        const checked = items.filter(function (item) {
          return item.checked;
        }).length;
        document.getElementById("progressText").textContent = checked + " / " + total + " е·Іе®ҢжҲ?;
        document.getElementById("progressFill").style.width =
          (total > 0 ? (checked / total) * 100 : 0) + "%";
      }

      renderList();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
