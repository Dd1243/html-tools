    <script>
      let participants = [
        { name: "核心成员 A", salary: 200 },
        { name: "核心成员 B", salary: 150 },
        { name: "核心成员 C", salary: 100 }
      ];

      let isRunning = false;
      let startTime = null;
      let elapsedTime = 0;
      let timerInterval = null;

      const userListEl = document.getElementById("userList");
      const costEl = document.getElementById("totalCost");
      const timeEl = document.getElementById("timeElapsed");
      const startBtn = document.getElementById("btnStart");

      const statParticipantsEl = document.getElementById("statParticipants");
      const statCostPerHourEl = document.getElementById("statCostPerHour");
      const statCostPerMinEl = document.getElementById("statCostPerMin");

      function renderUsers() {
        userListEl.innerHTML = "";
        participants.forEach((p, idx) => {
          const div = document.createElement("div");
          div.className = "participant-item";
          div.innerHTML = `
            <input type="text" class="input-name" value="${p.name}" oninput="updateUser(${idx}, 'name', this.value)">
            <input type="number" class="input-salary" value="${p.salary}" oninput="updateUser(${idx}, 'salary', this.value)">
            <button class="btn-outline" style="padding: 5px; color: red;" onclick="removeUser(${idx})">×</button>
          `;
          userListEl.appendChild(div);
        });
        updateStats();
      }

      function updateUser(idx, key, val) {
        participants[idx][key] = key === 'salary' ? (parseFloat(val) || 0) : val;
        updateStats();
      }

      function removeUser(idx) {
        participants.splice(idx, 1);
        renderUsers();
      }

      document.getElementById("btnAddUser").onclick = () => {
        participants.push({ name: "新参会者", salary: 100 });
        renderUsers();
      };

      function updateStats() {
        const totalHourly = participants.reduce((sum, p) => sum + p.salary, 0);
        statParticipantsEl.innerText = participants.length;
        statCostPerHourEl.innerText = "¥ " + totalHourly.toFixed(0);
        statCostPerMinEl.innerText = "¥ " + (totalHourly / 60).toFixed(2);
      }

      function updateDisplay() {
        const totalHourly = participants.reduce((sum, p) => sum + p.salary, 0);
        const costPerSecond = totalHourly / 3600;
        const currentCost = elapsedTime * costPerSecond;

        costEl.innerText = "¥ " + currentCost.toFixed(2);

        const hrs = Math.floor(elapsedTime / 3600);
        const mins = Math.floor((elapsedTime % 3600) / 60);
        const secs = elapsedTime % 60;
        timeEl.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }

      startBtn.onclick = () => {
        if (!isRunning) {
          isRunning = true;
          startBtn.innerText = "暂停会议";
          startBtn.style.background = "#ffa502";
          timerInterval = setInterval(() => {
            elapsedTime++;
            updateDisplay();
          }, 1000);
        } else {
          isRunning = false;
          startBtn.innerText = "恢复会议";
          startBtn.style.background = "var(--accent-color)";
          clearInterval(timerInterval);
        }
      };

      document.getElementById("btnReset").onclick = () => {
        if(confirm("确定重置会议计时吗？")) {
          isRunning = false;
          clearInterval(timerInterval);
          elapsedTime = 0;
          updateDisplay();
          startBtn.innerText = "开始会议";
          startBtn.style.background = "var(--accent-color)";
        }
      };

      window.onload = () => {
        renderUsers();
      };
    </script>
