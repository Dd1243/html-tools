        <div class="expense-form">
          <div class="form-group">
            <label>日期</label>

          </div>
          <div class="form-group">

            <input type="text" id="exp_desc" placeholder="例如：打车到虹桥机场">
          </div>
          <div class="form-group">
            <label>金额 (¥)</label>
            <input type="number" id="exp_amount" placeholder="0.00" step="0.01">
          </div>
          <div class="form-group" style="justify-content: flex-end;">
            <button class="btn btn-primary" id="addBtn">添加记录</button>
          </div>
        </div>

        <div class="summary-cards">
          <div class="summary-card total">
            <h3>报销总计</h3>
            <div class="value" id="total_val">¥ 0.00</div>
          </div>
          <div class="summary-card">
            <h3>项目笔数</h3>
            <div class="value" id="count_val">0</div>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>分类</th>
                <th>描述</th>
                <th style="text-align: right">金额 (¥)</th>
                <th style="width: 80px; text-align: center">操作</th>
              </tr>
            </thead>
            <tbody id="expense_list">
              <!-- JS Injected -->
            </tbody>
          </table>

        <div class="toolbar">
          <button class="btn btn-outline" id="exportBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            导出 CSV

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom">&copy; 2026 WebUtils - 数字化您的办公日常.</div>
      </div>
    </footer>

    <script>
      const LS_KEY = 'expense_report_data_v1';
      let expenses = [];

      function save() {
        localStorage.setItem(LS_KEY, JSON.stringify(expenses));
        render();
      }

      function load() {
        const saved = localStorage.getItem(LS_KEY);
        if(saved) {
          try {
            expenses = JSON.parse(saved);
          } catch(e) { expenses = []; }
        }
        render();
      }

      function render() {
        const list = document.getElementById('expense_list');
        list.innerHTML = '';
        let total = 0;

        expenses.forEach((item, index) => {
          total += parseFloat(item.amount);
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.date}</td>
            <td><span class="category-tag tag-${item.category}">${getCatName(item.category)}</span></td>
            <td>${item.desc}</td>
            <td class="amount-cell">¥ ${parseFloat(item.amount).toFixed(2)}</td>
            <td style="text-align: center">
              <button onclick="deleteItem(${index})" style="color: #ef4444; background:none; border:none; cursor:pointer">删除</button>
            </td>
          `;
          list.appendChild(row);
        });

        if(expenses.length === 0) {
          list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color:#999">暂无报销记录</td></tr>';
        }

        document.getElementById('total_val').textContent = `¥ ${total.toFixed(2)}`;
        document.getElementById('count_val').textContent = expenses.length;
      }

      function getCatName(cat) {
        const names = { travel: '差旅交通', meals: '餐饮交际', supplies: '办公用品', other: '其他支出' };
        return names[cat] || '其他';
      }

      function deleteItem(index) {
        if(confirm('确定删除此条记录吗？')) {
          expenses.splice(index, 1);
          save();
        }
      }

      document.getElementById('addBtn').onclick = () => {
        const date = document.getElementById('exp_date').value;
        const category = document.getElementById('exp_category').value;
        const desc = document.getElementById('exp_desc').value.trim();
        const amount = document.getElementById('exp_amount').value;

        if(!date || !desc || !amount) {
          alert('请完整填写所有必填信息');
          return;
        }

        expenses.push({ date, category, desc, amount });
        document.getElementById('exp_desc').value = '';
        document.getElementById('exp_amount').value = '';
        save();
      };

      document.getElementById('exportBtn').onclick = () => {
        if(expenses.length === 0) return alert('没有记录可导出');
        let csv = '\uFEFF日期,分类,描述,金额(¥)\n';
        expenses.forEach(i => {
          csv += `${i.date},${getCatName(i.category)},"${i.desc}",${i.amount}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `报销单汇总_${new Date().toLocaleDateString()}.csv`;
        link.click();
      };

      document.getElementById('clearBtn').onclick = () => {
        if(confirm('确定清空所有数据吗？此操作不可撤销。')) {
          expenses = [];
          save();
        }
      };

      window.onload = () => {
        document.getElementById('exp_date').value = new Date().toISOString().split('T')[0];
        load();
      };
    </script>
