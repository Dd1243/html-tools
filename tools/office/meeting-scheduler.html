    <script>
      let participants = [
        { name: "本地团队", tz: 8 },
        { name: "欧洲团队", tz: 1 },
        { name: "美东团队", tz: -5 }
      ];

      const mainGrid = document.getElementById("mainGrid");
      const chipsList = document.getElementById("chipsList");
      const resultBox = document.getElementById("resultBox");

      function render() {
        // Render Chips
        chipsList.innerHTML = "";
        participants.forEach((p, i) => {
          const chip = document.createElement("div");
          chip.className = "participant-chip";
          chip.innerHTML = `${p.name} (UTC${p.tz >= 0 ? "+" : ""}${p.tz}) <span class="remove" onclick="removeParticipant(${i})">×</span>`;
          chipsList.appendChild(chip);
        });

        // Render Grid
        mainGrid.innerHTML = "";

        // Header (Hours)
        mainGrid.appendChild(createCell("参与者 / UTC 时间", "header name-cell"));
        for (let i = 0; i < 24; i++) {
          mainGrid.appendChild(createCell(`${String(i).padStart(2, '0')}:00`, "header"));
        }

        const overlap = new Array(24).fill(true);

        // Rows per participant
        participants.forEach(p => {
          mainGrid.appendChild(createCell(p.name, "name-cell"));
          for (let utcHr = 0; utcHr < 24; utcHr++) {
            let localHr = (utcHr + p.tz + 24) % 24;
            const isWorking = localHr >= 9 && localHr < 18;
            if (!isWorking) overlap[utcHr] = false;

            mainGrid.appendChild(createCell(`${Math.floor(localHr)}:00`, isWorking ? "status-available" : "status-busy"));
          }
        });

        // Overlap Row
        if (participants.length > 0) {
          mainGrid.appendChild(createCell("共同可用时段 (UTC)", "name-cell", "color: var(--accent-color); font-weight: 800;"));
          let hasOverlap = false;
          let overlapRanges = [];

          for (let i = 0; i < 24; i++) {
            if (overlap[i]) {
              mainGrid.appendChild(createCell("MATCH", "status-overlap"));
              hasOverlap = true;
            } else {
              mainGrid.appendChild(createCell("", ""));
            }
          }

          // Summary Alert
          resultBox.style.display = "block";
          if (hasOverlap) {
            resultBox.className = "result-alert success";
            resultBox.innerHTML = "<strong>✅ 发现理想时段！</strong> 请参考上方深蓝色区域进行预约。";
          } else {
            resultBox.className = "result-alert warning";
            resultBox.innerHTML = "<strong>⚠️ 未发现共同办公重叠。</strong> 建议通过邮件进行异步沟通，或协商一方牺牲休息时间。";
          }
        } else {
          resultBox.style.display = "none";
        }
      }

      function createCell(text, className, style = "") {
        const div = document.createElement("div");
        div.className = "grid-cell " + className;
        div.innerText = text;
        if (style) div.style = style;
        return div;
      }

      document.getElementById("btnAdd").onclick = () => {
        const name = document.getElementById("pName").value.trim();
        const tz = parseFloat(document.getElementById("pTimezone").value);
        if (name) {
          participants.push({ name, tz });
          document.getElementById("pName").value = "";
          render();
          saveToLocal();
        }
      };

      window.removeParticipant = (i) => {
        participants.splice(i, 1);
        render();
        saveToLocal();
      };

      function saveToLocal() {
        localStorage.setItem("meeting_scheduler_state", JSON.stringify(participants));
      }

      document.getElementById("btnShare").onclick = () => {
        const hash = btoa(encodeURIComponent(JSON.stringify(participants)));
        const url = location.origin + location.pathname + "#" + hash;
        navigator.clipboard.writeText(url).then(() => alert("配置链接已复制！他人打开此链接可看到相同的参会者列表。"));
      };

      document.getElementById("btnReset").onclick = () => {
        if(confirm("确定清空吗？")) {
          participants = [];
          render();
          localStorage.removeItem("meeting_scheduler_state");
        }
      };

      window.onload = () => {
        const hash = location.hash.slice(1);
        if (hash) {
          try { participants = JSON.parse(decodeURIComponent(atob(hash))); } catch(e) {}
        } else {
          const local = localStorage.getItem("meeting_scheduler_state");
          if (local) participants = JSON.parse(local);
        }
        render();
      };
    </script>
