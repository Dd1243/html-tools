        border-radius: 4px;

      .color-group input { padding: 0; height: 35px; width: 60px; }

      .preview-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        position: sticky;
        top: 90px;
      }
      /* 名片核心样式 */
      .bc-card {
        width: 450px;
        height: 260px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        transform-origin: center;
      }
      @media (max-width: 500px) {
        .bc-card { transform: scale(0.7); margin-bottom: -50px; }
      }

      .bc-modern { padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
      .bc-modern .accent { position: absolute; left: 0; top: 0; bottom: 0; width: 15px; }
      .bc-modern .name { font-size: 1.8rem; font-weight: 700; }
      .bc-modern .title { font-size: 1rem; opacity: 0.8; margin-bottom: 20px; }
      .bc-modern .info { font-size: 0.85rem; line-height: 1.8; }

      .bc-minimal { display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
      .bc-minimal .name { font-size: 2rem; font-weight: 300; letter-spacing: 4px; border-bottom: 1px solid; padding-bottom: 5px; margin-bottom: 15px; }
      .bc-minimal .info { font-size: 0.75rem; opacity: 0.6; }

      .bc-classic { padding: 40px; }
      .bc-classic .company { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; margin-bottom: 40px; text-align: right; }
      .bc-classic .name { font-size: 1.5rem; font-weight: 600; margin-bottom: 5px; }
      .bc-classic .info { font-size: 0.8rem; border-top: 1px solid; padding-top: 15px; margin-top: 15px; }

      .btn-outline { background: #fff; border: 1px solid var(--border-color); color: var(--text-muted); }

        <div class="design-grid">

            <div class="form-group">

            </div>

              <input type="text" id="inpPhone" value="+86 138-0000-0000" />
            </div>
            <div class="form-group">
              <label>电子邮箱</label>
              <input type="text" id="inpEmail" value="zhangsan@example.com" />
            </div>
            <div class="form-group">
              <label>办公地址</label>
              <input type="text" id="inpAddress" value="北京市朝阳区科技园 A 座" />
            </div>
            <div class="form-group">
              <label>配色自定义</label>
              <div class="color-group">
                <div><label style="font-size: 0.7rem">背景</label><input type="color" id="colorBg" value="#ffffff" /></div>
                <div><label style="font-size: 0.7rem">文字</label><input type="color" id="colorText" value="#333333" /></div>
                <div><label style="font-size: 0.7rem">强调</label><input type="color" id="colorAccent" value="#4a90e2" /></div>
              </div>
            </div>
          </div>

          <div class="preview-panel">
            <h3 style="font-size: 0.9rem; color: var(--text-muted)">实时预览 (Real-time Preview)</h3>
            <div id="cardPreview" class="bc-card bc-modern">
              <!-- JS 渲染 -->
            </div>
            <p style="font-size: 0.75rem; color: #999">提示：手机端可长按预览图保存，PC端支持直接打印。</p>
          </div>
        </div>

        <div class="action-bar">
          <button class="btn btn-primary" id="btnPrint">🖨️ 打印名片 (A4 排版)</button>
          <button class="btn btn-outline" id="btnExport">🖼️ 导出高清图片</button>

    <script>
      const preview = document.getElementById("cardPreview");
      const LS_KEY = "bc_maker_v2_data";

      function render() {
        const style = document.getElementById("cardStyle").value;
        const name = document.getElementById("inpName").value;
        const title = document.getElementById("inpTitle").value;
        const company = document.getElementById("inpCompany").value;
        const phone = document.getElementById("inpPhone").value;
        const email = document.getElementById("inpEmail").value;
        const addr = document.getElementById("inpAddress").value;

        const bg = document.getElementById("colorBg").value;
        const textCol = document.getElementById("colorText").value;
        const accent = document.getElementById("colorAccent").value;

        preview.className = `bc-card bc-${style}`;
        preview.style.backgroundColor = bg;
        preview.style.color = textCol;

        if(style === 'modern') {
          preview.innerHTML = `
            <div class="accent" style="background:${accent}"></div>
            <div>
              <div class="name">${name}</div>
              <div class="title">${title}</div>
            </div>
            <div class="info">
              <div style="font-weight:700">${company}</div>
              <div>${phone}</div>
              <div>${email}</div>
              <div>${addr}</div>
            </div>
          `;
        } else if(style === 'minimal') {
          preview.innerHTML = `
            <div>
              <div class="name" style="border-color:${accent}">${name}</div>
              <div class="info">
                <div>${title} | ${company}</div>
                <div>${phone} | ${email}</div>
              </div>
            </div>
          `;
        } else if(style === 'classic') {
          preview.innerHTML = `
            <div class="company" style="color:${accent}">${company}</div>
            <div class="name">${name}</div>
            <div class="info" style="border-color:${accent}">
              <div>${title}</div>
              <div>${phone} | ${email}</div>
              <div>${addr}</div>
            </div>
          `;
        }
        saveData();
      }

      function saveData() {
        const data = {
          style: document.getElementById("cardStyle").value,
          name: document.getElementById("inpName").value,
          title: document.getElementById("inpTitle").value,
          company: document.getElementById("inpCompany").value,
          phone: document.getElementById("inpPhone").value,
          email: document.getElementById("inpEmail").value,
          addr: document.getElementById("inpAddress").value,
          bg: document.getElementById("colorBg").value,
          text: document.getElementById("colorText").value,
          accent: document.getElementById("colorAccent").value
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadData() {
        const saved = localStorage.getItem(LS_KEY);
        if(saved) {
          const d = JSON.parse(saved);
          document.getElementById("cardStyle").value = d.style || 'modern';
          document.getElementById("inpName").value = d.name || '';
          document.getElementById("inpTitle").value = d.title || '';
          document.getElementById("inpCompany").value = d.company || '';
          document.getElementById("inpPhone").value = d.phone || '';
          document.getElementById("inpEmail").value = d.email || '';
          document.getElementById("inpAddress").value = d.addr || '';
          document.getElementById("colorBg").value = d.bg || '#ffffff';
          document.getElementById("colorText").value = d.text || '#333333';
          document.getElementById("colorAccent").value = d.accent || '#4a90e2';
        }
        render();
      }

      document.querySelectorAll("input, select").forEach(el => el.oninput = render);

      document.getElementById("btnPrint").onclick = () => window.print();
      document.getElementById("btnClear").onclick = () => {
        if(confirm("重置所有设计到初始状态？")) {
          localStorage.removeItem(LS_KEY);
          location.reload();
        }
      };

      // 简单导出为图片（截图逻辑）
      document.getElementById("btnExport").onclick = () => {
         alert("提示：为了获得最高画质，建议在 PC 端点击『打印』后选择『另存为 PDF』，或直接使用系统截图功能。");
      };

      window.onload = loadData;
    </script>
