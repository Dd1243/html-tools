    <script>
      const companyNameEl = document.getElementById("companyName");
      const subtitleEl = document.getElementById("subtitle");
      const shapeEl = document.getElementById("shape");
      const borderColorEl = document.getElementById("borderColor");
      const borderWidthEl = document.getElementById("borderWidth");
      const showStarEl = document.getElementById("showStar");
      const canvas = document.getElementById("previewCanvas");
      const ctx = canvas.getContext("2d");

      const LS_KEY = "stamp_generator_config_v2";
      const CANVAS_SIZE = 400;
      const PADDING = 30;

      function loadConfig() {
        try {
          const saved = localStorage.getItem(LS_KEY);
          if (saved) {
            const config = JSON.parse(saved);
            if (config.companyName) companyNameEl.value = config.companyName;
            if (config.subtitle) subtitleEl.value = config.subtitle;
            if (config.shape) shapeEl.value = config.shape;
            if (config.borderColor) borderColorEl.value = config.borderColor;
            if (config.borderWidth) borderWidthEl.value = config.borderWidth;
            if (typeof config.showStar === "boolean") showStarEl.checked = config.showStar;
          }
        } catch (e) {}
      }

      function saveConfig() {
        const config = {
          companyName: companyNameEl.value,
          subtitle: subtitleEl.value,
          shape: shapeEl.value,
          borderColor: borderColorEl.value,
          borderWidth: borderWidthEl.value,
          showStar: showStarEl.checked
        };
        localStorage.setItem(LS_KEY, JSON.stringify(config));
      }

      function drawStar(cx, cy, outerRadius, innerRadius, color) {
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle = color;
        for (let i = 0; i < 5; i++) {
          let outerAngle = Math.PI / 2 + (i * 2 * Math.PI) / 5;
          let outerX = cx + Math.cos(outerAngle) * outerRadius;
          let outerY = cy - Math.sin(outerAngle) * outerRadius;
          if (i === 0) ctx.moveTo(outerX, outerY);
          else ctx.lineTo(outerX, outerY);

          let innerAngle = outerAngle + Math.PI / 5;
          let innerX = cx + Math.cos(innerAngle) * innerRadius;
          let innerY = cy - Math.sin(innerAngle) * innerRadius;
          ctx.lineTo(innerX, innerY);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawTextArc(text, cx, cy, radius, startAngle, endAngle, color, fontSize) {
        if (!text) return;
        ctx.save();
        ctx.fillStyle = color;
        // 优先使用宋体或仿宋，更接近真实印章风格
        ctx.font = `bold ${fontSize}px "SimSun", "STSong", "serif"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const chars = text.split("");
        const totalAngle = endAngle - startAngle;
        const anglePerChar = totalAngle / (chars.length + 0.5);

        chars.forEach((char, i) => {
          const angle = startAngle + anglePerChar * (i + 0.75);
          const x = cx + Math.cos(angle) * radius;
          const y = cy + Math.sin(angle) * radius;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle + Math.PI / 2);
          ctx.fillText(char, 0, 0);
          ctx.restore();
        });
        ctx.restore();
      }

      function drawStamp() {
        const companyName = companyNameEl.value.trim() || "示例公司名称";
        const subtitle = subtitleEl.value.trim();
        const shape = shapeEl.value;
        const color = borderColorEl.value;
        const borderWidth = parseInt(borderWidthEl.value, 10);
        const showStar = showStarEl.checked;

        const cx = CANVAS_SIZE / 2;
        const cy = CANVAS_SIZE / 2;

        ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        ctx.strokeStyle = color;
        ctx.lineWidth = borderWidth;

        if (shape === "circle") {
          const radius = (CANVAS_SIZE - PADDING * 2 - borderWidth) / 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.stroke();

          // 内圈辅助线（可选，增加层次感）
          ctx.beginPath();
          ctx.lineWidth = 1.5;
          ctx.arc(cx, cy, radius - 10, 0, Math.PI * 2);
          ctx.stroke();

          const textRadius = radius - 35;
          drawTextArc(companyName, cx, cy, textRadius, Math.PI * 1.15, Math.PI * 1.85, color, 28);

          if (showStar) drawStar(cx, cy, 40, 16, color);
          if (subtitle) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `bold 18px "SimSun", serif`;
            ctx.textAlign = "center";
            ctx.fillText(subtitle, cx, cy + 85);
            ctx.restore();
          }
        } else if (shape === "oval") {
          const radiusX = (CANVAS_SIZE - PADDING * 2 - borderWidth) / 2;
          const radiusY = radiusX * 0.65;
          ctx.beginPath();
          ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
          ctx.stroke();

          ctx.beginPath();
          ctx.lineWidth = 1.5;
          ctx.ellipse(cx, cy, radiusX - 8, radiusY - 8, 0, 0, Math.PI * 2);
          ctx.stroke();

          const textRadiusOval = radiusY - 25;
          drawTextArc(companyName, cx, cy, textRadiusOval, Math.PI * 1.1, Math.PI * 1.9, color, 24);

          if (showStar) drawStar(cx, cy, 30, 12, color);
          if (subtitle) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `bold 16px "SimSun", serif`;
            ctx.textAlign = "center";
            ctx.fillText(subtitle, cx, cy + 45);
            ctx.restore();
          }
        } else if (shape === "rectangle") {
          const rectWidth = CANVAS_SIZE - PADDING * 2;
          const rectHeight = rectWidth * 0.45;
          const rectX = PADDING;
          const rectY = (CANVAS_SIZE - rectHeight) / 2;

          ctx.strokeRect(rectX, rectY, rectWidth, rectHeight);
          ctx.lineWidth = 1.5;
          ctx.strokeRect(rectX + 6, rectY + 6, rectWidth - 12, rectHeight - 12);

          ctx.save();
          ctx.fillStyle = color;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          if (subtitle) {
            ctx.font = `bold 32px "SimSun", serif`;
            ctx.fillText(companyName, cx, cy - 25);
            ctx.font = `bold 22px "SimSun", serif`;
            ctx.fillText(subtitle, cx, cy + 25);
          } else {
            ctx.font = `bold 36px "SimSun", serif`;
            ctx.fillText(companyName, cx, cy);
          }
          ctx.restore();

          if (showStar) drawStar(rectX + 60, cy, 25, 10, color);
        }
        saveConfig();
      }

      document.getElementById("btnDownload").onclick = () => {
        const name = companyNameEl.value.trim() || "印章";
        const link = document.createElement("a");
        link.download = `${name}_电子印章.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      document.getElementById("btnClear").onclick = () => {
        if (confirm("确定要重置所有配置吗？")) {
          companyNameEl.value = "";
          subtitleEl.value = "";
          shapeEl.value = "circle";
          borderColorEl.value = "#dc2626";
          borderWidthEl.value = "5";
          showStarEl.checked = true;
          localStorage.removeItem(LS_KEY);
          drawStamp();
        }
      };

      [companyNameEl, subtitleEl, shapeEl, borderColorEl, borderWidthEl, showStarEl].forEach(el => {
        el.addEventListener("input", drawStamp);
        el.addEventListener("change", drawStamp);
      });

      window.onload = () => {
        loadConfig();
        drawStamp();
      };
    </script>
<!-- FAQ（GEO 优化）-->
</body>
</html>
