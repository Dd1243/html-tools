    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
      const LS_KEY = 'gantt_chart_data_v2';
      let tasks = [];
      const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#475569'];

      function save() {
        localStorage.setItem(LS_KEY, JSON.stringify(tasks));
        render();
        updateUrl();
      }

      function load() {
        const hash = location.hash.slice(1);
        if(hash) {
          try { tasks = JSON.parse(decodeURIComponent(atob(hash))); } catch(e) { tasks = []; }
        } else {
          const saved = localStorage.getItem(LS_KEY);
          if(saved) {
            try { tasks = JSON.parse(saved); } catch(e) { tasks = []; }
          }
        }
        render();
      }

      function updateUrl() {
        const data = btoa(encodeURIComponent(JSON.stringify(tasks)));
        history.replaceState(null, '', '#' + data);
      }

      function getRange() {
        if(tasks.length === 0) return { start: new Date(), end: new Date() };
        let min = new Date(tasks[0].start);
        let max = new Date(tasks[0].end);
        tasks.forEach(t => {
          const s = new Date(t.start);
          const e = new Date(t.end);
          if(s < min) min = s;
          if(e > max) max = e;
        });
        // Padding
        min.setDate(min.getDate() - 2);
        max.setDate(max.getDate() + 5);
        return { start: min, end: max };
      }

      function render() {
        const { start, end } = getRange();
        const scale = document.getElementById('viewScale').value;
        const timelineHeader = document.getElementById('timelineHeader');
        const timelineRows = document.getElementById('timelineRows');
        const taskList = document.getElementById('taskList');

        // Reset
        taskList.innerHTML = '<div class="task-list-header">项目任务</div>';
        timelineHeader.innerHTML = '';
        timelineRows.innerHTML = '';

        const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
        const cellWidth = 35;

        // Render Header
        for(let i = 0; i < days; i++) {
          const d = new Date(start);
          d.setDate(start.getDate() + i);
          const cell = document.createElement('div');
          cell.className = 'timeline-cell' + ([0,6].includes(d.getDay()) ? ' weekend' : '');
          cell.innerHTML = `<span>${d.getDate()}</span><small>${d.getMonth()+1}月</small>`;
          if(scale === 'week' && d.getDay() !== 1 && i !== 0) {
            cell.style.display = 'none';
          } else if(scale === 'week') {
            cell.style.minWidth = (cellWidth * 7) + 'px';
            cell.innerHTML = `<span>第 ${Math.ceil((d.getDate() + 6) / 7)} 周</span><small>${d.getFullYear()}/${d.getMonth()+1}</small>`;
          }
          timelineHeader.appendChild(cell);
        }

        // Render Tasks
        tasks.forEach((t, index) => {
          const nameRow = document.createElement('div');
          nameRow.className = 'task-row-name';
          nameRow.innerHTML = `<span>${t.name}</span><span class="del-task" onclick="deleteTask(${index})">✕</span>`;
          taskList.appendChild(nameRow);

          const row = document.createElement('div');
          row.className = 'timeline-row';
          const tStart = new Date(t.start);
          const tEnd = new Date(t.end);
          const leftDays = (tStart - start) / (1000 * 60 * 60 * 24);
          const duration = (tEnd - tStart) / (1000 * 60 * 60 * 24) + 1;

          const bar = document.createElement('div');
          bar.className = 'task-bar';
          bar.style.left = (leftDays * cellWidth) + 'px';
          bar.style.width = (duration * cellWidth) + 'px';
          bar.style.backgroundColor = COLORS[index % COLORS.length];
          bar.innerText = t.name;
          bar.title = `${t.name} (${t.start} 至 ${t.end})`;
          row.appendChild(bar);
          timelineRows.appendChild(row);
        });
      }

      function deleteTask(idx) {
        if(confirm('确定删除该任务吗？')) {
          tasks.splice(idx, 1);
          save();
        }
      }

      document.getElementById('addBtn').onclick = () => {
        const name = document.getElementById('taskName').value.trim();
        const s = document.getElementById('startDate').value;
        const e = document.getElementById('endDate').value;
        if(!name || !s || !e) return alert('请完整填写任务信息');
        if(new Date(s) > new Date(e)) return alert('结束日期不能早于开始日期');
        tasks.push({ name, start: s, end: e });
        save();
        document.getElementById('taskName').value = '';
      };

      document.getElementById('viewScale').onchange = render;

      document.getElementById('exportBtn').onclick = () => {
        const el = document.getElementById('ganttContainer');
        html2canvas(el, { scrollX: 0, scrollY: 0 }).then(canvas => {
          const link = document.createElement('a');
          link.download = '甘特图计划表.png';
          link.href = canvas.toDataURL();
          link.click();
        });
      };

      document.getElementById('printBtn').onclick = () => window.print();
      document.getElementById('shareBtn').onclick = () => {
        navigator.clipboard.writeText(location.href).then(() => alert('分享链接已复制到剪贴板'));
      };
      document.getElementById('clearBtn').onclick = () => {
        if(confirm('确定清空所有任务吗？')) {
          tasks = [];
          save();
        }
      };

      window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;
        load();
      };
    </script>
