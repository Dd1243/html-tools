    <script>
      let currentType = 'service';

      const templates = {

            { title: "第四条 甲方的权利与义务", content: "1. 甲方有权监督服务进度；2. 甲方应按时足额支付报酬；3. 甲方应提供必要的协作支持。" },
            { title: "第五条 乙方的权利与义务", content: "1. 乙方应按时按质交付服务成果；2. 乙方应对甲方提供的商业秘密负有保密义务；3. 乙方不得私自转包。" },
            { title: "第六条 违约责任", content: "如一方违反本合同约定，应赔偿守约方因此产生的直接经济损失。" }
          ]
        },
        employment: {
          title: "劳动/雇佣聘用合同",
          intro: "根据相关法律法规，甲乙双方经协商一致，自愿订立本合同，共同遵守本合同所列条款：",
          clauses: [
            { title: "第一条 工作岗位", content: "乙方在甲方处担任 {jobTitle} 岗位工作。工作内容应符合公司规章制度及岗位说明书要求。" },
            { title: "第二条 合同期限", content: "本合同期限自 {startDate} 起至 {endDate} 止。其中试用期为 {probation} 个月。" },
            { title: "第三条 报酬与福利", content: "甲方支付乙方月工资为人民币 {amount} 元整（大写：{amountCN}）。支付方式为：{paymentMethod}。" },
            { title: "第四条 劳动保护", content: "甲方应为乙方提供符合国家法律规定的劳动条件、劳动保护和劳动防护用品。" },
            { title: "第五条 规章制度", content: "乙方应遵守甲方的各项规章制度，遵守劳动纪律，保守甲方商业秘密。" }
          ]
        },
        rental: {
          title: "资产/房屋租赁合同",
          intro: "甲方将位于 {rentalDesc} 的资产/房屋租赁给乙方使用，经双方友好协商，特订立本合同：",
          clauses: [
            { title: "第一条 租赁内容", content: "甲方同意将前述资产租赁给乙方使用。租赁物状态经双方确认良好。" },
            { title: "第二条 租赁期限", content: "租赁期限自 {startDate} 起至 {endDate} 止。" },
            { title: "第三条 租金与押金", content: "租金总额共计人民币 {amount} 元整（大写：{amountCN}）。乙方需另行支付押金人民币 {deposit} 元整。付款方式：{paymentMethod}。" },
            { title: "第四条 维护责任", content: "乙方在使用期间应爱护租赁物。非人为损坏由甲方负责维修，人为损坏由乙方承担赔偿。" },
            { title: "第五条 合同终止", content: "租赁期满，乙方应按原状返还。如需续租应提前三十日通知甲方。" }
          ]
        }
      };

      function numToCN(n) {
        if(!n) return "零";
        const fraction = ['角', '分'];
        const digit = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
        const unit = [['元', '万', '亿'], ['', '拾', '佰', '仟']];
        let s = '';
        for (let i = 0; i < fraction.length; i++) {
          s += (digit[Math.floor(n * 10 * Math.pow(10, i)) % 10] + fraction[i]).replace(/零./, '');
        }
        s = s || '整';
        n = Math.floor(n);
        for (let i = 0; i < unit[0].length && n > 0; i++) {
          let p = '';
          for (let j = 0; j < unit[1].length && n > 0; j++) {
            p = digit[n % 10] + unit[1][j] + p;
            n = Math.floor(n / 10);
          }
          s = p.replace(/(零.)*零$/, '').replace(/^$/, '零') + unit[0][i] + s;
        }
        return s.replace(/(零.)*零元/, '元').replace(/(零.)+/g, '零').replace(/^整$/, '零元整');
      }

      function getVal(id) { return document.getElementById(id).value || "________"; }

      function generate() {
        const tpl = templates[currentType];
        const data = {
          contractNo: getVal('contractNo'),
          contractDate: getVal('contractDate'),
          partyA: getVal('partyA'),
          partyB: getVal('partyB'),
          startDate: getVal('startDate'),
          endDate: getVal('endDate'),
          amount: getVal('amount'),
          amountCN: numToCN(parseFloat(document.getElementById('amount').value) || 0),
          paymentMethod: getVal('paymentMethod'),
          extraTerms: document.getElementById('extraTerms').value,
          serviceScope: getVal('serviceScope'),
          jobTitle: getVal('jobTitle'),
          probation: getVal('probation'),
          rentalDesc: getVal('rentalDesc'),
          deposit: getVal('deposit')
        };

        let html = `<h2>${tpl.title}</h2>`;
        html += `<div class="contract-parties">
          <p>甲方（第一方）：${data.partyA}</p>
          <p>乙方（第二方）：${data.partyB}</p>
          <p>合同编号：${data.contractNo}</p>
          <p>签订日期：${data.contractDate}</p>
        </div>`;
        html += `<div class="contract-body"><p>${tpl.intro}</p>`;

        tpl.clauses.forEach(c => {
          let content = c.content;
          for(let key in data) { content = content.replace(`{${key}}`, data[key]); }
          html += `<div class="section-title">${c.title}</div><p>${content}</p>`;
        });

        if(data.extraTerms) {
          html += `<div class="section-title">附加协议条款</div><p>${data.extraTerms}</p>`;
        }

        html += `<p>本合同自双方签字盖章之日起生效，一式两份，双方各执一份。</p></div>`;
        html += `<div class="signature-area">
          <div class="sig-block"><p>甲方（签章）：</p><div class="sig-line"></div><p>日期：</p></div>
          <div class="sig-block"><p>乙方（签章）：</p><div class="sig-line"></div><p>日期：</p></div>
        </div>`;

        document.getElementById('contractContent').innerHTML = html;
        saveCache();
      }

      function toggleType(type) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');

        // Hide all specific fields
        ['field_service_scope', 'field_job_title', 'field_probation', 'field_rental_address', 'field_deposit'].forEach(id => {
          document.getElementById(id).style.display = 'none';
        });

        // Show relevant fields
        if(type === 'service') document.getElementById('field_service_scope').style.display = 'block';
        if(type === 'employment') {
          document.getElementById('field_job_title').style.display = 'block';
          document.getElementById('field_probation').style.display = 'block';
        }
        if(type === 'rental') {
          document.getElementById('field_rental_address').style.display = 'block';
          document.getElementById('field_deposit').style.display = 'block';
        }
        generate();
      }

      function saveCache() {
        const fields = ['contractNo', 'contractDate', 'partyA', 'partyB', 'startDate', 'endDate', 'amount', 'paymentMethod', 'extraTerms', 'serviceScope', 'jobTitle', 'probation', 'rentalDesc', 'deposit'];
        const data = { type: currentType };
        fields.forEach(f => data[f] = document.getElementById(f).value);
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function loadCache() {
        const cached = localStorage.getItem(LS_KEY);
        if(cached) {
          const data = JSON.parse(cached);
          toggleType(data.type || 'service');
          for(let key in data) {
            const el = document.getElementById(key);
            if(el) el.value = data[key];
          }
        }
      }

      document.querySelectorAll('.type-btn').forEach(btn => {
        btn.onclick = () => toggleType(btn.dataset.type);
      });

      document.getElementById('btnGenerate').onclick = generate;
      document.getElementById('btnPrint').onclick = () => window.print();
      document.getElementById('btnCopy').onclick = () => {
        const text = document.getElementById('contractContent').innerText;
        navigator.clipboard.writeText(text).then(() => alert('合同文本已复制'));
      };
      document.getElementById('btnClear').onclick = () => {
        if(confirm('确定清空所有输入吗？')) {
          localStorage.removeItem(LS_KEY);
          location.reload();
        }
      };

      // Auto generate on change
      document.querySelectorAll('input, select, textarea').forEach(el => {
        el.oninput = generate;
      });

      window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('contractDate').value = today;
        loadCache();
        generate();
      };
    </script>
<!-- FAQ（GEO 优化）-->
