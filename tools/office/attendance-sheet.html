      .control-grid {

        font-size: 0.75rem;

          </p>

        <div class="control-grid">
          <div class="form-group">
            <label>考勤日期</label>
            <input type="date" id="attendanceDate" />
          </div>
          <div class="form-group">
            <label>快速添加人员 (按 Enter 确认)</label>

          <div class="stat-card"><div class="val" id="totalCount">0</div><div class="label">总人数</div></div>
          <div class="stat-card"><div class="val" id="presentCount" style="color: #28a745">0</div><div class="label">出勤</div></div>
          <div class="stat-card"><div class="val" id="absentCount" style="color: #dc3545">0</div><div class="label">缺勤</div></div>
          <div class="stat-card"><div class="val" id="lateCount" style="color: #ffc107">0</div><div class="label">迟到</div></div>
          <div class="stat-card"><div class="val" id="leaveCount" style="color: #17a2b8">0</div><div class="label">请假</div></div>
        </div>

        <div style="overflow-x: auto">
          <table class="roster-table">
            <thead>
              <tr>
                <th style="width: 30%">姓名</th>
                <th style="width: 50%">考勤状态</th>
                <th style="width: 20%" class="no-print">操作</th>

              <!-- JS 动态添加 -->

    <script>
      const dateEl = document.getElementById("attendanceDate");
      const nameInputEl = document.getElementById("newName");
      const rosterBodyEl = document.getElementById("rosterBody");

      const LS_KEY = "attendance_v2_storage";
      let store = { roster: [], records: {} }; // records: { "2024-01-01": { "id1": "present" } }

      function render() {
        const date = dateEl.value;
        const currentRecords = store.records[date] || {};
        rosterBodyEl.innerHTML = "";

        let stats = { present: 0, absent: 0, late: 0, leave: 0 };

        store.roster.forEach((person, index) => {
          const status = currentRecords[person.id] || "";
          if(status) stats[status]++;

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td style="font-weight: 500">${person.name}</td>
            <td>
              <div class="status-group">
                <button class="status-btn present ${status==='present'?'active':''}" onclick="setStatus('${person.id}', 'present')">出勤</button>
                <button class="status-btn absent ${status==='absent'?'active':''}" onclick="setStatus('${person.id}', 'absent')">缺勤</button>
                <button class="status-btn late ${status==='late'?'active':''}" onclick="setStatus('${person.id}', 'late')">迟到</button>
                <button class="status-btn leave ${status==='leave'?'active':''}" onclick="setStatus('${person.id}', 'leave')">请假</button>
              </div>
            </td>
            <td class="no-print">
              <button class="btn-small" onclick="removePerson(${index})" style="color: #999; border:none; background:none; cursor:pointer">移除</button>
            </td>
          `;
          rosterBodyEl.appendChild(tr);
        });

        document.getElementById("totalCount").textContent = store.roster.length;
        document.getElementById("presentCount").textContent = stats.present;
        document.getElementById("absentCount").textContent = stats.absent;
        document.getElementById("lateCount").textContent = stats.late;
        document.getElementById("leaveCount").textContent = stats.leave;
        saveData();
      }

      window.setStatus = (pid, status) => {
        const date = dateEl.value;
        if(!store.records[date]) store.records[date] = {};
        // 如果点击已激活的，则取消
        if(store.records[date][pid] === status) {
          delete store.records[date][pid];
        } else {
          store.records[date][pid] = status;
        }
        render();
      };

      window.removePerson = (index) => {
        if(confirm("确定移除该人员及其所有历史考勤吗？")) {
          store.roster.splice(index, 1);
          render();
        }
      };

      nameInputEl.onkeydown = (e) => {
        if(e.key === "Enter") {
          const name = nameInputEl.value.trim();
          if(name) {
            store.roster.push({ id: Date.now() + Math.random().toString(), name });
            nameInputEl.value = "";
            render();
          }
        }
      };

      function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(store)); }
      function loadData() {
        const saved = localStorage.getItem(LS_KEY);
        if(saved) {
          store = JSON.parse(saved);
        }
        dateEl.value = new Date().toISOString().split('T')[0];
        render();
      }

      document.getElementById("btnExport").onclick = () => {
        const date = dateEl.value;
        const records = store.records[date] || {};
        let csv = "\uFEFF姓名,日期,状态\n";
        const labels = { present: "出勤", absent: "缺勤", late: "迟到", leave: "请假" };
        store.roster.forEach(p => {
          csv += `${p.name},${date},${labels[records[p.id]] || "未记录"}\n`;
        });
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `签到表_${date}.csv`;
        a.click();
      };

      document.getElementById("btnPrint").onclick = () => window.print();
      document.getElementById("btnClear").onclick = () => {
        if(confirm("确定清空所有人员和考勤记录吗？")) {
          localStorage.removeItem(LS_KEY);
          location.reload();
        }
      };

      dateEl.onchange = render;
      window.onload = loadData;
    </script>
