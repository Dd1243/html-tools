      .seat.occupied { background: #e7f3ff; border-color: var(--primary-color); color: var(--primary-color); font-weight: 600; }

    <!-- 分配座位弹窗 -->
    <div class="modal-overlay" id="seatModal">
      <div class="modal">
        <h3 style="margin-bottom: 15px">分配座位</h3>
        <input type="text" id="guestName" placeholder="输入嘉宾姓名" style="width:100%; margin-bottom: 20px">
        <div style="display: flex; gap: 10px; justify-content: flex-end">
          <button class="btn btn-outline" style="padding: 8px 15px" id="btnCancel">取消</button>
          <button class="btn btn-primary" style="padding: 8px 15px" id="btnSaveSeat">保存</button>
        </div>
      </div>
    </div>

    <script>
      let tables = [];
      let currentSeat = null; // {tableIndex, seatIndex}

      const grid = document.getElementById('seatingGrid');
      const btnAddTable = document.getElementById('btnAddTable');
      const modal = document.getElementById('seatModal');
      const guestInput = document.getElementById('guestName');

      function init() {
        const saved = localStorage.getItem('webutils_seating_data');
        if (saved) {
          tables = JSON.parse(saved);
          render();
        }
      }

      function render() {
        grid.innerHTML = '';
        if (tables.length === 0) {
          grid.innerHTML = '<p style="color:#999; margin: 50px auto">暂无桌子，请在上方添加</p>';
          return;
        }

        tables.forEach((t, tIdx) => {
          const unit = document.createElement('div');
          unit.className = 'table-unit';

          const label = document.createElement('div');
          label.className = 'table-label';
          label.innerText = t.name || `桌子 ${tIdx + 1}`;
          unit.appendChild(label);

          const tableBody = document.createElement('div');
          tableBody.className = t.type === 'round' ? 'round-table' : 'rect-table';
          tableBody.innerText = t.type === 'round' ? '圆桌' : '长桌';
          tableBody.style.color = '#888';
          tableBody.style.fontSize = '12px';

          // 渲染座位
          const count = t.seats.length;
          t.seats.forEach((s, sIdx) => {
            const seat = document.createElement('div');
            seat.className = `seat ${s ? 'occupied' : ''}`;
            seat.innerText = s || (sIdx + 1);
            seat.onclick = () => openModal(tIdx, sIdx);

            if (t.type === 'round') {
              const angle = (360 / count) * sIdx;
              const radius = 95;
              seat.style.left = `calc(50% + ${Math.cos(angle * Math.PI / 180) * radius}px - 22.5px)`;
              seat.style.top = `calc(50% + ${Math.sin(angle * Math.PI / 180) * radius}px - 22.5px)`;
            } else {
              // 长桌排布
              const isTop = sIdx < count / 2;
              const perSide = Math.ceil(count / 2);
              const idxInSide = isTop ? sIdx : sIdx - perSide;
              const offset = (idxInSide - (perSide - 1) / 2) * 55;
              seat.style.left = `calc(50% + ${offset}px - 22.5px)`;
              seat.style.top = isTop ? '-55px' : '90px';
            }
            unit.appendChild(seat);
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-del-table';
          delBtn.innerText = '×';
          delBtn.onclick = () => removeTable(tIdx);
          unit.appendChild(delBtn);

          unit.appendChild(tableBody);
          grid.appendChild(unit);
        });
      }

      function addTable() {
        const name = document.getElementById('tableName').value;
        const type = document.getElementById('tableType').value;
        const num = parseInt(document.getElementById('seatNum').value) || 8;

        tables.push({
          name: name,
          type: type,
          seats: new Array(num).fill('')
        });

        document.getElementById('tableName').value = '';
        render();
        save();
      }

      function removeTable(idx) {
        if (confirm('确定删除这张桌子吗？')) {
          tables.splice(idx, 1);
          render();
          save();
        }
      }

      function openModal(tIdx, sIdx) {
        currentSeat = { tIdx, sIdx };
        guestInput.value = tables[tIdx].seats[sIdx];
        modal.style.display = 'flex';
        guestInput.focus();
      }

      function saveSeat() {
        if (currentSeat) {
          tables[currentSeat.tIdx].seats[currentSeat.sIdx] = guestInput.value.trim();
          render();
          save();
        }
        closeModal();
      }

      function closeModal() {
        modal.style.display = 'none';
        currentSeat = null;
      }

      function save() {
        localStorage.setItem('webutils_seating_data', JSON.stringify(tables));
      }

      btnAddTable.onclick = addTable;
      document.getElementById('btnSaveSeat').onclick = saveSeat;
      document.getElementById('btnCancel').onclick = closeModal;
      document.getElementById('btnClear').onclick = () => {
        if(confirm('确定清空所有桌子和人员吗？')) {
          tables = [];
          render();
          save();
        }
      };

      init();
    </script>
