    <script>
      const startDateEl = document.getElementById("startDate");
      const endDateEl = document.getElementById("endDate");
      const excludeWeekendsEl = document.getElementById("excludeWeekends");
      const holidayListEl = document.getElementById("holidayList");
      const addHolidayDateEl = document.getElementById("addHolidayDate");
      const btnAddHoliday = document.getElementById("btnAddHoliday");
      const btnCalculate = document.getElementById("btnCalculate");
      const resWorkingDaysEl = document.getElementById("resWorkingDays");
      const resTotalDaysEl = document.getElementById("resTotalDays");
      const resOffDaysEl = document.getElementById("resOffDays");
      const holidayTipsEl = document.getElementById("holidayTips");

      let customHolidays = [];

      function renderHolidays() {
        holidayListEl.innerHTML = "";
        customHolidays.sort().forEach(date => {
          const tag = document.createElement("div");
          tag.className = "holiday-tag";
          tag.innerHTML = `${date} <span class="remove" onclick="removeHoliday('${date}')">×</span>`;
          holidayListEl.appendChild(tag);
        });
        localStorage.setItem("leave_calc_holidays", JSON.stringify(customHolidays));
      }

      window.removeHoliday = (date) => {
        customHolidays = customHolidays.filter(d => d !== date);
        renderHolidays();
        calculate();
      };

      btnAddHoliday.onclick = () => {
        const d = addHolidayDateEl.value;
        if (d && !customHolidays.includes(d)) {
          customHolidays.push(d);
          renderHolidays();
          calculate();
        }
      };

      document.getElementById("btnQuickLoad").onclick = () => {
        const h2024 = [
          "2024-01-01", "2024-02-10", "2024-02-11", "2024-02-12", "2024-02-13", "2024-02-14", "2024-02-15", "2024-02-16", "2024-02-17",
          "2024-04-04", "2024-04-05", "2024-04-06", "2024-05-01", "2024-05-02", "2024-05-03", "2024-05-04", "2024-05-05",
          "2024-06-10", "2024-09-15", "2024-09-16", "2024-09-17", "2024-10-01", "2024-10-02", "2024-10-03", "2024-10-04", "2024-10-05", "2024-10-06", "2024-10-07"
        ];
        customHolidays = Array.from(new Set([...customHolidays, ...h2024]));
        renderHolidays();
        calculate();
      };

      function calculate() {
        const start = startDateEl.value;
        const end = endDateEl.value;
        if (!start || !end) return;

        const d1 = new Date(start);
        const d2 = new Date(end);
        if (d1 > d2) {
          resWorkingDaysEl.textContent = "Error";
          return;
        }

        let total = 0;
        let working = 0;
        let off = 0;

        let curr = new Date(d1);
        while (curr <= d2) {
          total++;
          const dateStr = curr.toISOString().split('T')[0];
          const isWeekend = (curr.getDay() === 0 || curr.getDay() === 6);
          const isHoliday = customHolidays.includes(dateStr);

          let isOff = false;
          if (excludeWeekendsEl.checked && isWeekend) isOff = true;
          if (isHoliday) isOff = true;

          if (isOff) off++;
          else working++;

          curr.setDate(curr.getDate() + 1);
        }

        resWorkingDaysEl.textContent = working;
        resTotalDaysEl.textContent = total;
        resOffDaysEl.textContent = off;

        // Tips logic (simplified)
        if (working > 0 && working <= 3) {
          holidayTipsEl.textContent = "短假宜放松。建议结合周边短途游，或者在家深度休整。";
        } else if (working > 3 && working < 6) {
          holidayTipsEl.textContent = "黄金拼假期！如果能在前后多请1-2天，可以凑成一周的长假。";
        } else if (working >= 7) {
          holidayTipsEl.textContent = "超长假期模式！记得提前交接工作，并开启邮箱自动回复。";
        }
      }

      btnCalculate.onclick = calculate;
      [startDateEl, endDateEl, excludeWeekendsEl].forEach(el => el.onchange = calculate);

      window.onload = () => {
        const saved = localStorage.getItem("leave_calc_holidays");
        if (saved) {
          customHolidays = JSON.parse(saved);
          renderHolidays();
        }

        const today = new Date().toISOString().split('T')[0];
        startDateEl.value = today;
        const nextWeek = new Date();
        nextWeek.setDate(nextWeek.getDate() + 3);
        endDateEl.value = nextWeek.toISOString().split('T')[0];
        calculate();
      };
    </script>
