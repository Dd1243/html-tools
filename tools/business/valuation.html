    <script>
        const industryMultiples = {
            tech: { pe: 35, ps: 6, ev: 18, pb: 5 },
            manufacturing: { pe: 15, ps: 1.5, ev: 8, pb: 2 },
            retail: { pe: 20, ps: 1.2, ev: 10, pb: 3 },
            service: { pe: 25, ps: 3.5, ev: 12, pb: 4 },
            finance: { pe: 12, ps: 2.5, ev: 7, pb: 1.5 }
        };

        const stageMultiplier = {
            early: 1.8,
            growth: 1.4,
            mature: 1,
            decline: 0.6
        };

        function formatVal(num) {
            if (num >= 10000) return (num / 10000).toFixed(2) + ' 亿';
            return num.toFixed(0) + ' 万';
        }

        function calculate() {
            const revenue = parseFloat(document.getElementById('revenue').value) || 0;
            const netProfit = parseFloat(document.getElementById('netProfit').value) || 0;
            const ebitda = parseFloat(document.getElementById('ebitda').value) || 0;
            const netAssets = parseFloat(document.getElementById('netAssets').value) || 0;
            const industry = document.getElementById('industry').value;
            const stage = document.getElementById('stage').value;
            const growthRate = (parseFloat(document.getElementById('growthRate').value) || 0) / 100;
            const discountRate = (parseFloat(document.getElementById('growthRate').value) || 0) / 100;

            const base = industryMultiples[industry];
            const multiplier = stageMultiplier[stage];

            // Multiple Based Valuations
            const peVal = netProfit * base.pe * multiplier;
            const psVal = revenue * base.ps * multiplier;
            const evVal = ebitda * base.ev * multiplier;
            const pbVal = netAssets * base.pb * multiplier;

            // Simplified DCF (5 years + Terminal)
            let dcfTotal = 0;
            let currentCF = netProfit;
            for (let i = 1; i <= 5; i++) {
                currentCF *= (1 + growthRate);
                dcfTotal += currentCF / Math.pow(1 + discountRate, i);
            }
            // Terminal Value (assuming 3% terminal growth)
            const terminalGrowth = 0.03;
            if (discountRate > terminalGrowth) {
                const terminalVal = (currentCF * (1 + terminalGrowth)) / (discountRate - terminalGrowth);
                dcfTotal += terminalVal / Math.pow(1 + discountRate, 5);
            }

            // Update UI
            document.getElementById('peVal').textContent = formatVal(peVal);
            document.getElementById('psVal').textContent = formatVal(psVal);
            document.getElementById('evVal').textContent = formatVal(evVal);
            document.getElementById('pbVal').textContent = formatVal(pbVal);
            document.getElementById('dcfVal').textContent = formatVal(dcfTotal);

            const vals = [peVal, psVal, evVal, pbVal, dcfTotal].filter(v => v > 0);
            if (vals.length > 0) {
                const min = Math.min(...vals);
                const max = Math.max(...vals);
                document.getElementById('valuationRange').textContent = `${formatVal(min)} - ${formatVal(max)}`;
            } else {
                document.getElementById('valuationRange').textContent = '数据不足';
            }
        }

        // Event Listeners
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('input', calculate);
        });

        // Initialize
        calculate();

        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        (function() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
