<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>йҳ…иҜ»иҝӣеәҰиҝҪиёӘ - WebUtils</title>
    <meta property="og:title" content="йҳ…иҜ»иҝӣеәҰиҝҪиёӘ - WebUtils" />
    <meta property="og:description" content="йҳ…иҜ»иҝӣеәҰиҝҪиёӘпјҡеңЁзәҝе®һз”Ёе·Ҙе…·пјҢе…Қиҙ№еңЁзәҝдҪҝз”ЁпјҢж— йңҖе®үиЈ…" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://essays4u.net/tools/education/reading-tracker.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="и®°еҪ•йҳ…иҜ»иҝӣеәҰпјҢз®ЎзҗҶд№ҰеҚ•пјҢеҹ№е…»йҳ…иҜ»д№ жғҜ" />
    <meta name="keywords" content="йҳ…иҜ» иҜ»д№Ұ д№ҰзұҚ иҝӣеәҰ book reading tracker progress" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://essays4u.net/tools/education/reading-tracker.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        text-align: center;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.25rem;
      }
      .stat-label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .tab {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        text-align: center;
        transition: all 0.2s;
      }
      .tab:hover {
        border-color: var(--color-accent-cyan);
      }
      .tab.active {
        background: var(--color-accent-purple);
        color: #000;
        border-color: var(--color-accent-purple);
      }
      .add-form {
        display: none;
        margin-bottom: 1.5rem;
        padding: 1.5rem;
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
      }
      .add-form.show {
        display: block;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .form-btns {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 1rem;
      }
      .btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--color-accent-purple);
        color: #000;
        font-weight: 600;
      }
      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }
      .books-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .book-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        transition: all 0.3s;
      }
      .book-card.reading {
        border-color: var(--color-accent-cyan);
      }
      .book-card.finished {
        border-color: var(--accent-green);
        opacity: 0.8;
      }
      .book-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
      }
      .book-info {
        flex: 1;
      }
      .book-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .book-author {
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .book-actions {
        display: flex;
        gap: 0.5rem;
      }
      .action-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        padding: 0.25rem;
      }
      .action-btn:hover {
        transform: scale(1.1);
        color: var(--color-accent-cyan);
      }
      .book-progress {
        margin-bottom: 1rem;
      }
      .progress-bar-container {
        width: 100%;
        height: 8px;
        background: var(--color-bg-surface);
        border-radius: 10px;
        overflow: hidden;
        margin: 0.5rem 0;
        border: 1px solid var(--border-subtle);
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--color-accent-cyan), var(--color-accent-purple));
        transition: width 0.3s;
      }
      .progress-text {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .progress-text span {
        font-family: var(--font-mono);
      }
      .update-progress {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .update-progress input {
        flex: 1;
        padding: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 0.85rem;
      }
      .update-progress button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-blue);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
      }
      .update-progress button:hover {
        transform: translateY(-1px);
      }
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 1rem;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-lg);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .add-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }
      .empty-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.5rem;
      }
      .status-badge.reading {
        background: var(--color-accent-cyan);
        color: #000;
      }
      .status-badge.finished {
        background: var(--accent-green);
        color: #000;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 600px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="еҲҮжҚўдё»йўҳ">рҹҢҷ</button>

      <nav class="breadcrumb">
        <a href="../../index.html">йҰ–йЎө</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">йҳ…иҜ»иҝӣеәҰиҝҪиёӘ</span>
      </nav>

      <h1>рҹ“ҡ йҳ…иҜ»иҝӣеәҰиҝҪиёӘ</h1>
      <p class="subtitle">и®°еҪ•йҳ…иҜ»иҝӣеәҰпјҢе…»жҲҗиҜ»д№Ұд№ жғ?/p>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalBooks">0</div>
          <div class="stat-label">жҖ»д№ҰзұҚж•°</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="readingBooks">0</div>
          <div class="stat-label">жӯЈеңЁйҳ…иҜ»</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="finishedBooks">0</div>
          <div class="stat-label">е·Іе®ҢжҲ?/div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalPages">0</div>
          <div class="stat-label">е·ІиҜ»йЎөж•°</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="filterBooks('all')">е…ЁйғЁд№ҰзұҚ</button>
        <button class="tab" onclick="filterBooks('reading')">жӯЈеңЁйҳ…иҜ»</button>
        <button class="tab" onclick="filterBooks('finished')">е·Іе®ҢжҲ?/button>
      </div>

      <div class="add-form" id="addForm">
        <div class="form-group">
          <label>д№ҰеҗҚ</label>
          <input type="text" id="bookTitle" placeholder="еҰӮпјҡжҙ»зқҖ" />
        </div>
        <div class="form-group">
          <label>дҪңиҖ?/label>
          <input type="text" id="bookAuthor" placeholder="еҰӮпјҡдҪҷеҚҺ" />
        </div>
        <div class="form-group">
          <label>жҖ»йЎөж•?/label>
          <input type="number" id="bookPages" placeholder="300" min="1" />
        </div>
        <div class="form-btns">
          <button class="btn btn-secondary" onclick="hideForm()">еҸ–ж¶Ҳ</button>
          <button class="btn btn-primary" onclick="addBook()">ж·»еҠ </button>
        </div>
      </div>

      <div class="books-list" id="booksList">
        <!-- Books will be rendered here -->
      </div>

      <button class="add-btn" onclick="showForm()">
        <span>+</span>
        ж·»еҠ д№ҰзұҚ
      </button>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let books = JSON.parse(localStorage.getItem("reading_tracker") || "[]");
      let currentFilter = "all";

      function showForm() {
        document.getElementById("addForm").classList.add("show");
        document.getElementById("bookTitle").focus();
      }

      function hideForm() {
        document.getElementById("addForm").classList.remove("show");
        document.getElementById("bookTitle").value = "";
        document.getElementById("bookAuthor").value = "";
        document.getElementById("bookPages").value = "";
      }

      function addBook() {
        const title = document.getElementById("bookTitle").value.trim();
        const author = document.getElementById("bookAuthor").value.trim();
        const totalPages = parseInt(document.getElementById("bookPages").value);

        if (!title || !author || !totalPages) {
          alert("иҜ·еЎ«еҶҷе®Ңж•ҙдҝЎжҒ?);
          return;
        }

        books.push({
          id: Date.now(),
          title,
          author,
          totalPages,
          currentPage: 0,
          status: "reading", // reading, finished
          startDate: new Date().toISOString()
        });

        localStorage.setItem("reading_tracker", JSON.stringify(books));
        hideForm();
        render();
      }

      function updateProgress(id) {
        const book = books.find((b) => b.id === id);
        const input = document.getElementById(`progress-${id}`);
        const newPage = parseInt(input.value);

        if (!newPage || newPage < 0 || newPage > book.totalPages) {
          alert(`иҜ·иҫ“е…?0-${book.totalPages} д№Ӣй—ҙзҡ„йЎөз Ғ`);
          return;
        }

        book.currentPage = newPage;

        if (newPage >= book.totalPages && book.status !== "finished") {
          book.status = "finished";
          book.finishDate = new Date().toISOString();
          alert(`рҹҺү жҒӯе–ңе®ҢжҲҗгҖ?{book.title}гҖӢпјҒ`);
        } else if (newPage < book.totalPages && book.status === "finished") {
          book.status = "reading";
          delete book.finishDate;
        }

        localStorage.setItem("reading_tracker", JSON.stringify(books));
        render();
      }

      function deleteBook(id) {
        const book = books.find((b) => b.id === id);
        if (confirm(`зЎ®е®ҡиҰҒеҲ йҷӨгҖ?{book.title}гҖӢеҗ—пјҹ`)) {
          books = books.filter((b) => b.id !== id);
          localStorage.setItem("reading_tracker", JSON.stringify(books));
          render();
        }
      }

      function filterBooks(filter) {
        currentFilter = filter;
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));
        event.target.classList.add("active");
        render();
      }

      function render() {
        // Update stats
        const reading = books.filter((b) => b.status === "reading").length;
        const finished = books.filter((b) => b.status === "finished").length;
        const totalPagesRead = books.reduce((sum, b) => sum + b.currentPage, 0);

        document.getElementById("totalBooks").textContent = books.length;
        document.getElementById("readingBooks").textContent = reading;
        document.getElementById("finishedBooks").textContent = finished;
        document.getElementById("totalPages").textContent = totalPagesRead;

        // Filter books
        let filteredBooks = books;
        if (currentFilter === "reading") {
          filteredBooks = books.filter((b) => b.status === "reading");
        } else if (currentFilter === "finished") {
          filteredBooks = books.filter((b) => b.status === "finished");
        }

        const list = document.getElementById("booksList");

        if (filteredBooks.length === 0) {
          const emptyText =
            currentFilter === "all"
              ? "иҝҳжІЎжңүж·»еҠ д№Ұзұ?
              : currentFilter === "reading"
                ? "жІЎжңүжӯЈеңЁйҳ…иҜ»зҡ„д№Ұзұ?
                : "иҝҳжІЎжңүе®ҢжҲҗд»»дҪ•д№Ұзұ?;
          list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">рҹ“–</div>
            <div>${emptyText}</div>
            <div style="font-size:.85rem;margin-top:.25rem">зӮ№еҮ»дёӢж–№жҢүй’®ж·»еҠ д№ҰзұҚ</div>
          </div>
        `;
          return;
        }

        list.innerHTML = filteredBooks
          .map((book) => {
            const progress = Math.round((book.currentPage / book.totalPages) * 100);
            const statusText = book.status === "finished" ? "е·Іе®ҢжҲ? : "йҳ…иҜ»дё?;
            const statusClass = book.status === "finished" ? "finished" : "reading";

            return `
          <div class="book-card ${statusClass}">
            <div class="book-header">
              <div class="book-info">
                <div class="book-title">
                  ${book.title}
                  <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="book-author">${book.author} В· ${book.totalPages}йЎ?/div>
              </div>
              <div class="book-actions">
                <button class="action-btn" onclick="deleteBook(${book.id})" title="еҲ йҷӨ">рҹ—‘пё?/button>
              </div>
            </div>
            <div class="book-progress">
              <div class="progress-bar-container">
                <div class="progress-bar" style="width:${progress}%"></div>
              </div>
              <div class="progress-text">
                <span>з¬?${book.currentPage} йЎ?/span>
                <span>${progress}%</span>
              </div>
            </div>
            <div class="update-progress">
              <input type="number" id="progress-${book.id}" placeholder="жӣҙж–°йЎөз Ғ" min="0" max="${book.totalPages}">
              <button onclick="updateProgress(${book.id})">жӣҙж–°</button>
            </div>
          </div>
        `;
          })
          .join("");
      }

      // Initialize
      render();

      // Handle Enter key
      document.getElementById("bookPages").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addBook();
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "вҳҖпё? : "рҹҢҷ";
        }
      })();
    </script>
  </body>
</html>
