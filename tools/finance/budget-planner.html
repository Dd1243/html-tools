    <script>
      const categories = {
        housing: { name: "дҪҸжҲҝ", color: "#ef4444" },
        utilities: { name: "ж°ҙз”ө", color: "#f97316" },
        phone: { name: "йҖҡи®Ҝ", color: "#f59e0b" },
        transport: { name: "дәӨйҖ?, color: "#eab308" },
        insurance: { name: "дҝқйҷ©", color: "#84cc16" },
        food: { name: "йӨҗйҘ®", color: "#22c55e" },
        daily: { name: "ж—Ҙз”Ё", color: "#14b8a6" },
        shopping: { name: "иҙӯзү©", color: "#06b6d4" },
        entertainment: { name: "еЁұд№җ", color: "#3b82f6" },
        health: { name: "еҢ»з–—", color: "#8b5cf6" }
      };

      function calculate() {
        // и®Ўз®—ж”¶е…Ҙ
        const incomes = ["salary", "side", "invest", "other"];
        let totalIncome = 0;
        incomes.forEach((id) => {
          totalIncome += parseFloat(document.getElementById("income_" + id).value) || 0;
        });

        // и®Ўз®—ж”ҜеҮә
        const expenses = {};
        let totalExpense = 0;
        Object.keys(categories).forEach((key) => {
          const value = parseFloat(document.getElementById("expense_" + key).value) || 0;
          expenses[key] = value;
          totalExpense += value;
        });

        // и®Ўз®—еӮЁи“„
        const savings = ["regular", "fund", "education", "emergency"];
        let totalSaving = 0;
        savings.forEach((id) => {
          totalSaving += parseFloat(document.getElementById("saving_" + id).value) || 0;
        });

        const balance = totalIncome - totalExpense - totalSaving;

        const fmt = (n) => "ВҘ" + n.toLocaleString("zh-CN");

        document.getElementById("totalIncome").textContent = fmt(totalIncome);
        document.getElementById("totalExpense").textContent = fmt(totalExpense);

        const balanceEl = document.getElementById("balance");
        balanceEl.textContent = fmt(balance);
        balanceEl.style.color = balance >= 0 ? "var(--accent-cyan)" : "var(--accent-red)";

        // жёІжҹ“ж”ҜеҮәеҚ жҜ”жқ?
        const barContainer = document.getElementById("expenseBar");
        barContainer.textContent = "";

        const legendContainer = document.getElementById("legend");
        legendContainer.textContent = "";

        if (totalIncome > 0) {
          Object.keys(categories).forEach((key) => {
            const percentage = (expenses[key] / totalIncome) * 100;
            if (percentage > 0) {
              const segment = document.createElement("div");
              segment.className = "progress-segment";
              segment.style.width = percentage + "%";
              segment.style.backgroundColor = categories[key].color;
              if (percentage > 5) {
                segment.textContent = Math.round(percentage) + "%";
              }
              barContainer.appendChild(segment);

              const legendItem = document.createElement("div");
              legendItem.className = "legend-item";

              const dot = document.createElement("div");
              dot.className = "legend-dot";
              dot.style.backgroundColor = categories[key].color;

              const text = document.createElement("span");
              text.textContent = categories[key].name + " " + fmt(expenses[key]);

              legendItem.appendChild(dot);
              legendItem.appendChild(text);
              legendContainer.appendChild(legendItem);
            }
          });
        }

        // з”ҹжҲҗе»әи®®
        generateAdvice(totalIncome, totalExpense, totalSaving, balance, expenses);
      }

      function generateAdvice(income, expense, saving, balance, expenses) {
        const container = document.getElementById("advice");
        container.textContent = "";

        const savingRate = income > 0 ? (saving / income) * 100 : 0;
        const expenseRate = income > 0 ? (expense / income) * 100 : 0;
        const housingRate = income > 0 ? (expenses.housing / income) * 100 : 0;

        const advices = [];

        // еӮЁи“„зҺҮе»әи®?
        if (savingRate >= 30) {
          advices.push({
            type: "good",
            title: "еӮЁи“„зҺҮдјҳз§Җ",
            text:
              "жӮЁзҡ„еӮЁи“„зҺҮиҫҫеҲ? +
              savingRate.toFixed(1) +
              "%пјҢиҙўеҠЎзҠ¶еҶөйқһеёёеҒҘеә·пјҒе»әи®®з»§з»ӯдҝқжҢҒпјҢе№¶иҖғиҷ‘еӨҡе…ғеҢ–жҠ•иө„гҖ?
          });
        } else if (savingRate >= 20) {
          advices.push({
            type: "good",
            title: "еӮЁи“„зҺҮиүҜеҘ?,
            text: "жӮЁзҡ„еӮЁи“„зҺҮдёә" + savingRate.toFixed(1) + "%пјҢиҫҫеҲ°дәҶеҹәжң¬зҡ„иҙўеҠЎе®үе…ЁзәҝгҖ?
          });
        } else if (savingRate >= 10) {
          advices.push({
            type: "warn",
            title: "еӮЁи“„зҺҮеҒҸдҪ?,
            text: "жӮЁзҡ„еӮЁи“„зҺҮд»…дё? + savingRate.toFixed(1) + "%пјҢе»әи®®жҸҗй«ҳеҲ°20%д»ҘдёҠд»Ҙеә”еҜ№зӘҒеҸ‘жғ…еҶөгҖ?
          });
        } else {
          advices.push({
            type: "bad",
            title: "еӮЁи“„зҺҮиҝҮдҪ?,
            text:
              "жӮЁзҡ„еӮЁи“„зҺҮеҸӘжң? +
              savingRate.toFixed(1) +
              "%пјҢеӯҳеңЁиҫғеӨ§иҙўеҠЎйЈҺйҷ©пјҢе»әи®®е°Ҫеҝ«и°ғж•ҙж”ҜеҮәз»“жһ„гҖ?
          });
        }

        // дҪҸжҲҝж”ҜеҮәе»әи®®
        if (housingRate > 40) {
          advices.push({
            type: "bad",
            title: "дҪҸжҲҝж”ҜеҮәиҝҮй«ҳ",
            text:
              "дҪҸжҲҝж”ҜеҮәеҚ ж”¶е…Ҙзҡ„" +
              housingRate.toFixed(1) +
              "%пјҢи¶…иҝ?0%зҡ„иӯҰжҲ’зәҝпјҢдјҡдёҘйҮҚеҪұе“Қз”ҹжҙ»иҙЁйҮҸгҖ?
          });
        } else if (housingRate > 30) {
          advices.push({
            type: "warn",
            title: "дҪҸжҲҝеҺӢеҠӣиҫғеӨ§",
            text: "дҪҸжҲҝж”ҜеҮәеҚ ж”¶е…Ҙзҡ„" + housingRate.toFixed(1) + "%пјҢе»әи®®жҺ§еҲ¶еңЁ30%д»ҘеҶ…гҖ?
          });
        }

        // з»“дҪҷе»әи®®
        if (balance < 0) {
          advices.push({
            type: "bad",
            title: "е…ҘдёҚж•·еҮә",
            text:
              "еҪ“еүҚж”ҜеҮәи¶…иҝҮж”¶е…Ҙ" + Math.abs(balance).toLocaleString() + "е…ғпјҢиҜ·з«ӢеҚіи°ғж•ҙж”ҜеҮәи®ЎеҲ’пјҒ"
          });
        }

        advices.forEach((advice) => {
          const div = document.createElement("div");
          div.className = "advice " + advice.type;

          const title = document.createElement("div");
          title.className = "advice-title";
          title.textContent = advice.title;

          const text = document.createElement("div");
          text.className = "advice-text";
          text.textContent = advice.text;

          div.appendChild(title);
          div.appendChild(text);
          container.appendChild(div);
        });
      }

      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
  </body>
</html>
