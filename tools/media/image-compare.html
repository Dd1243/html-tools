    <script>
      let srcA = null,
        srcB = null;
      let mode = "slider";

      const elements = {
        inputA: document.getElementById("inputA"),
        inputB: document.getElementById("inputB"),
        imgA: document.getElementById("imgA"),
        imgB: document.getElementById("imgB"),
        prevA: document.getElementById("prevA"),
        prevB: document.getElementById("prevB"),
        sideA: document.getElementById("sideA"),
        sideB: document.getElementById("sideB"),
        beforeWrap: document.getElementById("beforeWrap"),
        sliderHandle: document.getElementById("sliderHandle"),
        stage: document.getElementById("compareStage"),
        emptyMsg: document.getElementById("emptyMsg"),
        sliderView: document.getElementById("sliderView"),
        sideView: document.getElementById("sideView"),
        btnSwap: document.getElementById("btnSwap"),
        btnDownload: document.getElementById("btnDownload"),
        opacitySlider: document.getElementById("opacitySlider"),
        zoomSlider: document.getElementById("zoomSlider"),
        cardA: document.getElementById("cardA"),
        cardB: document.getElementById("cardB")
      };

      function init() {
        elements.inputA.onchange = (e) => handleFile(e.target.files[0], "A");
        elements.inputB.onchange = (e) => handleFile(e.target.files[0], "B");

        const moveHandler = (e) => {
          if (mode !== "slider") return;
          const rect = elements.stage.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const x = ((clientX - rect.left) / rect.width) * 100;
          updateSlider(x);
        };

        elements.stage.addEventListener("mousemove", moveHandler);
        elements.stage.addEventListener("touchmove", moveHandler);

        elements.opacitySlider.oninput = (e) => {
          const val = e.target.value;
          document.getElementById("opacityVal").innerText = val;
          if (mode === "blend") elements.beforeWrap.style.opacity = val / 100;
        };

        elements.zoomSlider.oninput = (e) => {
          const val = e.target.value;
          document.getElementById("zoomVal").innerText = val;
          elements.sliderView.style.transform = `scale(${val / 100})`;
          elements.sideView.style.transform = `scale(${val / 100})`;
        };

        document.querySelectorAll(".mode-btn").forEach((btn) => {
          btn.onclick = () => setMode(btn.dataset.mode);
        });
      }

      function handleFile(file, type) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          if (type === "A") {
            srcA = e.target.result;
            elements.imgA.src = srcA;
            elements.prevA.src = srcA;
            elements.prevA.style.display = "block";
            elements.sideA.src = srcA;
            elements.cardA.classList.add("has-file");
          } else {
            srcB = e.target.result;
            elements.imgB.src = srcB;
            elements.prevB.src = srcB;
            elements.prevB.style.display = "block";
            elements.sideB.src = srcB;
            elements.cardB.classList.add("has-file");
          }
          checkReady();
        };
        reader.readAsDataURL(file);
      }

      function checkReady() {
        if (srcA && srcB) {
          elements.emptyMsg.style.display = "none";
          elements.btnSwap.disabled = false;
          elements.btnDownload.disabled = false;
          setMode(mode);
        }
      }

      function updateSlider(pct) {
        pct = Math.max(0, Math.min(100, pct));
        elements.beforeWrap.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
        elements.sliderHandle.style.left = `${pct}%`;
      }

      function setMode(newMode) {
        mode = newMode;
        document.querySelectorAll(".mode-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.mode === mode);
        });

        elements.sliderView.style.display =
          mode === "slider" || mode === "blend" ? "block" : "none";
        elements.sideView.style.display = mode === "side" ? "grid" : "none";
        document.getElementById("blendControl").style.display = mode === "blend" ? "block" : "none";

        if (mode === "blend") {
          elements.beforeWrap.style.clipPath = "none";
          elements.beforeWrap.style.opacity = elements.opacitySlider.value / 100;
          elements.sliderHandle.style.display = "none";
        } else {
          elements.beforeWrap.style.opacity = 1;
          elements.sliderHandle.style.display = mode === "slider" ? "block" : "none";
          if (mode === "slider") updateSlider(50);
        }
      }

      function swapImages() {
        [srcA, srcB] = [srcB, srcA];
        elements.imgA.src = srcA;
        elements.imgB.src = srcB;
        elements.prevA.src = srcA;
        elements.prevB.src = srcB;
        elements.sideA.src = srcA;
        elements.sideB.src = srcB;
      }

      function resetAll() {
        srcA = srcB = null;
        elements.imgA.src = elements.imgB.src = "";
        elements.prevA.style.display = elements.prevB.style.display = "none";
        elements.emptyMsg.style.display = "flex";
        elements.btnSwap.disabled = elements.btnDownload.disabled = true;
        elements.cardA.classList.remove("has-file");
        elements.cardB.classList.remove("has-file");
        elements.inputA.value = elements.inputB.value = "";
      }

      function downloadSnapshot() {
        // 简单实现：下载 After 图
        const link = document.createElement("a");
        link.download = `compare-after-${Date.now()}.png`;
        link.href = srcB;
        link.click();
      }

      window.onload = init;
    </script>
