    <script>
      let originalFile = null;
      let originalImg = null;
      let currentBlob = null;

      const fileInput = document.getElementById("fileInput");
      const mainImage = document.getElementById("mainImage");
      const placeholder = document.getElementById("placeholder");
      const targetWidthInput = document.getElementById("targetWidth");
      const targetHeightInput = document.getElementById("targetHeight");
      const lockRatio = document.getElementById("lockRatio");
      const targetFormat = document.getElementById("targetFormat");
      const qualityInput = document.getElementById("quality");
      const qualityVal = document.getElementById("qualityVal");
      const btnDownload = document.getElementById("btnDownload");
      const btnPreview = document.getElementById("btnPreview");
      const statsBar = document.getElementById("statsBar");

      function init() {
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        const dropArea = document.getElementById("dropArea");
        dropArea.ondragover = (e) => {
          e.preventDefault();
          dropArea.style.borderColor = "var(--primary-color)";
        };
        dropArea.ondragleave = () => {
          dropArea.style.borderColor = "var(--border-color)";
        };
        dropArea.ondrop = (e) => {
          e.preventDefault();
          dropArea.style.borderColor = "var(--border-color)";
          handleFile(e.dataTransfer.files[0]);
        };

        qualityInput.oninput = (e) => (qualityVal.innerText = e.target.value);

        targetWidthInput.oninput = () => {
          if (lockRatio.checked && originalImg) {
            targetHeightInput.value = Math.round(
              targetWidthInput.value / (originalImg.width / originalImg.height)
            );
          }
        };

        targetHeightInput.oninput = () => {
          if (lockRatio.checked && originalImg) {
            targetWidthInput.value = Math.round(
              targetHeightInput.value * (originalImg.width / originalImg.height)
            );
          }
        };
      }

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        originalFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            originalImg = img;
            targetWidthInput.value = img.width;
            targetHeightInput.value = img.height;
            mainImage.src = e.target.result;
            mainImage.style.display = "block";
            placeholder.style.display = "none";

            btnDownload.disabled = false;
            btnPreview.disabled = false;

            statsBar.style.display = "flex";
            document.getElementById("origSize").innerText = formatSize(file.size);
            document.getElementById("origDim").innerText = `${img.width}x${img.height}`;
            updatePreview();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function applyPreset(factor) {
        if (!originalImg) return;
        targetWidthInput.value = Math.round(originalImg.width * factor);
        targetHeightInput.value = Math.round(originalImg.height * factor);
        updatePreview();
      }

      function setFixed(w, h) {
        if (!originalImg) return;
        targetWidthInput.value = w;
        if (lockRatio.checked) {
          targetHeightInput.value = Math.round(w / (originalImg.width / originalImg.height));
        } else {
          targetHeightInput.value = h;
        }
        updatePreview();
      }

      async function updatePreview() {
        if (!originalImg) return;
        const w = parseInt(targetWidthInput.value) || originalImg.width;
        const h = parseInt(targetHeightInput.value) || originalImg.height;
        const q = parseInt(qualityInput.value) / 100;
        const format = targetFormat.value;

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(originalImg, 0, 0, w, h);

        canvas.toBlob(
          (blob) => {
            currentBlob = blob;
            mainImage.src = URL.createObjectURL(blob);
            document.getElementById("resSize").innerText = formatSize(blob.size);
            document.getElementById("resDim").innerText = `${w}x${h}`;
            document.getElementById("compRate").innerText =
              ((1 - blob.size / originalFile.size) * 100).toFixed(1) + "%";
          },
          `image/${format}`,
          q
        );
      }

      function processAndDownload() {
        if (!currentBlob) return;
        const format = targetFormat.value;
        const ext = format === "jpeg" ? "jpg" : format;
        const link = document.createElement("a");
        link.href = URL.createObjectURL(currentBlob);
        link.download = `resized-${originalFile.name.split(".")[0]}.${ext}`;
        link.click();
      }

      function resetAll() {
        originalFile = originalImg = currentBlob = null;
        mainImage.src = "";
        mainImage.style.display = "none";
        placeholder.style.display = "block";
        statsBar.style.display = "none";
        btnDownload.disabled = btnPreview.disabled = true;
        targetWidthInput.value = targetHeightInput.value = "";
        fileInput.value = "";
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      window.onload = init;
    </script>
