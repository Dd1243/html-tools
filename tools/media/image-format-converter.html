    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const targetFormat = document.getElementById("targetFormat");
      const quality = document.getElementById("quality");
      const qualityVal = document.getElementById("qualityVal");
      const btnConvert = document.getElementById("btnConvert");
      const resultSection = document.getElementById("resultSection");
      const resultGrid = document.getElementById("resultGrid");
      const statusMsg = document.getElementById("statusMsg");

      let filesList = [];
      let convertedItems = [];

      function init() {
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => addFiles(e.target.files);

        const dragHandler = (e) => {
          e.preventDefault();
          if (e.type === "dragover") dropZone.classList.add("dragover");
          else dropZone.classList.remove("dragover");
        };

        dropZone.ondragover = dragHandler;
        dropZone.ondragleave = dragHandler;
        dropZone.ondrop = (e) => {
          dragHandler(e);
          addFiles(e.dataTransfer.files);
        };

        quality.oninput = (e) => (qualityVal.innerText = e.target.value);
      }

      function addFiles(incoming) {
        const validFiles = Array.from(incoming).filter((f) => f.type.startsWith("image/"));
        filesList = [...filesList, ...validFiles];
        if (filesList.length > 0) {
          btnConvert.disabled = false;
          statusMsg.innerText = `已就绪: ${filesList.length} 张图片`;
        }
      }

      async function processAll() {
        btnConvert.disabled = true;
        btnConvert.innerText = "转换中...";
        resultGrid.innerHTML = "";
        convertedItems = [];

        const format = targetFormat.value;
        const q = parseInt(quality.value) / 100;
        const maxW = parseInt(document.getElementById("maxWidth").value) || 0;
        const maxH = parseInt(document.getElementById("maxHeight").value) || 0;

        for (const file of filesList) {
          try {
            const result = await convertSingle(file, format, q, maxW, maxH);
            convertedItems.push(result);
            renderResult(result);
          } catch (err) {
            console.error(err);
          }
        }

        resultSection.style.display = "block";
        document.getElementById("fileCount").innerText = convertedItems.length;
        btnConvert.disabled = false;
        btnConvert.innerText = "🚀 开始转换";
        statusMsg.innerText = "✅ 批量转换完成！";
      }

      function convertSingle(file, format, q, maxW, maxH) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              let w = img.width,
                h = img.height;
              if (maxW > 0 || maxH > 0) {
                const ratio = Math.min(maxW > 0 ? maxW / w : 1, maxH > 0 ? maxH / h : 1, 1);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
              }

              const canvas = document.createElement("canvas");
              canvas.width = w;
              canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, w, h);

              canvas.toBlob(
                (blob) => {
                  resolve({
                    name: file.name.split(".")[0] + "." + (format === "jpeg" ? "jpg" : format),
                    oldSize: file.size,
                    newSize: blob.size,
                    url: URL.createObjectURL(blob),
                    blob: blob,
                    format: format.toUpperCase()
                  });
                },
                `image/${format}`,
                q
              );
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function renderResult(item) {
        const div = document.createElement("div");
        div.className = "result-card";
        const savings = (((item.oldSize - item.newSize) / item.oldSize) * 100).toFixed(1);
        div.innerHTML = `
        <div class="result-tag">${item.format}</div>
        <img class="result-preview" src="${item.url}">
        <div class="result-info">
          <p><b>${item.name}</b></p>
          <p>${formatKB(item.oldSize)} → <b>${formatKB(item.newSize)}</b></p>
          <p style="color:${savings > 0 ? "#27ae60" : "#e74c3c"}">${savings > 0 ? "减少" : "增加"} ${Math.abs(savings)}%</p>
        </div>
        <button class="btn btn-outline" style="width:100%; margin-top:10px; padding:4px;" onclick="downloadSingle('${item.url}', '${item.name}')">下载</button>
      `;
        resultGrid.appendChild(div);
      }

      function formatKB(bytes) {
        return (bytes / 1024).toFixed(1) + " KB";
      }

      function downloadSingle(url, name) {
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();
      }

      async function downloadZip() {
        const zip = new JSZip();
        convertedItems.forEach((item) => zip.file(item.name, item.blob));
        const content = await zip.generateAsync({ type: "blob" });
        downloadSingle(URL.createObjectURL(content), `batch-export-${Date.now()}.zip`);
      }

      function resetAll() {
        filesList = [];
        convertedItems = [];
        resultGrid.innerHTML = "";
        resultSection.style.display = "none";
        statusMsg.innerText = "";
        btnConvert.disabled = true;
        fileInput.value = "";
      }

      window.onload = init;
    </script>
