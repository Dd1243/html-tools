        еҮ дҪ•з¬ҰеҸ·: [
          { char: "вҲ?, name: "и§?, latex: "\\angle", html: "&ang;" },
          { char: "вҲ?, name: "зӣҙи§’", latex: "\\perp", html: "&angrt;" },
          { char: "вҠ?, name: "еһӮзӣҙ", latex: "\\perp", html: "&perp;" },
          { char: "вҲ?, name: "е№іиЎҢ", latex: "\\parallel", html: "&par;" },
          { char: "вү?, name: "е…Ёзӯү", latex: "\\cong", html: "&cong;" },
          { char: "вҲ?, name: "зӣёдјј", latex: "\\sim", html: "&sim;" },
          { char: "в–?, name: "дёүи§’еҪ?, latex: "\\triangle", html: "&triangle;" },
          { char: "в–?, name: "жӯЈж–№еҪ?, latex: "\\square", html: "&square;" },
          { char: "в—?, name: "ең?, latex: "\\circ", html: "&cir;" },
          { char: "вҠ?, name: "еңҶеҝғ", latex: "\\odot", html: "&odot;" },
          { char: "В°", name: "еә?, latex: "^{\\circ}", html: "&deg;" },
          { char: "вҖ?, name: "еҲ?, latex: "'", html: "&prime;" },
          { char: "вҖ?, name: "з§?, latex: "''", html: "&Prime;" }
        ],
        дёҠдёӢж ? [
          { char: "вҒ?, name: "дёҠж Ү0", latex: "^0", html: "&sup0;" },
          { char: "В№", name: "дёҠж Ү1", latex: "^1", html: "&sup1;" },
          { char: "ВІ", name: "дёҠж Ү2", latex: "^2", html: "&sup2;" },
          { char: "Ві", name: "дёҠж Ү3", latex: "^3", html: "&sup3;" },
          { char: "вҒ?, name: "дёҠж Ү4", latex: "^4", html: "" },
          { char: "вҒ?, name: "дёҠж Ү5", latex: "^5", html: "" },
          { char: "вҒ?, name: "дёҠж Ү6", latex: "^6", html: "" },
          { char: "вҒ?, name: "дёҠж Ү7", latex: "^7", html: "" },
          { char: "вҒ?, name: "дёҠж Ү8", latex: "^8", html: "" },
          { char: "вҒ?, name: "дёҠж Ү9", latex: "^9", html: "" },
          { char: "вӮҖ", name: "дёӢж Ү0", latex: "_0", html: "" },
          { char: "вӮ?, name: "дёӢж Ү1", latex: "_1", html: "" },
          { char: "вӮ?, name: "дёӢж Ү2", latex: "_2", html: "" },
          { char: "вӮ?, name: "дёӢж Ү3", latex: "_3", html: "" },
          { char: "вӮ?, name: "дёӢж Ү4", latex: "_4", html: "" },
          { char: "вӮ?, name: "дёӢж Ү5", latex: "_5", html: "" },
          { char: "вӮ?, name: "дёӢж Ү6", latex: "_6", html: "" },
          { char: "вӮ?, name: "дёӢж Ү7", latex: "_7", html: "" },
          { char: "вӮ?, name: "дёӢж Ү8", latex: "_8", html: "" },
          { char: "вӮ?, name: "дёӢж Ү9", latex: "_9", html: "" }
        ]
      };

      let currentCategory = "all";
      let searchQuery = "";

      function init() {
        renderCategoryTabs();
        renderSymbols();

        const savedTheme = localStorage.getItem("math-symbols-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      }

      function renderCategoryTabs() {
        const container = document.getElementById("categoryTabs");
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        const allTab = document.createElement("button");
        allTab.className = "category-tab" + (currentCategory === "all" ? " active" : "");
        allTab.textContent = "е…ЁйғЁ";
        allTab.onclick = function () {
          selectCategory("all");
        };
        container.appendChild(allTab);

        Object.keys(mathSymbols).forEach(function (category) {
          const tab = document.createElement("button");
          tab.className = "category-tab" + (currentCategory === category ? " active" : "");
          tab.textContent = category;
          tab.onclick = function () {
            selectCategory(category);
          };
          container.appendChild(tab);
        });
      }

      function selectCategory(category) {
        currentCategory = category;
        renderCategoryTabs();
        renderSymbols();
      }

      function renderSymbols() {
        const content = document.getElementById("symbolContent");
        const stats = document.getElementById("stats");

        while (content.firstChild) {
          content.removeChild(content.firstChild);
        }

        let totalCount = 0;
        const categories = currentCategory === "all" ? Object.keys(mathSymbols) : [currentCategory];

        categories.forEach(function (categoryName) {
          if (!mathSymbols[categoryName]) return;

          let items = mathSymbols[categoryName];

          if (searchQuery) {
            const query = searchQuery.toLowerCase();
            items = items.filter(function (item) {
              return (
                item.name.toLowerCase().includes(query) ||
                item.latex.toLowerCase().includes(query) ||
                item.char.includes(query)
              );
            });
          }

          if (items.length === 0) return;

          if (currentCategory === "all") {
            const title = document.createElement("h3");
            title.className = "section-title";
            title.textContent = categoryName;
            content.appendChild(title);
          }

          const table = document.createElement("table");
          table.className = "symbol-table";

          const thead = document.createElement("thead");
          const headerRow = document.createElement("tr");
          ["з¬ҰеҸ·", "еҗҚз§°", "LaTeX", "HTML"].forEach(function (text) {
            const th = document.createElement("th");
            th.textContent = text;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);

          const tbody = document.createElement("tbody");

          items.forEach(function (item) {
            const row = document.createElement("tr");

            const charCell = document.createElement("td");
            charCell.className = "symbol-char";
            charCell.textContent = item.char;
            charCell.title = "зӮ№еҮ»еӨҚеҲ¶з¬ҰеҸ·";
            charCell.onclick = function () {
              copyText(item.char, "з¬ҰеҸ·");
            };

            const nameCell = document.createElement("td");
            nameCell.textContent = item.name;

            const latexCell = document.createElement("td");
            const latexSpan = document.createElement("span");
            latexSpan.className = "symbol-latex";
            latexSpan.textContent = item.latex;
            latexSpan.title = "зӮ№еҮ»еӨҚеҲ¶LaTeX";
            latexSpan.onclick = function () {
              copyText(item.latex, "LaTeX");
            };
            latexCell.appendChild(latexSpan);

            const htmlCell = document.createElement("td");
            htmlCell.className = "symbol-html";
            htmlCell.textContent = item.html || "-";

            row.appendChild(charCell);
            row.appendChild(nameCell);
            row.appendChild(latexCell);
            row.appendChild(htmlCell);
            tbody.appendChild(row);
            totalCount++;
          });

          table.appendChild(tbody);
          content.appendChild(table);
        });

        if (totalCount === 0) {
          const noResults = document.createElement("div");
          noResults.className = "no-results";
          noResults.textContent = "жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„з¬ҰеҸ?;
          content.appendChild(noResults);
        }

        stats.textContent = "е…?" + totalCount + " дёӘз¬ҰеҸ?;
      }

      window.filterSymbols = function () {
        searchQuery = document.getElementById("searchInput").value;
        renderSymbols();
      };

      window.copyText = function (text, type) {
        navigator.clipboard.writeText(text).then(function () {
          showToast("е·ІеӨҚеҲ? + type + ": " + text);
        });
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("math-symbols-theme", newTheme);
      };

      init();
    </script>
  </body>
</html>
