    <script>
      const gitCommands = [
        {

          desc: "еЬ®ељУеЙНзЫЃељХеИЭеІЛеМЦдЄАдЄ™жЦ∞зЪДGitдїУеЇУ"
        },
        { cat: "еЯЇз°А", name: "еЕЛйЪЖдїУеЇУ", cmd: "git clone <url>", desc: "еЕЛйЪЖињЬз®ЛдїУеЇУеИ∞жЬђеЬ? },
        { cat: "еЯЇз°А", name: "жЯ•зЬЛзКґжА?, cmd: "git status", desc: "жЯ•зЬЛеЈ•дљЬеМЇеТМжЪВе≠ШеМЇзКґжА? },
        {
          cat: "еЯЇз°А",
          name: "жЈїеК†жЦЗдїґ",
          cmd: "git add <file>",
          desc: "е∞ЖжЦЗдїґжЈїеК†еИ∞жЪВе≠ШеМЇпЉМдљњзФ® . жЈїеК†жЙАжЬ?
        },
        { cat: "еЯЇз°А", name: "жПРдЇ§жЫіжФє", cmd: 'git commit -m "message"', desc: "жПРдЇ§жЪВе≠ШеМЇзЪДжЫіжФє" },
        { cat: "еИЖжФѓ", name: "жЯ•зЬЛеИЖжФѓ", cmd: "git branch", desc: "еИЧеЗЇжЙАжЬЙжЬђеЬ∞еИЖжФ? },
        { cat: "еИЖжФѓ", name: "еИЫеїЇеИЖжФѓ", cmd: "git branch <name>", desc: "еИЫеїЇжЦ∞еИЖжФ? },
        { cat: "еИЖжФѓ", name: "еИЗжНҐеИЖжФѓ", cmd: "git checkout <branch>", desc: "еИЗжНҐеИ∞жМЗеЃЪеИЖжФ? },
        {
          cat: "еИЖжФѓ",
          name: "еИЫеїЇеєґеИЗжН?,
          cmd: "git checkout -b <branch>",
          desc: "еИЫеїЇжЦ∞еИЖжФѓеєґеИЗжНҐ"
        },
        {
          cat: "еИЖжФѓ",
          name: "еРИеєґеИЖжФѓ",
          cmd: "git merge <branch>",
          desc: "е∞ЖжМЗеЃЪеИЖжФѓеРИеєґеИ∞ељУеЙНеИЖжФѓ"
        },
        { cat: "еИЖжФѓ", name: "еИ†йЩ§еИЖжФѓ", cmd: "git branch -d <branch>", desc: "еИ†йЩ§жЬђеЬ∞еИЖжФѓ" },
        { cat: "ињЬз®Л", name: "жЈїеК†ињЬз®Л", cmd: "git remote add origin <url>", desc: "жЈїеК†ињЬз®ЛдїУеЇУ" },
        { cat: "ињЬз®Л", name: "жО®йА?, cmd: "git push origin <branch>", desc: "жО®йАБеИ∞ињЬз®ЛдїУеЇУ" },
        { cat: "ињЬз®Л", name: "жЛЙеПЦ", cmd: "git pull origin <branch>", desc: "дїОињЬз®ЛжЛЙеПЦеєґеРИеєґ" },
        { cat: "ињЬз®Л", name: "иОЈеПЦ", cmd: "git fetch", desc: "дїОињЬз®ЛиОЈеПЦдљЖдЄНеРИеє? },
        { cat: "еОЖеП≤", name: "жЯ•зЬЛжЧ•ењЧ", cmd: "git log --oneline", desc: "жЯ•зЬЛзЃАжіБзЪДжПРдЇ§еОЖеП≤" },
        { cat: "еОЖеП≤", name: "жЯ•зЬЛеЈЃеЉВ", cmd: "git diff", desc: "жЯ•зЬЛжЬ™жЪВе≠ШзЪДжЫіжФє" },
        { cat: "еОЖеП≤", name: "еЫЮйААзЙИжЬђ", cmd: "git reset --hard HEAD~1", desc: "еЫЮйААеИ∞дЄКдЄАдЄ™зЙИжЬ? },
        { cat: "жТ§йФА", name: "жТ§йФАжЪВе≠Ш", cmd: "git reset HEAD <file>", desc: "е∞ЖжЦЗдїґдїОжЪВе≠ШеМЇжТ§йФА" },
        { cat: "жТ§йФА", name: "жТ§йФАдњЃжФє", cmd: "git checkout -- <file>", desc: "жТ§йФАеЈ•дљЬеМЇзЪДдњЃжФє" },
        { cat: "жТ§йФА", name: "дњЃжФєжПРдЇ§", cmd: "git commit --amend", desc: "дњЃжФєжЬАеРОдЄАжђ°жПРдЇ? },
        { cat: "ж†Зз≠Њ", name: "еИЫеїЇж†Зз≠Њ", cmd: "git tag v1.0.0", desc: "еИЫеїЇиљїйЗПж†Зз≠Њ" },
        {
          cat: "ж†Зз≠Њ",
          name: "жО®йАБж†Зз≠?,
          cmd: "git push origin --tags",
          desc: "жО®йАБжЙАжЬЙж†Зз≠ЊеИ∞ињЬз®Л"
        },
        { cat: "еВ®иЧП", name: "еВ®иЧПжЫіжФє", cmd: "git stash", desc: "дЄіжЧґеВ®иЧПељУеЙНжЫіжФє" },
        { cat: "еВ®иЧП", name: "жБҐе§НеВ®иЧП", cmd: "git stash pop", desc: "жБҐе§НжЬАињСеВ®иЧПзЪДжЫіжФє" }
      ];
      const categories = [...new Set(gitCommands.map((c) => c.cat))];
      let activeCategory = "еЕ®йГ®";
      function render(filter = "") {
        const filtered = gitCommands.filter(
          (c) =>
            (activeCategory === "еЕ®йГ®" || c.cat === activeCategory) &&
            (!filter ||
              c.name.includes(filter) ||
              c.cmd.includes(filter) ||
              c.desc.includes(filter))
        );
        document.getElementById("commands").innerHTML =
          filtered
            .map(
              (c) => `
                <div class="cmd-item">
                    <div class="cmd-header"><span class="cmd-name">${c.name}</span><span class="cmd-tag">${c.cat}</span></div>
                    <div class="cmd-code"><code>${c.cmd}</code><button class="cmd-copy" onclick="copy('${c.cmd.replace(/'/g, "\\'")}')">рЯУЛ</button></div>
                    <div class="cmd-desc">${c.desc}</div>
                </div>
            `
            )
            .join("") ||
          '<p style="padding:20px;text-align:center;color:#999">жЬ™жЙЊеИ∞еМєйЕНзЪДеСљдї§</p>';
      }
      function renderCategories() {
        document.getElementById("categories").innerHTML = ["еЕ®йГ®", ...categories]
          .map(
            (c) =>
              `<button class="cat-btn ${c === activeCategory ? "active" : ""}" onclick="setCategory('${c}')">${c}</button>`
          )
          .join("");
      }
      function setCategory(cat) {
        activeCategory = cat;
        renderCategories();
        render(document.getElementById("search").value);
      }
      function copy(text) {
        navigator.clipboard.writeText(text);
      }
      document.getElementById("search").addEventListener("input", (e) => render(e.target.value));
      renderCategories();
      render();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вШАпЄ? : "рЯМЩ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вШАпЄ?;
      }
    </script>
