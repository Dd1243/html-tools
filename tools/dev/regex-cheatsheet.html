    <script>
      const COMMON_PATTERNS = [
        { name: "йӮ®з®ұ", pattern: "^[\\w.-]+@[\\w.-]+\\.\\w+$" },
        { name: "жүӢжңәеҸ?дёӯеӣҪ)", pattern: "^1[3-9]\\d{9}$" },

            "^(?:(?:25[0-5]|2[0-4]\\d|[01]?\\d\\d?)\\.){3}(?:25[0-5]|2[0-4]\\d|[01]?\\d\\d?)$"
        },
        {
          name: "ж—Ҙжңҹ(YYYY-MM-DD)",
          pattern: "^\\d{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\\d|3[01])$"

        { name: "ж—¶й—ҙ(HH:mm:ss)", pattern: "^(?:[01]\\d|2[0-3]):[0-5]\\d:[0-5]\\d$" },
        { name: "еҚҒе…ӯиҝӣеҲ¶йўңиүІ", pattern: "^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$" },
        { name: "иә«д»ҪиҜҒеҸ·", pattern: "^\\d{17}[\\dXx]$" },
        { name: "дёӯж–Үеӯ—з¬Ұ", pattern: "[\\u4e00-\\u9fa5]" },
        { name: "еҜҶз ҒејәеәҰ", pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d).{8,}$" },

      const REGEX_SYNTAX = {
        еӯ—з¬ҰеҢ№й…Қ: [

          { syntax: "\\d", desc: "еҢ№й…Қж•°еӯ— [0-9]", example: "\\d\\d вҶ?12, 99" },
          { syntax: "\\D", desc: "еҢ№й…Қйқһж•°еӯ?, example: "\\D вҶ?a, @, з©әж ј" },
          { syntax: "\\w", desc: "еҢ№й…ҚеҚ•иҜҚеӯ—з¬Ұ [a-zA-Z0-9_]", example: "\\w+ вҶ?hello, test_1" },
          { syntax: "\\W", desc: "еҢ№й…ҚйқһеҚ•иҜҚеӯ—з¬?, example: "\\W вҶ?@, #, з©әж ј" },
          { syntax: "\\s", desc: "еҢ№й…Қз©әзҷҪеӯ—з¬Ұ", example: "a\\sb вҶ?a b, a\\tb" },
          { syntax: "\\S", desc: "еҢ№й…Қйқһз©әзҷҪеӯ—з¬?, example: "\\S+ вҶ?hello" },
          { syntax: "[abc]", desc: "еҢ№й…Қеӯ—з¬ҰйӣҶдёӯзҡ„д»»дёҖеӯ—з¬Ұ", example: "[aeiou] вҶ?еҢ№й…Қе…ғйҹі" },
          { syntax: "[^abc]", desc: "еҢ№й…ҚдёҚеңЁеӯ—з¬ҰйӣҶдёӯзҡ„еӯ—з¬?, example: "[^0-9] вҶ?еҢ№й…Қйқһж•°еӯ? },
          { syntax: "[a-z]", desc: "еҢ№й…ҚиҢғеӣҙеҶ…зҡ„еӯ—з¬Ұ", example: "[a-zA-Z] вҶ?еҢ№й…Қеӯ—жҜҚ" }
        ],
        йҮҸиҜҚ: [
          { syntax: "*", desc: "еҢ№й…Қ 0 ж¬ЎжҲ–еӨҡж¬Ў", example: "ab*c вҶ?ac, abc, abbc" },
          { syntax: "+", desc: "еҢ№й…Қ 1 ж¬ЎжҲ–еӨҡж¬Ў", example: "ab+c вҶ?abc, abbc" },
          { syntax: "?", desc: "еҢ№й…Қ 0 ж¬ЎжҲ– 1 ж¬?, example: "colou?r вҶ?color, colour" },
          { syntax: "{n}", desc: "зІҫзЎ®еҢ№й…Қ n ж¬?, example: "a{3} вҶ?aaa" },
          { syntax: "{n,}", desc: "еҢ№й…ҚиҮіе°‘ n ж¬?, example: "a{2,} вҶ?aa, aaa, aaaa" },
          { syntax: "{n,m}", desc: "еҢ№й…Қ n еҲ?m ж¬?, example: "a{2,4} вҶ?aa, aaa, aaaa" },
          { syntax: "*?", desc: "йқһиҙӘе©ӘеҢ№й…ҚпјҲжңҖе°‘пјү", example: "<.*?> вҶ?<tag>" },
          { syntax: "+?", desc: "йқһиҙӘе©ӘеҢ№й…?1 ж¬ЎжҲ–еӨҡж¬Ў", example: "\\d+? вҶ?еҢ№й…ҚеҚ•дёӘж•°еӯ—" }
        ],
        й”ҡзӮ№: [
          { syntax: "^", desc: "еҢ№й…Қеӯ—з¬ҰдёІејҖеӨ?, example: "^hello вҶ?ејҖеӨҙзҡ„hello" },
          { syntax: "$", desc: "еҢ№й…Қеӯ—з¬ҰдёІз»“е°?, example: "world$ вҶ?з»“е°ҫзҡ„world" },
          { syntax: "\\b", desc: "еҢ№й…ҚеҚ•иҜҚиҫ№з•Ң", example: "\\bcat\\b вҶ?catпјҲж•ҙиҜҚпјү" },
          { syntax: "\\B", desc: "еҢ№й…ҚйқһеҚ•иҜҚиҫ№з•?, example: "\\Bcat вҶ?categoryдёӯзҡ„cat" },
          { syntax: "(?=...)", desc: "жӯЈеҗ‘е…ҲиЎҢж–ӯиЁҖ", example: "\\d+(?=px) вҶ?100pxдёӯзҡ„100" },
          { syntax: "(?!...)", desc: "иҙҹеҗ‘е…ҲиЎҢж–ӯиЁҖ", example: "\\d+(?!px) вҶ?100emдёӯзҡ„100" },
          { syntax: "(?<=...)", desc: "жӯЈеҗ‘еҗҺиЎҢж–ӯиЁҖ", example: "(?<=\\$)\\d+ вҶ?$100дёӯзҡ„100" },
          { syntax: "(?<!...)", desc: "иҙҹеҗ‘еҗҺиЎҢж–ӯиЁҖ", example: "(?<!\\$)\\d+ вҶ?йқ?ејҖеӨҙзҡ„ж•°еӯ—" }
        ],
        еҲҶз»„дёҺеј•з”? [
          { syntax: "(abc)", desc: "жҚ•иҺ·еҲҶз»„", example: "(\\d+)-(\\d+) вҶ?жҚ•иҺ·дёӨдёӘж•°еӯ—" },
          { syntax: "(?:abc)", desc: "йқһжҚ•иҺ·еҲҶз»?, example: "(?:ab)+ вҶ?дёҚжҚ•иҺ? },
          { syntax: "(?<name>...)", desc: "е‘ҪеҗҚжҚ•иҺ·еҲҶз»„", example: "(?<year>\\d{4})" },
          { syntax: "\\1, \\2", desc: "еҸҚеҗ‘еј•з”Ё", example: "(\\w+)\\s\\1 вҶ?hello hello" },
          { syntax: "a|b", desc: "жҲ–иҝҗз®?, example: "cat|dog вҶ?cat жҲ?dog" }
        ],
        дҝ®йҘ°з¬? [
          { syntax: "i", desc: "еҝҪз•ҘеӨ§е°ҸеҶ?, example: "/hello/i вҶ?Hello, HELLO" },
          { syntax: "g", desc: "е…ЁеұҖеҢ№й…Қ", example: "/\\d/g вҶ?еҢ№й…ҚжүҖжңүж•°еӯ? },
          { syntax: "m", desc: "еӨҡиЎҢжЁЎејҸ", example: "/^hello/m вҶ?жҜҸиЎҢејҖеӨ? },
          { syntax: "s", desc: "еҚ•иЎҢжЁЎејҸпј?еҢ№й…ҚжҚўиЎҢпј?, example: "/a.b/s вҶ?a\\nb" },
          { syntax: "u", desc: "Unicode жЁЎејҸ", example: "/\\u{1F600}/u вҶ?рҹҳҖ" }
        ],
        зү№ж®Ҡеӯ—з¬Ұ: [
          { syntax: "\\n", desc: "жҚўиЎҢз¬?, example: "line1\\nline2" },
          { syntax: "\\r", desc: "еӣһиҪҰз¬?, example: "Windows жҚўиЎҢ: \\r\\n" },
          { syntax: "\\t", desc: "еҲ¶иЎЁз¬?, example: "col1\\tcol2" },
          { syntax: "\\0", desc: "з©әеӯ—з¬?, example: "еӯ—з¬ҰдёІз»“жқҹз¬Ұ" },
          { syntax: "\\\\", desc: "иҪ¬д№үеҸҚж–ңжқ?, example: "C:\\\\Users" },
          { syntax: "\\.", desc: "иҪ¬д№үзӮ№еҸ·", example: "file\\.txt" }

      const categories = Object.keys(REGEX_SYNTAX);
      let activeCategory = "е…ЁйғЁ";

      function renderCommonPatterns() {
        const container = document.getElementById("commonPatterns");
        COMMON_PATTERNS.forEach(function (p) {
          const item = document.createElement("div");
          item.className = "pattern-item";
          item.title = "зӮ№еҮ»еӨҚеҲ¶";

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = p.name;
          item.appendChild(name);

          const pattern = document.createElement("div");
          pattern.textContent = p.pattern;
          item.appendChild(pattern);

          item.addEventListener("click", async function () {
            try {
              await navigator.clipboard.writeText(p.pattern);
              item.style.borderColor = "var(--accent-green)";
              setTimeout(function () {
                item.style.borderColor = "";
              }, 500);
            } catch (e) {}
          });

          container.appendChild(item);
        });
      }

      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";

        const allTab = document.createElement("button");
        allTab.className = "tab" + (activeCategory === "е…ЁйғЁ" ? " active" : "");
        allTab.textContent = "е…ЁйғЁ";
        allTab.addEventListener("click", function () {
          setCategory("е…ЁйғЁ");
        });
        tabs.appendChild(allTab);

        categories.forEach(function (cat) {
          const tab = document.createElement("button");
          tab.className = "tab" + (activeCategory === cat ? " active" : "");
          tab.textContent = cat;
          tab.addEventListener("click", function () {
            setCategory(cat);
          });
          tabs.appendChild(tab);
        });
      }

      window.setCategory = function (cat) {
        activeCategory = cat;
        renderTabs();
        renderSyntax();
      };

      function renderSyntax(filter) {
        const content = document.getElementById("content");
        content.innerHTML = "";
        const search = (filter || "").toLowerCase();
        const catsToShow = activeCategory === "е…ЁйғЁ" ? categories : [activeCategory];

        catsToShow.forEach(function (cat) {
          const items = REGEX_SYNTAX[cat].filter(function (item) {
            if (!search) return true;
            return (
              item.syntax.toLowerCase().includes(search) ||
              item.desc.toLowerCase().includes(search) ||
              item.example.toLowerCase().includes(search)
            );
          });
          if (items.length === 0) return;

          const title = document.createElement("h2");
          title.className = "category-title";
          title.textContent = cat;
          content.appendChild(title);

          items.forEach(function (item) {
            const card = document.createElement("div");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";

            const code = document.createElement("code");
            code.textContent = item.syntax;
            header.appendChild(code);

            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.textContent = "рҹ“Ӣ еӨҚеҲ¶";
            copyBtn.addEventListener("click", async function () {
              try {
                await navigator.clipboard.writeText(item.syntax);
                copyBtn.textContent = "вң?е·ІеӨҚеҲ?;
                setTimeout(function () {
                  copyBtn.textContent = "рҹ“Ӣ еӨҚеҲ¶";
                }, 1000);
              } catch (e) {}
            });
            header.appendChild(copyBtn);

            const body = document.createElement("div");
            body.className = "card-body";

            const desc = document.createElement("div");
            desc.className = "desc-text";
            desc.textContent = item.desc;
            body.appendChild(desc);

            const example = document.createElement("div");
            example.className = "example";
            example.textContent = "зӨәдҫӢ: " + item.example;
            body.appendChild(example);

            card.appendChild(header);
            card.appendChild(body);
            content.appendChild(card);
          });
        });
      }

      document.getElementById("search").addEventListener("input", function (e) {
        renderSyntax(e.target.value);
      });

      renderCommonPatterns();
      renderTabs();
      renderSyntax();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "dark" ? "" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "рҹҢҷ" : "вҳҖпё?;
        localStorage.setItem("theme", next || "light");
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = "рҹҢҷ";
        }
      })();
    </script>
  </body>
</html>
