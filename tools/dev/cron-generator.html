    <div class="container">
      <h1>вҸ?Cronз”ҹжҲҗеҷ?/h1>
      <div class="cron-display" id="cron">* * * * *</div>
      <div class="fields">
        <div class="field">
          <label for="input---">еҲҶй’ҹ</label>
          <input
            type="text"
            id="minute"
            value="*"
            oninput="updateCron()"
            aria-label="ж–Үжң¬иҫ“е…ҘжЎ?
            placeholder="иҜ·иҫ“е…Ҙж–Үжң¬иҫ“е…ҘжЎҶ"
          />
        </div>
        <div class="field">
          <label for="input---">е°Ҹж—¶</label>
          <input
            type="text"
            id="hour"
            value="*"
            oninput="updateCron()"
            aria-label="ж–Үжң¬иҫ“е…ҘжЎ?
            placeholder="иҜ·иҫ“е…Ҙж–Үжң¬иҫ“е…ҘжЎҶ"
          />
        </div>
        <div class="field">
          <label for="input--">ж—?/label>
          <input
            type="text"
            id="day"
            value="*"
            oninput="updateCron()"
            aria-label="ж–Үжң¬иҫ“е…ҘжЎ?
            placeholder="иҜ·иҫ“е…Ҙж–Үжң¬иҫ“е…ҘжЎҶ"
          />
        </div>
        <div class="field">
          <label for="input--">жң?/label>
          <input
            type="text"
            id="month"
            value="*"
            oninput="updateCron()"
            aria-label="ж–Үжң¬иҫ“е…ҘжЎ?
            placeholder="иҜ·иҫ“е…Ҙж–Үжң¬иҫ“е…ҘжЎҶ"
          />
        </div>
        <div class="field">
          <label for="input---">жҳҹжңҹ</label>
          <input
            type="text"
            id="weekday"
            value="*"
            oninput="updateCron()"
            aria-label="ж–Үжң¬иҫ“е…ҘжЎ?
            placeholder="иҜ·иҫ“е…Ҙж–Үжң¬иҫ“е…ҘжЎҶ"
          />
        </div>
      </div>
      <div class="presets">
        <button class="preset" onclick="setPreset('* * * * *')" aria-label="жҜҸеҲҶй’?>жҜҸеҲҶй’?/button>
        <button class="preset" onclick="setPreset('0 * * * *')" aria-label="жҜҸе°Ҹж—?>жҜҸе°Ҹж—?/button>
        <button class="preset" onclick="setPreset('0 0 * * *')" aria-label="жҜҸеӨ©еҚҲеӨң">
          жҜҸеӨ©еҚҲеӨң
        </button>
        <button class="preset" onclick="setPreset('0 0 * * 0')" aria-label="жҜҸе‘Ёж—?>жҜҸе‘Ёж—?/button>
        <button class="preset" onclick="setPreset('0 0 1 * *')" aria-label="жҜҸжңҲ1еҸ?>
          жҜҸжңҲ1еҸ?
        </button>
        <button class="preset" onclick="setPreset('*/5 * * * *')" aria-label="жҜ?еҲҶй’ҹ">
          жҜ?еҲҶй’ҹ
        </button>
        <button class="preset" onclick="setPreset('0 */2 * * *')" aria-label="жҜ?е°Ҹж—¶">
          жҜ?е°Ҹж—¶
        </button>
        <button class="preset" onclick="setPreset('0 9-17 * * 1-5')" aria-label="е·ҘдҪңж—¶й—ҙ">
          е·ҘдҪңж—¶й—ҙ
        </button>
      </div>
      <div class="description" id="desc">жҜҸеҲҶй’ҹжү§иЎҢдёҖж¬?/div>
    </div>
    <script>
      function updateCron() {
        const cron = ["minute", "hour", "day", "month", "weekday"]
          .map((id) => document.getElementById(id).value || "*")
          .join(" ");
        document.getElementById("cron").textContent = cron;
        describeCron(cron);
      }
      function setPreset(cron) {
        const parts = cron.split(" ");
        ["minute", "hour", "day", "month", "weekday"].forEach(
          (id, i) => (document.getElementById(id).value = parts[i])
        );
        document.getElementById("cron").textContent = cron;
        describeCron(cron);
      }
      function describeCron(cron) {
        const descs = {
          "* * * * *": "жҜҸеҲҶй’ҹжү§иЎ?,
          "0 * * * *": "жҜҸе°Ҹж—¶ж•ҙзӮ№жү§иЎ?,
          "0 0 * * *": "жҜҸеӨ©еҚҲеӨңжү§иЎҢ",
          "0 0 * * 0": "жҜҸе‘Ёж—ҘеҚҲеӨңжү§иЎ?,
          "0 0 1 * *": "жҜҸжңҲ1еҸ·еҚҲеӨңжү§иЎ?,
          "*/5 * * * *": "жҜ?еҲҶй’ҹжү§иЎҢ",
          "0 */2 * * *": "жҜ?е°Ҹж—¶жү§иЎҢ",
          "0 9-17 * * 1-5": "е·ҘдҪңж—?зӮ№еҲ°17зӮ№жҜҸе°Ҹж—¶жү§иЎҢ"
        };
        document.getElementById("desc").textContent = descs[cron] || "иҮӘе®ҡд№үи®ЎеҲ?;
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
