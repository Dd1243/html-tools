      };

      marked.setOptions({

      function initTheme() {
        const savedTheme = localStorage.getItem("readme-preview-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
        updateThemeButton(savedTheme);
      }

      function updateThemeButton(theme) {
        themeToggle.textContent = theme === "dark" ? "жө…иүІжЁЎејҸ" : "ж·ұиүІжЁЎејҸ";
      }

      themeToggle.addEventListener("click", () => {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("readme-preview-theme", newTheme);
        updateThemeButton(newTheme);
      });

      window.updatePreview = function () {
        const markdown = editor.value;
        const rawHtml = marked.parse(markdown);
        preview.innerHTML = DOMPurify.sanitize(rawHtml);
        updateStats();
        localStorage.setItem("readme-preview-content", markdown);

      function updateStats() {
        const content = editor.value;
        const chars = content.length;
        const lines = content ? content.split("\n").length : 0;
        const words = content.trim() ? content.trim().split(/\s+/).length : 0;
        stats.textContent = `${chars} еӯ—з¬Ұ | ${lines} иЎ?| ${words} иҜҚ`;
      }

      editor.addEventListener("input", updatePreview);

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            editor.value = event.target.result;
            updatePreview();
          };
          reader.readAsText(file);
        }
        fileInput.value = "";
      });

      window.downloadMarkdown = function () {
        const content = editor.value;
        if (!content.trim()) {
          alert("зј–иҫ‘еҷЁеҶ…е®№дёәз©әпјҒ");
          return;
        }
        const blob = new Blob([content], { type: "text/markdown" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "README.md";
        a.click();
        URL.revokeObjectURL(url);
      };

      window.copyToClipboard = function () {
        navigator.clipboard.writeText(editor.value).then(() => {
