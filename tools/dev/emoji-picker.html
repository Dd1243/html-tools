            b.classList.remove("active");
          });
          e.target.classList.add("active");
          currentCategory = e.target.dataset.cat;
          renderEmojis();
        }
      });

      document.getElementById("infoEmoji").onclick = function () {
        copyToClipboard(this.textContent);
      };
      document.getElementById("infoUnicode").onclick = function () {
        copyToClipboard(this.textContent);
      };
      document.getElementById("infoHtml").onclick = function () {
        copyToClipboard(this.textContent);
      };

      // Initialize
      renderCategories();
      renderEmojis();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вШАпЄ? : "рЯМЩ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вШАпЄ?;
      }
    </script>
  </body>
</html>
