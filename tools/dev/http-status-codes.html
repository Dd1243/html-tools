    <script>
      const statusCodes = {
        "1xx": {

            { code: 101, name: "Switching Protocols", desc: "еҲҮжҚўеҚҸи®®" },

        "2xx": {

          codes: [
            { code: 200, name: "OK", desc: "иҜ·жұӮжҲҗеҠҹ" },
            { code: 201, name: "Created", desc: "е·ІеҲӣе»әпјҢжҲҗеҠҹиҜ·жұӮе№¶еҲӣе»әдәҶж–°иө„жә? },
            { code: 202, name: "Accepted", desc: "е·ІжҺҘеҸ—пјҢе·ІжҺҘеҸ—иҜ·жұӮдҪҶжңӘеӨ„зҗҶе®ҢжҲ? },
            { code: 204, name: "No Content", desc: "ж— еҶ…е®№пјҢжҲҗеҠҹдҪҶдёҚиҝ”еӣһеҶ…е®№" },
            { code: 206, name: "Partial Content", desc: "йғЁеҲҶеҶ…е®№пјҢиҢғеӣҙиҜ·жұӮжҲҗеҠ? }
          ]
        },
        "3xx": {
          name: "йҮҚе®ҡеҗ?,

            { code: 301, name: "Moved Permanently", desc: "ж°ёд№…з§»еҠЁ" },
            { code: 302, name: "Found", desc: "дёҙж—¶з§»еҠЁ" },
            { code: 303, name: "See Other", desc: "жҹҘзңӢе…¶д»–дҪҚзҪ®" },
            { code: 304, name: "Not Modified", desc: "жңӘдҝ®ж”№пјҢдҪҝз”Ёзј“еӯҳ" },
            { code: 307, name: "Temporary Redirect", desc: "дёҙж—¶йҮҚе®ҡеҗ? },
            { code: 308, name: "Permanent Redirect", desc: "ж°ёд№…йҮҚе®ҡеҗ? }

        "4xx": {
          name: "е®ўжҲ·з«Ҝй”ҷиҜ?,
          class: "category-4xx",
          codes: [
            { code: 400, name: "Bad Request", desc: "й”ҷиҜҜиҜ·жұӮпјҢиҜӯжі•й”ҷиҜ? },
            { code: 401, name: "Unauthorized", desc: "жңӘжҺҲжқғпјҢйңҖиҰҒиә«д»ҪйӘҢиҜ? },
            { code: 403, name: "Forbidden", desc: "зҰҒжӯўи®ҝй—®" },
            { code: 404, name: "Not Found", desc: "жңӘжүҫеҲ°иө„жә? },
            { code: 405, name: "Method Not Allowed", desc: "ж–№жі•дёҚе…Ғи®? },
            { code: 408, name: "Request Timeout", desc: "иҜ·жұӮи¶…ж—¶" },
            { code: 409, name: "Conflict", desc: "еҶІзӘҒ" },
            { code: 413, name: "Payload Too Large", desc: "иҜ·жұӮдҪ“иҝҮеӨ? },
            { code: 429, name: "Too Many Requests", desc: "иҜ·жұӮиҝҮеӨҡпјҢйҷҗжө? }
          ]

        "5xx": {
          name: "жңҚеҠЎеҷЁй”ҷиҜ?,
          class: "category-5xx",
          codes: [
            { code: 500, name: "Internal Server Error", desc: "жңҚеҠЎеҷЁеҶ…йғЁй”ҷиҜ? },
            { code: 501, name: "Not Implemented", desc: "жңӘе®һзҺ? },
            { code: 502, name: "Bad Gateway", desc: "зҪ‘е…ій”ҷиҜҜ" },

            { code: 504, name: "Gateway Timeout", desc: "зҪ‘е…іи¶…ж—¶" }
          ]

      };
      function render(filter = "") {
        const content = document.getElementById("content");
        let html = "";
        for (const [key, cat] of Object.entries(statusCodes)) {
          const filteredCodes = cat.codes.filter(
            (c) =>
              !filter ||
              c.code.toString().includes(filter) ||
              c.name.toLowerCase().includes(filter.toLowerCase()) ||
              c.desc.includes(filter)
          );
          if (filteredCodes.length === 0) continue;
          html += `<div class="category"><div class="category-header ${cat.class}">${key} ${cat.name} <span>${filteredCodes.length}</span></div><div class="category-content">`;
          for (const c of filteredCodes) {
            html += `<div class="status-item"><span class="status-code">${c.code}</span><span class="status-name">${c.name}</span><span class="status-desc">${c.desc}</span></div>`;
          }
          html += "</div></div>";
        }
        content.innerHTML =
          html || '<p style="text-align:center;color:white">жңӘжүҫеҲ°еҢ№й…Қзҡ„зҠ¶жҖҒз Ғ</p>';
      }
      document.getElementById("search").addEventListener("input", (e) => render(e.target.value));
      render();
