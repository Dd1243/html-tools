          { cmd: "git tag <name>", desc: "еҲӣе»әиҪ»йҮҸж Үзӯҫ" },
          { cmd: 'git tag -a <name> -m "msg"', desc: "еҲӣе»әйҷ„жіЁж Үзӯҫ" },
          { cmd: "git tag -d <name>", desc: "еҲ йҷӨжң¬ең°ж Үзӯҫ" },
          { cmd: "git push origin <tag>", desc: "жҺЁйҖҒж Үзӯ? },
          { cmd: "git push origin --tags", desc: "жҺЁйҖҒжүҖжңүж Үзӯ? },
          { cmd: "git push origin --delete <tag>", desc: "еҲ йҷӨиҝңзЁӢж Үзӯҫ" }
        ]
      };

      const categories = Object.keys(GIT_COMMANDS);
      let activeCategory = "е…ЁйғЁ";

      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";

        const allTab = document.createElement("button");
        allTab.className = "tab" + (activeCategory === "е…ЁйғЁ" ? " active" : "");
        allTab.textContent = "е…ЁйғЁ";
        allTab.addEventListener("click", function () {
          setCategory("е…ЁйғЁ");
        });
        tabs.appendChild(allTab);

        categories.forEach(function (cat) {
          const tab = document.createElement("button");
          tab.className = "tab" + (activeCategory === cat ? " active" : "");
          tab.textContent = cat;
          tab.addEventListener("click", function () {
            setCategory(cat);
          });
          tabs.appendChild(tab);
        });
      }

      window.setCategory = function (cat) {
        activeCategory = cat;
        renderTabs();
        renderCommands();
      };

      function renderCommands(filter) {
        const content = document.getElementById("content");
        content.innerHTML = "";
        const search = (filter || "").toLowerCase();

        const catsToShow = activeCategory === "е…ЁйғЁ" ? categories : [activeCategory];

        catsToShow.forEach(function (cat) {
          const commands = GIT_COMMANDS[cat].filter(function (c) {
            if (!search) return true;
            return c.cmd.toLowerCase().includes(search) || c.desc.toLowerCase().includes(search);
          });

          if (commands.length === 0) return;

          const title = document.createElement("h2");
          title.className = "category-title";
          title.textContent = cat;
          content.appendChild(title);

          commands.forEach(function (c) {
            const card = document.createElement("div");
            card.className = "card";

            const cmdDiv = document.createElement("div");
            cmdDiv.className = "cmd";
            cmdDiv.title = "зӮ№еҮ»еӨҚеҲ¶";

            const code = document.createElement("code");
            code.textContent = c.cmd;
            cmdDiv.appendChild(code);

            const copyIcon = document.createElement("span");
            copyIcon.className = "copy-icon";
            copyIcon.textContent = "рҹ“Ӣ";
            cmdDiv.appendChild(copyIcon);

            cmdDiv.addEventListener("click", async function () {
              try {
                await navigator.clipboard.writeText(c.cmd);
                copyIcon.textContent = "вң?;
                setTimeout(function () {
                  copyIcon.textContent = "рҹ“Ӣ";
                }, 1000);
              } catch (e) {}
            });

            const desc = document.createElement("div");
            desc.className = "desc-text";
            desc.textContent = c.desc;

            card.appendChild(cmdDiv);
            card.appendChild(desc);
            content.appendChild(card);
          });
        });

        if (content.children.length === 0) {
          const noResult = document.createElement("div");
          noResult.style.textAlign = "center";
          noResult.style.padding = "40px";
          noResult.style.color = "var(--text-muted)";
          noResult.textContent = "жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„е‘Ҫд»?;
          content.appendChild(noResult);
        }
      }

      document.getElementById("search").addEventListener("input", function (e) {
        renderCommands(e.target.value);
      });

      renderTabs();
      renderCommands();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "dark" ? "" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "рҹҢҷ" : "вҳҖпё?;
        localStorage.setItem("theme", next || "light");
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = "рҹҢҷ";
        }
      })();
    </script>
  </body>
</html>
