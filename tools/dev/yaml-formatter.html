  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>YAML 格式化</h1>
      <p class="desc">格式化和验证 YAML 数据，支持与 JSON 互转</p>

      <div class="card">
        <div class="btn-row">
          <button class="btn primary" onclick="formatYaml()">格式化 YAML</button>
          <button class="btn" onclick="yamlToJson()">YAML → JSON</button>
          <button class="btn" onclick="jsonToYaml()">JSON → YAML</button>
          <button class="btn" onclick="minifyYaml()">压缩 YAML</button>
          <button class="btn" onclick="loadSample()">示例</button>
          <button class="btn" onclick="clearAll()">清空</button>
        </div>

        <div class="status" id="status" style="display: none"></div>

        <div class="grid">
          <div class="form-group">
            <label>
              输入 YAML
              <button class="copy-btn" onclick="copyInput()">复制</button>
            </label>
            <textarea
              id="input"
              placeholder="name: John
age: 30
skills:
  - JavaScript
  - Python"
              oninput="validate()"
            ></textarea>
          </div>
          <div class="form-group">
            <label>
              输出
              <button class="copy-btn" onclick="copyOutput()">复制</button>
            </label>
            <textarea id="output" readonly></textarea>
          </div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function showStatus(message, isValid) {
        const el = document.getElementById("status");
        el.textContent = message;
        el.className = "status " + (isValid ? "valid" : "invalid");
        el.style.display = "block";
      }

      function validate() {
        const input = document.getElementById("input").value.trim();
        if (!input) {
          document.getElementById("status").style.display = "none";
          return null;
        }

        try {
          const result = jsyaml.load(input);
          showStatus("✓ YAML 格式正确", true);
          return result;
        } catch (e) {
          showStatus("✗ YAML 格式错误: " + e.message, false);
          return null;
        }
      }

      function formatYaml() {
        const obj = validate();
        if (obj !== null) {
          document.getElementById("output").value = jsyaml.dump(obj, {
            indent: 2,
            lineWidth: -1,
            noRefs: true
          });
        }
      }

      function yamlToJson() {
        const obj = validate();
        if (obj !== null) {
          document.getElementById("output").value = JSON.stringify(obj, null, 2);
          showStatus("✓ 已转换为 JSON", true);
        }
      }

      function jsonToYaml() {
        const input = document.getElementById("input").value.trim();
        try {
          const obj = JSON.parse(input);
          document.getElementById("output").value = jsyaml.dump(obj, {
            indent: 2,
            lineWidth: -1,
            noRefs: true
          });
          showStatus("✓ 已转换为 YAML", true);
        } catch (e) {
          showStatus("✗ JSON 格式错误: " + e.message, false);
        }
      }

      function minifyYaml() {
        const obj = validate();
        if (obj !== null) {
          document.getElementById("output").value = jsyaml.dump(obj, {
            flowLevel: 0,
            noRefs: true
          });
          showStatus("✓ 已压缩 YAML", true);
        }
      }

      function loadSample() {
        document.getElementById("input").value = `# 服务器配置示例
server:
  host: localhost
  port: 8080
  ssl:
    enabled: true
    cert: /path/to/cert.pem
    key: /path/to/key.pem

database:
  type: postgresql
  host: db.example.com
  port: 5432
  name: myapp
  credentials:
    username: admin
    password: secret123

logging:
  level: info
  format: json
  outputs:
    - type: file
      path: /var/log/app.log
    - type: console

features:
  - name: authentication
    enabled: true
  - name: caching
    enabled: true
    ttl: 3600
  - name: rate-limiting
    enabled: false`;
        validate();
      }

      function copyInput() {
        navigator.clipboard.writeText(document.getElementById("input").value);
      }

      function copyOutput() {
        navigator.clipboard.writeText(document.getElementById("output").value);
      }

      function clearAll() {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
        document.getElementById("status").style.display = "none";
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
