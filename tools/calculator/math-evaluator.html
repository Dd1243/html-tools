      <p class="desc">У«Ау«ЌтцЇТЮѓТЋ░тГдУАеУЙЙт╝Ј№╝їТћ»ТїЂТІгтЈисђЂт╣ѓУ┐љу«ЌсђЂСИЅУДњтЄйТЋ░уГЅ</p>
      <div class="card">
        <div class="input-group">
          <input
            type="text"
            id="expression"
            placeholder="УЙЊтЁЦУАеУЙЙт╝Ј№╝їтд?2*(3+4)^2 Тѕ?sin(pi/2)"
            autofocus
          />
          <button id="btnCalc" class="primary">У«Ау«Ќ</button>
        </div>
        <div class="result-box">
          <div class="label">у╗ЊТъю</div>
          <div class="value" id="result">-</div>
        </div>
        <div class="btn-row">
          <button id="btnCopy">тцЇтѕХу╗ЊТъю</button>
          <button id="btnClear">ТИЁуЕ║</button>
          <button id="btnClearHistory">ТИЁжЎцтјєтЈ▓</button>
        </div>
        <div class="history" id="historySection" style="display: none">
          <h3>У«Ау«ЌтјєтЈ▓</h3>
          <div class="history-list" id="historyList"></div>
        </div>
        <div class="functions">
          <h3>Тћ»ТїЂуџётЄйТЋ░тњїтИИжЄЈ№╝ѕуѓ╣тЄ╗ТЈњтЁЦ№╝Ѕ</h3>

      </footer>

    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.2/lib/browser/math.min.js"></script>
    <script>
      const expressionEl = document.getElementById("expression");
      const resultEl = document.getElementById("result");
      const historySection = document.getElementById("historySection");
      const historyList = document.getElementById("historyList");
      const functionGrid = document.getElementById("functionGrid");
      const LS_HISTORY_KEY = "math_eval_history_v1";

      const FUNCTIONS = [
        { name: "sin(x)", desc: "ТГБт╝д" },
        { name: "cos(x)", desc: "СйЎт╝д" },
        { name: "tan(x)", desc: "ТГБтѕЄ" },
        { name: "asin(x)", desc: "тЈЇТГБт╝? },
        { name: "acos(x)", desc: "тЈЇСйЎт╝? },
        { name: "atan(x)", desc: "тЈЇТГБтѕ? },
        { name: "sqrt(x)", desc: "т╣│Тќ╣Та? },
        { name: "cbrt(x)", desc: "уФІТќ╣Та? },
        { name: "abs(x)", desc: "у╗Ют»╣тђ? },
        { name: "log(x)", desc: "УЄфуёХт»╣ТЋ░" },
        { name: "log10(x)", desc: "тИИућет»╣ТЋ░" },
        { name: "log2(x)", desc: "С╗?СИ║т║Ћ" },
        { name: "exp(x)", desc: "e^x" },
        { name: "floor(x)", desc: "тљЉСИІтЈќТЋ┤" },
        { name: "ceil(x)", desc: "тљЉСИітЈќТЋ┤" },
        { name: "round(x)", desc: "тЏЏУѕЇС║ћтЁЦ" },
        { name: "pow(x,y)", desc: "xуџёyТгАТќ╣" },
        { name: "min(a,b)", desc: "Тюђт░Јтђ? },
        { name: "max(a,b)", desc: "ТюђтцДтђ? },
        { name: "pi", desc: "тюєтЉеујЄ¤ђ" },
        { name: "e", desc: "УЄфуёХтИИТЋ░e" }
      ];

      function renderFunctionGrid() {
        functionGrid.innerHTML = "";
        FUNCTIONS.forEach(function (fn) {
          const item = document.createElement("div");
          item.className = "function-item";
          const code = document.createElement("code");
          code.textContent = fn.name;
          item.appendChild(code);
          item.appendChild(document.createTextNode(" " + fn.desc));
          item.addEventListener("click", function () {
            insertFunction(fn.name);
          });
          functionGrid.appendChild(item);
        });
      }

      function insertFunction(fnName) {
        const pos = expressionEl.selectionStart;
        const text = expressionEl.value;
        expressionEl.value = text.substring(0, pos) + fnName + text.substring(pos);
        expressionEl.focus();
        if (fnName.includes("(x)")) {
          expressionEl.setSelectionRange(pos + fnName.indexOf("x"), pos + fnName.indexOf("x") + 1);
        } else {
          expressionEl.setSelectionRange(pos + fnName.length, pos + fnName.length);
        }
      }

      function formatResult(num) {
        if (typeof num === "object") return math.format(num, { precision: 14 });
        if (Number.isInteger(num)) return num.toString();
        if (Math.abs(num) < 1e-10 || Math.abs(num) > 1e10) return num.toExponential(10);
        return (Math.round(num * 1e12) / 1e12).toString();
      }

      window.calculate = function () {
        const expr = expressionEl.value.trim();
        if (!expr) {
          resultEl.textContent = "-";
          resultEl.classList.remove("error");
          return;
        }
        try {
          const result = math.evaluate(expr);
          const formatted = formatResult(result);
          resultEl.textContent = formatted;
          resultEl.classList.remove("error");
          addToHistory(expr, formatted);
        } catch (e) {
          resultEl.textContent = e.message || "У«Ау«ЌжћЎУ»»";
          resultEl.classList.add("error");
        }
      };

      window.loadHistory = function () {
        try {
          return JSON.parse(localStorage.getItem(LS_HISTORY_KEY)) || [];
        } catch (e) {
          return [];
        }
      };
      function saveHistory(h) {
        localStorage.setItem(LS_HISTORY_KEY, JSON.stringify(h));
      }
      function addToHistory(expr, result) {
        let h = loadHistory().filter((i) => i.expr !== expr);
        h.unshift({ expr, result });
        if (h.length > 20) h = h.slice(0, 20);
        saveHistory(h);
        renderHistory();
      }
      function renderHistory() {
        const h = loadHistory();
        if (!h.length) {
          historySection.style.display = "none";
          return;
        }
        historySection.style.display = "block";
        historyList.innerHTML = "";
        h.forEach(function (item) {
          const div = document.createElement("div");
          div.className = "history-item";
          const exprSpan = document.createElement("span");
          exprSpan.className = "expr";
          exprSpan.textContent = item.expr;
          const resultSpan = document.createElement("span");
          resultSpan.className = "result";
          resultSpan.textContent = "= " + item.result;
          div.appendChild(exprSpan);
          div.appendChild(resultSpan);
          div.addEventListener("click", function () {
            expressionEl.value = item.expr;
            calculate();
          });
          historyList.appendChild(div);
        });
      }

      document.getElementById("btnCalc").addEventListener("click", calculate);
      expressionEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter") calculate();
      });
      document.getElementById("btnCopy").addEventListener("click", async function () {
        const r = resultEl.textContent;
        if (r !== "-" && !resultEl.classList.contains("error")) {
          try {
            await navigator.clipboard.writeText(r);
          } catch (e) {}
        }
      });
      document.getElementById("btnClear").addEventListener("click", function () {
        expressionEl.value = "";
        resultEl.textContent = "-";
        resultEl.classList.remove("error");
        expressionEl.focus();
      });
      document.getElementById("btnClearHistory").addEventListener("click", function () {
        localStorage.removeItem(LS_HISTORY_KEY);
        renderHistory();
      });

      renderFunctionGrid();
      renderHistory();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "dark" ? "" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "­ЪїЎ" : "Рўђ№И?;
        localStorage.setItem("theme", next || "light");
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = "­ЪїЎ";
        }
      })();
    </script>
