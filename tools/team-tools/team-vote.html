    <script>
        const LS_KEY = "team-vote-v2-data";
        let mode = "single";
        let options = [];
        let votes = {}; // { voterName: { selections: [], scores: {} } }
        let currentSelections = [];
        let currentScores = {};

        function init() {
            const savedTheme = localStorage.getItem("theme") || "light";
            document.body.setAttribute("data-theme", savedTheme);
            document.getElementById('themeToggle').onclick = () => {
                const n = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
                document.body.setAttribute("data-theme", n);
                localStorage.setItem("theme", n);
            };

            loadState();
            if(options.length === 0) {
                ["方案 A：下周五下午海边烧烤", "方案 B：周六全天山地越野", "方案 C：室内剧本杀剧场"].forEach(txt => options.push({ id: Date.now()+Math.random(), txt }));
            }

            document.getElementById('voteTitle').oninput = saveState;
            document.getElementById('maxSelect').oninput = saveState;
            renderAll();
        }

        function setMode(m) {
            mode = m;
            currentSelections = [];
            currentScores = {};
            document.querySelectorAll('.t-tab').forEach(t => t.classList.toggle('active', t.textContent.includes(m==='single'?'单选':m==='multi'?'多选':'评分')));
            document.getElementById('multiConfig').style.display = m === 'multi' ? 'block' : 'none';
            renderVoteArea();
            saveState();
        }

        function addOption() {
            const val = document.getElementById('newOptInput').value.trim();
            if(!val) return;
            options.push({ id: Date.now(), txt: val });
            document.getElementById('newOptInput').value = "";
            renderAll();
            saveState();
        }

        function delOption(id) {
            options = options.filter(o => o.id !== id);
            Object.keys(votes).forEach(v => {
                votes[v].selections = votes[v].selections.filter(sid => sid !== id);
                delete votes[v].scores[id];
            });
            renderAll();
            saveState();
        }

        function updateOptTxt(id, val) { options.find(o => o.id === id).txt = val; renderAll(); saveState(); }

        function renderAll() {
            renderOptEditor();
            renderVoteArea();
            renderResults();
        }

        function renderOptEditor() {
            const list = document.getElementById("optList");
            list.innerHTML = "";
            options.forEach((o, idx) => {
                const div = document.createElement("div");
                div.className = "opt-row";
                div.innerHTML = `
                    <div class="opt-num">${idx+1}</div>
                    <input type="text" class="input-text" value="${o.txt}" oninput="updateOptTxt(${o.id}, this.value)">
                    <button class="btn-del" onclick="delOption(${o.id})">×</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('statOptions').textContent = options.length;
        }

        function renderVoteArea() {
            const container = document.getElementById("voteItems");
            container.innerHTML = "";
            options.forEach(o => {
                const div = document.createElement("div");
                div.className = `vote-card ${currentSelections.includes(o.id) ? 'selected' : ''}`;

                if(mode === 'score') {
                    div.style.flexDirection = "column";
                    div.style.alignItems = "flex-start";
                    div.innerHTML = `<div>${o.txt}</div><div class="score-row" id="score-${o.id}"></div>`;
                    const sRow = div.querySelector('.score-row');
                    for(let i=1; i<=5; i++) {
                        const sBtn = document.createElement("button");
                        sBtn.className = `score-btn ${currentScores[o.id] === i ? 'active' : ''}`;
                        sBtn.textContent = i;
                        sBtn.onclick = (e) => { e.stopPropagation(); currentScores[o.id] = i; renderVoteArea(); };
                        sRow.appendChild(sBtn);
                    }
                } else {
                    div.innerHTML = `<div class="v-check"></div><div>${o.txt}</div>`;
                    div.onclick = () => toggleSelect(o.id);
                }
                container.appendChild(div);
            });
        }

        function toggleSelect(id) {
            if(mode === 'single') currentSelections = [id];
            else {
                if(currentSelections.includes(id)) currentSelections = currentSelections.filter(x => x !== id);
                else {
                    const max = parseInt(document.getElementById('maxSelect').value) || 3;
                    if(currentSelections.length < max) currentSelections.push(id);
                    else return alert(`最多只能选择 ${max} 项`);
                }
            }
            renderVoteArea();
        }

        function submitVote() {
            const name = document.getElementById('voterName').value.trim();
            if(!name) return alert("请输入名字");
            if(votes[name]) return alert("该名字已投过票");

            if(mode === 'score' && Object.keys(currentScores).length === 0) return alert("请至少为一个选项评分");
            if(mode !== 'score' && currentSelections.length === 0) return alert("请至少选择一个选项");

            votes[name] = { selections: [...currentSelections], scores: {...currentScores} };
            currentSelections = [];
            currentScores = {};
            document.getElementById('voterName').value = "";
            renderAll();
            saveState();
            alert("提交成功！");
        }

        function renderResults() {
            const list = document.getElementById("resList");
            list.innerHTML = "";
            const counts = {};
            const scoreTotals = {};
            const voterMap = {};

            options.forEach(o => { counts[o.id] = 0; scoreTotals[o.id] = 0; voterMap[o.id] = []; });

            const voterNames = Object.keys(votes);
            voterNames.forEach(vn => {
                const v = votes[vn];
                v.selections.forEach(sid => { if(counts[sid]!==undefined) { counts[sid]++; voterMap[sid].push(vn); } });
                Object.keys(v.scores).forEach(sid => { if(scoreTotals[sid]!==undefined) { scoreTotals[sid] += v.scores[sid]; voterMap[sid].push(`${vn}(${v.scores[sid]})`); } });
            });

            const max = mode === 'score' ? Math.max(...Object.values(scoreTotals), 1) : Math.max(...Object.values(counts), 1);

            options.sort((a, b) => (mode==='score' ? scoreTotals[b.id]-scoreTotals[a.id] : counts[b.id]-counts[a.id])).forEach(o => {
                const val = mode === 'score' ? scoreTotals[o.id] : counts[o.id];
                const per = (val / max) * 100;
                const div = document.createElement("div");
                div.className = "res-item";
                div.innerHTML = `
                    <div class="res-header">
                        <span class="res-title">${o.txt}</span>
                        <span class="res-val">${val} ${mode==='score'?'分':'票'}</span>
                    </div>
                    <div class="res-bar-bg"><div class="res-bar-fill" style="width:${per}%"></div></div>
                    <div class="res-voters">${voterMap[o.id].map(v => `<span class="v-tag">${v}</span>`).join('')}</div>
                `;
                list.appendChild(div);
            });

            // Winner logic
            const banner = document.getElementById('winner');
            banner.innerHTML = "";
            if(voterNames.length > 0 && max > 0) {
                const winners = options.filter(o => (mode==='score'?scoreTotals[o.id]:counts[o.id]) === max);
                const bDiv = document.createElement("div");
                bDiv.className = "winner-banner";
                bDiv.innerHTML = winners.length > 1 ? `⚖️ 平局项: ${winners.map(w=>w.txt).join(', ')}` : `🏆 领先项: ${winners[0].txt}`;
                banner.appendChild(bDiv);
            }

            document.getElementById('statVoters').textContent = voterNames.length;
            document.getElementById('statTotal').textContent = mode === 'score' ? Object.values(scoreTotals).reduce((a,b)=>a+b,0) : Object.values(counts).reduce((a,b)=>a+b,0);
        }

        function saveState() {
            localStorage.setItem(LS_KEY, JSON.stringify({
                title: document.getElementById('voteTitle').value,
                mode, options, votes, max: document.getElementById('maxSelect').value
            }));
        }

        function loadState() {
            const s = localStorage.getItem(LS_KEY);
            if(s) {
                const d = JSON.parse(s);
                document.getElementById('voteTitle').value = d.title || "";
                mode = d.mode || "single";
                options = d.options || [];
                votes = d.votes || {};
                document.getElementById('maxSelect').value = d.max || 3;
                setMode(mode);
            }
            const hash = window.location.hash.slice(1);
            if(hash) { try { const d = JSON.parse(decodeURIComponent(atob(hash))); options = d.options || []; votes = d.votes || {}; } catch(e){} }
        }

        function shareVote() {
            const data = btoa(encodeURIComponent(JSON.stringify({ options, votes })));
            const url = window.location.href.split('#')[0] + '#' + data;
            navigator.clipboard.writeText(url).then(() => alert("分享链接已复制！"));
        }

        function exportTxt() {
            const title = document.getElementById('voteTitle').value || '团队投票';
            let out = `【${title}】投票结果报告\n\n`;
            options.forEach((o, i) => {
                const sid = o.id;
                let val = 0;
                let vs = [];
                Object.keys(votes).forEach(vn => {
                    const v = votes[vn];
                    if(mode === 'score') { if(v.scores[sid]) { val += v.scores[sid]; vs.push(`${vn}(${v.scores[sid]})`); } }
                    else { if(v.selections.includes(sid)) { val++; vs.push(vn); } }
                });
                out += `${i+1}. ${o.txt}: ${val}${mode==='score'?'分':'票'}\n   投票人: ${vs.join(', ') || '无'}\n\n`;
            });
            const blob = new Blob([out], {type: "text/plain"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "vote_result.txt"; a.click();
        }

        function clearAll() { if(confirm("确定重置所有数据吗？")){ votes = {}; currentSelections = []; currentScores = []; renderAll(); saveState(); } }

        init();
    </script>
