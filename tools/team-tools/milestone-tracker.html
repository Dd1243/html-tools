    <footer class="site-footer">

    <script>
        const LS_KEY = "milestone-data";
        let milestones = [];

        function init() {
            const saved = localStorage.getItem("theme") || "light";
            document.body.setAttribute("data-theme", saved);
            document.getElementById('themeToggle').onclick = () => {
                const n = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
                document.body.setAttribute("data-theme", n);
                localStorage.setItem("theme", n);
            };

            loadState();
            updateUI();
        }

        function addMilestone() {
            const t = document.getElementById('mTitle').value;
            const d = document.getElementById('mDate').value;
            if (!t || !d) return alert("请填写标题和截止日期");

            milestones.push({
                id: Date.now(),
                t: t,
                d: d,
                o: document.getElementById('mOwner').value,
                desc: document.getElementById('mDesc').value,
                done: false
            });

            document.getElementById('mTitle').value = "";
            document.getElementById('mDate').value = "";
            document.getElementById('mOwner').value = "";
            document.getElementById('mDesc').value = "";

            updateUI();
        }

        function updateUI() {
            const list = document.getElementById("mList");
            list.innerHTML = milestones.length ? "" : "<div style='text-align:center; padding:40px; color:#999;'>暂无里程碑数据</div>";

            const today = new Date().setHours(0,0,0,0);
            let doneCount = 0, lateCount = 0;

            milestones.sort((a,b) => new Date(a.d) - new Date(b.d));

            milestones.forEach(m => {
                const mDate = new Date(m.d).setHours(0,0,0,0);
                const isLate = mDate < today && !m.done;
                if (m.done) doneCount++; else if (isLate) lateCount++;

                const div = document.createElement("div");
                div.className = `milestone-item ${m.done ? 'completed' : (isLate ? 'overdue' : 'in-progress')}`;
                div.innerHTML = `
                    <div class="m-header">
                        <span class="m-title">${m.t}</span>
                        <span class="m-date">🗓️ ${m.d}</span>
                    </div>
                    <div class="m-desc">${m.desc || '无描述'}</div>
                    <div class="m-footer">
                        <div>
                            <span class="badge ${m.done ? 'badge-completed' : (isLate ? 'badge-overdue' : 'badge-in-progress')}">
                                ${m.done ? '已完成' : (isLate ? '已逾期' : '进行中')}
                            </span>
                            <span style="font-size:0.75rem; color:var(--text-muted); margin-left:10px;">👤 ${m.o || '未指派'}</span>
                        </div>
                        <div>
                            <button class="btn-outline" style="padding:4px 8px; font-size:0.7rem;" onclick="toggleDone(${m.id})">${m.done?'↩️':'✅'}</button>
                            <button class="btn-del" onclick="delM(${m.id})">×</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });

            // Update Stats
            document.getElementById("statTotal").textContent = milestones.length;
            document.getElementById("statDone").textContent = doneCount;
            document.getElementById("statLate").textContent = lateCount;

            const projEnd = document.getElementById("projEnd").value;
            if (projEnd) {
                const diff = Math.ceil((new Date(projEnd) - today) / (1000*60*60*24));
                document.getElementById("statDays").textContent = diff >= 0 ? diff : "已截止";
            }

            // Update Bar
            const total = milestones.length || 1;
            const bar = document.getElementById("overallBar");
            bar.innerHTML = `
                <div class="progress-inner p-done" style="width:${(doneCount/total)*100}%"></div>
                <div class="progress-inner p-late" style="width:${(lateCount/total)*100}%"></div>
                <div class="progress-inner p-doing" style="width:${((total-doneCount-lateCount)/total)*100}%"></div>
            `;
            saveState();
        }

        function toggleDone(id) { const m = milestones.find(x => x.id === id); m.done = !m.done; updateUI(); }
        function delM(id) { milestones = milestones.filter(x => x.id !== id); updateUI(); }

        function saveState() {
            localStorage.setItem(LS_KEY, JSON.stringify({
                name: document.getElementById('projName').value,
                end: document.getElementById('projDeadline' /* note: fix typo from projEnd to match */ || 'projEnd').value,
                milestones
            }));
        }

        function loadState() {
            const s = localStorage.getItem(LS_KEY);
            if (s) {
                const d = JSON.parse(s);
                document.getElementById('projName').value = d.name || "";
                document.getElementById('projEnd').value = d.end || "";
                milestones = d.milestones || [];
            }
            const hash = window.location.hash.slice(1);
            if(hash) { try { milestones = JSON.parse(decodeURIComponent(atob(hash))).milestones; } catch(e) {} }
        }

        function shareState() {
            const data = btoa(encodeURIComponent(JSON.stringify({ milestones })));
            const url = window.location.href.split('#')[0] + '#' + data;
            navigator.clipboard.writeText(url).then(() => alert("分享链接已复制！"));
        }

        function exportReport() {
            let md = `# 里程碑报告: ${document.getElementById('projName').value || '未命名项目'}\n\n`;
            md += `| 节点 | 截止日期 | 负责人 | 状态 |\n|---|---|---|---|\n`;
            milestones.forEach(m => md += `| ${m.t} | ${m.d} | ${m.o} | ${m.done ? '✅' : '⏳'} |\n`);
            const blob = new Blob([md], {type: "text/markdown"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "report.md"; a.click();
        }

        function clearAll() { if(confirm("确定清空吗？")){ milestones = []; updateUI(); } }

        init();
    </script>
