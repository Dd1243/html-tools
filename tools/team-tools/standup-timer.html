    <script>
        const LS_KEY = "standup-timer-v2-data";
        let members = [];
        let curIdx = -1;
        let timeLeft = 120;
        let running = false;
        let timer = null;

        function init() {
            const savedTheme = localStorage.getItem("theme") || "light";
            document.body.setAttribute("data-theme", savedTheme);
            document.getElementById('themeToggle').onclick = () => {
                const n = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
                document.body.setAttribute("data-theme", n);
                localStorage.setItem("theme", n);
            };

            loadState();
            if(members.length === 0) {
                ["开发 A", "开发 B", "测试 C", "产品 D"].forEach(n => members.push({ id: Date.now()+Math.random(), name: n, done: false, time: 0 }));
            }

            renderMembers();
            updateStats();
            updateClock();

            document.getElementById('timePerPerson').onchange = (e) => {
                if(!running) { timeLeft = parseInt(e.target.value) || 120; updateClock(); }
                saveState();
            };
        }

        function addMember() {
            members.push({ id: Date.now(), name: "新成员", done: false, time: 0 });
            renderMembers();
            updateStats();
            saveState();
        }

        function renderMembers() {
            const list = document.getElementById("memberList");
            list.innerHTML = "";
            members.forEach((m, idx) => {
                const div = document.createElement("div");
                div.className = `member-item ${idx === curIdx ? 'active' : ''} ${m.done ? 'done' : ''}`;
                div.innerHTML = `
                    <div class="m-num">${m.done ? '✓' : idx+1}</div>
                    <input type="text" class="input-text" value="${m.name}" style="padding:4px 8px; font-size:0.85rem;" oninput="updateMember(${m.id}, this.value)">
                    <span style="font-size:0.75rem; font-family:monospace; text-align:right;">${formatTime(m.time)}</span>
                    <button class="btn-del" onclick="delMember(${m.id})">×</button>
                `;
                div.onclick = (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') startMember(idx); };
                list.appendChild(div);
            });
        }

        function updateMember(id, val) { members.find(x => x.id === id).name = val; saveState(); }
        function delMember(id) { members = members.filter(x => x.id !== id); renderMembers(); updateStats(); saveState(); }

        function startMember(idx) {
            pauseTimer();
            curIdx = idx;
            timeLeft = parseInt(document.getElementById('timePerPerson').value) || 120;
            document.getElementById('speaker').textContent = members[idx].name;
            renderMembers();
            updateClock();
        }

        function toggleTimer() {
            if(running) pauseTimer();
            else {
                if(curIdx === -1) {
                    const first = members.findIndex(m => !m.done);
                    if(first === -1) return alert("所有人已发言完毕！");
                    startMember(first);
                }
                startTimer();
            }
        }

        function startTimer() {
            running = true;
            document.getElementById('playBtn').textContent = "⏸";
            document.getElementById('tStatus').textContent = "Speaking";
            timer = setInterval(() => {
                timeLeft--;
                if(curIdx >= 0) members[curIdx].time++;
                updateClock();
                if(timeLeft <= 0) {
                    finishCurrent();
                    const next = members.findIndex((m, i) => i > curIdx && !m.done);
                    if(next === -1) { pauseTimer(); document.getElementById('speaker').textContent = "站会结束"; }
                    else startMember(next);
                }
            }, 1000);
        }

        function pauseTimer() {
            running = false;
            document.getElementById('playBtn').textContent = "▶";
            document.getElementById('tStatus').textContent = "Paused";
            clearInterval(timer);
        }

        function finishCurrent() { if(curIdx >= 0) members[curIdx].done = true; playAlert(); renderMembers(); updateStats(); saveState(); }

        function nextMember() { finishCurrent(); const next = members.findIndex((m, i) => i > curIdx && !m.done); if(next !== -1) startMember(next); }
        function prevMember() { if(curIdx > 0) startMember(curIdx - 1); }

        function resetTimer() {
            pauseTimer();
            curIdx = -1;
            timeLeft = parseInt(document.getElementById('timePerPerson').value) || 120;
            members.forEach(m => { m.done = false; m.time = 0; });
            document.getElementById('speaker').textContent = "准备开始站会";
            renderMembers();
            updateStats();
            updateClock();
        }

        function updateClock() {
            document.getElementById('tClock').textContent = formatTime(timeLeft);
            const circ = 628;
            const total = parseInt(document.getElementById('timePerPerson').value) || 120;
            const offset = circ * (1 - timeLeft/total);
            const prog = document.getElementById('tProgress');
            prog.style.strokeDashoffset = offset;

            const warn = parseInt(document.getElementById('warnTime').value) || 30;
            prog.classList.remove('warning', 'danger');
            if(timeLeft <= 10) prog.classList.add('danger');
            else if(timeLeft <= warn) prog.classList.add('warning');
        }

        function updateStats() {
            const done = members.filter(m => m.done).length;
            const totalTime = members.reduce((s, x) => s + x.time, 0);
            document.getElementById('statCount').textContent = members.length;
            document.getElementById('statDone').textContent = done;
            document.getElementById('statTotalTime').textContent = formatTime(totalTime);
            document.getElementById('statAvg').textContent = formatTime(done > 0 ? totalTime/done : 0);

            const per = members.length > 0 ? (done / members.length) * 100 : 0;
            document.getElementById('progressBar').style.width = `${per}%`;
            document.getElementById('progressText').textContent = `${done} / ${members.length}`;
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const rs = Math.round(s%60);
            return `${m}:${rs.toString().padStart(2, '0')}`;
        }

        function shuffleMembers() {
            pauseTimer();
            curIdx = -1;
            for(let i = members.length - 1; i > 0; i--){
                const j = Math.floor(Math.random() * (i + 1));
                [members[i], members[j]] = [members[j], members[i]];
            }
            renderMembers();
            saveState();
        }

        function playAlert() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gn = ctx.createGain();
                osc.connect(gn); gn.connect(ctx.destination);
                osc.frequency.value = 800; gn.gain.setValueAtTime(0.1, ctx.currentTime);
                gn.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        function saveState() {
            localStorage.setItem(LS_KEY, JSON.stringify({ members, time: document.getElementById('timePerPerson').value, warn: document.getElementById('warnTime').value }));
        }

        function loadState() {
            const s = localStorage.getItem(LS_KEY);
            if(s) {
                const d = JSON.parse(s);
                members = d.members || [];
                document.getElementById('timePerPerson').value = d.time || 120;
                document.getElementById('warnTime').value = d.warn || 30;
                timeLeft = parseInt(d.time) || 120;
            }
        }

        function clearAll() { if(confirm("清空吗？")){ members = []; renderMembers(); updateStats(); saveState(); } }

        init();
    </script>
