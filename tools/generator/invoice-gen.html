    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
      // тЋєтЊЂтѕЌУАеТЋ░ТЇ«
      let items = [];
      let itemIdCounter = 0;

      // тѕЮтДІтї?
      document.addEventListener("DOMContentLoaded", () => {
        // У«Йуй«ж╗ўУ«цТЌЦТюЪ
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("invoiceDate").value = today;

        // У«Йуй«тѕ░ТюЪТЌЦТюЪСИ?0тцЕтљј
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + 30);
        document.getElementById("dueDate").value = dueDate.toISOString().split("T")[0];

        // ућЪТѕљтЈЉуЦеу╝ќтЈи
        document.getElementById("invoiceNo").value = "INV-" + Date.now().toString().slice(-6);

        // Ти╗тіатѕЮтДІтЋєтЊЂУА?
        addItem();

        // тіаУййС┐ЮтГўуџёСИ╗жб?
        const savedTheme = localStorage.getItem("invoice-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }

        updatePreview();
      });

      // СИ╗жбўтѕЄТЇб
      window.toggleTheme = function () {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("invoice-theme", newTheme);
      };

      // УйгС╣ЅHTMLуЅ╣Т«ітГЌугджў▓ТГбXSS
      window.escapeHtml = function (text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      };

      // Ти╗тіатЋєтЊЂУА?
      function addItem() {
        const id = itemIdCounter++;
        items.push({ id, name: "", quantity: 1, price: 0 });
        renderItems();
      }

      // тѕажЎцтЋєтЊЂУА?
      function removeItem(id) {
        items = items.filter((item) => item.id !== id);
        if (items.length === 0) {
          addItem();
        } else {
          renderItems();
          updatePreview();
        }
      }

      // ТЏ┤Тќ░тЋєтЊЂТЋ░ТЇ«
      function updateItem(id, field, value) {
        const item = items.find((i) => i.id === id);
        if (item) {
          if (field === "quantity" || field === "price") {
            item[field] = parseFloat(value) || 0;
          } else {
            item[field] = value;
          }
        }
        updateSubtotals();
        updatePreview();
      }

      // ТИ▓ТЪЊтЋєтЊЂтѕЌУАе
      function renderItems() {
        const container = document.getElementById("itemList");
        container.textContent = "";

        items.forEach((item) => {
          const row = document.createElement("div");
          row.className = "item-row";

          const nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.className = "item-name";
          nameInput.placeholder = "тЋєтЊЂтљЇуД░";
          nameInput.value = item.name;
          nameInput.addEventListener("change", () => updateItem(item.id, "name", nameInput.value));

          const qtyInput = document.createElement("input");
          qtyInput.type = "number";
          qtyInput.placeholder = "ТЋ░жЄЈ";
          qtyInput.min = "0";
          qtyInput.step = "1";
          qtyInput.value = item.quantity;
          qtyInput.addEventListener("change", () =>
            updateItem(item.id, "quantity", qtyInput.value)
          );

          const priceInput = document.createElement("input");
          priceInput.type = "number";
          priceInput.placeholder = "тЇЋС╗и";
          priceInput.min = "0";
          priceInput.step = "0.01";
          priceInput.value = item.price;
          priceInput.addEventListener("change", () =>
            updateItem(item.id, "price", priceInput.value)
          );

          const subtotalInput = document.createElement("input");
          subtotalInput.type = "text";
          subtotalInput.readOnly = true;
          subtotalInput.value = "┬Ц" + (item.quantity * item.price).toFixed(2);

      function updateSubtotals() {
        const subtotal = items.reduce((sum, item) => sum + item.quantity * item.price, 0);
        const discountRate = parseFloat(document.getElementById("discount").value) || 0;
        const taxRate = parseFloat(document.getElementById("taxRate").value) || 0;

        const discountAmount = (subtotal * discountRate) / 100;
        const afterDiscount = subtotal - discountAmount;
        const taxAmount = (afterDiscount * taxRate) / 100;
        const total = afterDiscount + taxAmount;

        document.getElementById("subtotal").textContent = "┬Ц" + subtotal.toFixed(2);
        document.getElementById("discountAmount").textContent = "-┬Ц" + discountAmount.toFixed(2);
        document.getElementById("taxAmount").textContent = "┬Ц" + taxAmount.toFixed(2);
        document.getElementById("totalAmount").textContent = "┬Ц" + total.toFixed(2);
      }

        const data = {

          invoiceNo: document.getElementById("invoiceNo").value,
          invoiceDate: document.getElementById("invoiceDate").value,
          dueDate: document.getElementById("dueDate").value,

          sellerPhone: document.getElementById("sellerPhone").value,
          sellerTaxId: document.getElementById("sellerTaxId").value,
          buyerName: document.getElementById("buyerName").value,
          buyerAddress: document.getElementById("buyerAddress").value,
          buyerPhone: document.getElementById("buyerPhone").value,
          buyerTaxId: document.getElementById("buyerTaxId").value,
          taxRate: document.getElementById("taxRate").value,
          discount: document.getElementById("discount").value,
          notes: document.getElementById("notes").value,
          items: items
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "invoice-" + (data.invoiceNo || "data") + ".json";
        a.click();
        URL.revokeObjectURL(url);
      };

      // С╗јТќЄС╗ХтіаУййТЋ░ТЇ?
      window.loadData = function () {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);

                document.getElementById("invoiceType").value = data.invoiceType || "invoice";
                document.getElementById("invoiceNo").value = data.invoiceNo || "";
                document.getElementById("invoiceDate").value = data.invoiceDate || "";
                document.getElementById("dueDate").value = data.dueDate || "";
                document.getElementById("sellerName").value = data.sellerName || "";
                document.getElementById("sellerAddress").value = data.sellerAddress || "";
                document.getElementById("sellerPhone").value = data.sellerPhone || "";
                document.getElementById("sellerTaxId").value = data.sellerTaxId || "";
                document.getElementById("buyerName").value = data.buyerName || "";
                document.getElementById("buyerAddress").value = data.buyerAddress || "";
                document.getElementById("buyerPhone").value = data.buyerPhone || "";
                document.getElementById("buyerTaxId").value = data.buyerTaxId || "";
                document.getElementById("taxRate").value = data.taxRate || 13;
                document.getElementById("discount").value = data.discount || 0;
                document.getElementById("notes").value = data.notes || "";

                if (data.items && data.items.length > 0) {
                  items = data.items;
                  itemIdCounter = Math.max(...items.map((i) => i.id)) + 1;
                }

                renderItems();
                updatePreview();

              }
            };
            reader.readAsText(file);
          }
        };
