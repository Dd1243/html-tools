    <script>
      const $ = (id) => document.getElementById(id);
      let resumeData = {
        template: "modern",
        basic: { name: "", title: "", email: "", phone: "", location: "" },
        summary: "",
        experiences: [
          {
            company: "科技创新有限公司",
            position: "高级前端工程师",
            start: "2021.03",
            end: "至今",
            desc: "负责核心产品前端架构与性能优化，推动组件化与工程化落地。"
          }
        ],
        education: [
          { school: "某某大学", degree: "本科", major: "计算机科学与技术", date: "2018.06" }
        ],
        skills: ""
      };

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("resume-theme-v2", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("resume-theme-v2") || "light");
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text == null ? "" : String(text);
        return div.innerHTML;
      }

      function updatePreview() {
        const name = $("name").value.trim();
        const title = $("title").value.trim();
        const email = $("email").value.trim();
        const phone = $("phone").value.trim();
        const location = $("location").value.trim();
        const summary = $("summary").value.trim();
        const skills = $("skills").value.trim();
        const template = $("templateSelect").value;

        resumeData.template = template;
        resumeData.basic = { name, title, email, phone, location };
        resumeData.summary = summary;
        resumeData.skills = skills;

        const preview = $("resumePreview");
        preview.className = `resume-preview template-${template}`;

        let html = "";
        if (name) html += `<h1>${escapeHtml(name)}</h1>`;
        if (title) html += `<div class="p-title">${escapeHtml(title)}</div>`;

        const contacts = [];
        if (email) contacts.push(escapeHtml(email));
        if (phone) contacts.push(escapeHtml(phone));
        if (location) contacts.push(escapeHtml(location));
        if (contacts.length) html += `<div class="contact-bar">${contacts.join(" | ")}</div>`;

        if (summary) {
          html += `<div class="section-head">个人简介</div>`;
          html += `<p style="font-size:0.92rem;margin:0">${escapeHtml(summary)}</p>`;
        }

        if (resumeData.experiences.length) {
          html += `<div class="section-head">工作经历</div>`;
          resumeData.experiences.forEach((exp) => {
            html += `
              <div class="exp-item" style="margin-bottom:12px">
                <div class="item-header">
                  <span>${escapeHtml(exp.position)}</span>
                  <span style="font-weight:400;font-size:0.85rem">${escapeHtml(exp.start)} - ${escapeHtml(exp.end)}</span>
                </div>
                <div class="item-meta">${escapeHtml(exp.company)}</div>
                <div class="item-desc">${escapeHtml(exp.desc)}</div>
              </div>`;
          });
        }

        if (resumeData.education.length) {
          html += `<div class="section-head">教育背景</div>`;
          resumeData.education.forEach((edu) => {
            html += `
              <div class="edu-item" style="margin-bottom:10px">
                <div class="item-header">
                  <span>${escapeHtml(edu.school)}</span>
                  <span style="font-weight:400;font-size:0.85rem">${escapeHtml(edu.date)}</span>
                </div>
                <div class="item-meta">${escapeHtml(edu.degree)}${edu.major ? " - " + escapeHtml(edu.major) : ""}</div>
              </div>`;
          });
        }

        if (skills) {
          html += `<div class="section-head">专业技能</div><div class="skill-list">`;
          skills.split(",").forEach((s) => {
            if (s.trim()) html += `<span class="skill-chip">${escapeHtml(s.trim())}</span>`;
          });
          html += `</div>`;
        }

        if (!html) {
          html = '<div class="placeholder">在左侧填写信息，预览将实时更新</div>';
        }
        preview.innerHTML = html;
      }

      function renderExpList() {
        $("experienceList").innerHTML = resumeData.experiences.map((exp, i) => `
          <div class="entry-item">
            <div>
              <div class="entry-title">${escapeHtml(exp.company)}</div>
              <div class="entry-sub">${escapeHtml(exp.position)} | ${escapeHtml(exp.start)} - ${escapeHtml(exp.end)}</div>
            </div>
            <button type="button" class="delete-btn" data-exp="${i}" aria-label="删除">🗑️</button>
          </div>
        `).join("");
        $("experienceList").querySelectorAll("[data-exp]").forEach((btn) => {
          btn.addEventListener("click", () => {
            resumeData.experiences.splice(parseInt(btn.dataset.exp, 10), 1);
            renderExpList();
            updatePreview();
          });
        });
      }

      function renderEduList() {
        $("educationList").innerHTML = resumeData.education.map((edu, i) => `
          <div class="entry-item">
            <div>
              <div class="entry-title">${escapeHtml(edu.school)}</div>
              <div class="entry-sub">${escapeHtml(edu.degree)} | ${escapeHtml(edu.major)} | ${escapeHtml(edu.date)}</div>
            </div>
            <button type="button" class="delete-btn" data-edu="${i}" aria-label="删除">🗑️</button>
          </div>
        `).join("");
        $("educationList").querySelectorAll("[data-edu]").forEach((btn) => {
          btn.addEventListener("click", () => {
            resumeData.education.splice(parseInt(btn.dataset.edu, 10), 1);
            renderEduList();
            updatePreview();
          });
        });
      }

      function addExperience() {
        const company = $("expCompany").value.trim();
        const position = $("expPosition").value.trim();
        const start = $("expStart").value.trim();
        const end = $("expEnd").value.trim();
        const desc = $("expDesc").value.trim();
        if (!company || !position) {
          showToast("请填写公司和职位");
          return;
        }
        resumeData.experiences.push({ company, position, start, end, desc });
        $("expCompany").value = "";
        $("expPosition").value = "";
        $("expStart").value = "";
        $("expEnd").value = "";
        $("expDesc").value = "";
        renderExpList();
        updatePreview();
      }

      function addEducation() {
        const school = $("eduSchool").value.trim();
        const degree = $("eduDegree").value.trim();
        const major = $("eduMajor").value.trim();
        const date = $("eduDate").value.trim();
        if (!school || !degree) {
          showToast("请填写学校和学历");
          return;
        }
        resumeData.education.push({ school, degree, major, date });
        $("eduSchool").value = "";
        $("eduDegree").value = "";
        $("eduMajor").value = "";
        $("eduDate").value = "";
        renderEduList();
        updatePreview();
      }

      function saveToLocal() {
        updatePreview();
        localStorage.setItem("resume_builder_data_v2", JSON.stringify(resumeData));
        showToast("内容已保存至本地");
      }

      function loadFromLocal() {
        const saved = localStorage.getItem("resume_builder_data_v2");
        if (!saved) {
          showToast("未找到保存的内容");
          return;
        }
        resumeData = JSON.parse(saved);
        $("name").value = resumeData.basic.name || "";
        $("title").value = resumeData.basic.title || "";
        $("email").value = resumeData.basic.email || "";
        $("phone").value = resumeData.basic.phone || "";
        $("location").value = resumeData.basic.location || "";
        $("summary").value = resumeData.summary || "";
        $("skills").value = resumeData.skills || "";
        $("templateSelect").value = resumeData.template || "modern";
        renderExpList();
        renderEduList();
        updatePreview();
        showToast("已加载保存的内容");
      }

      function resetForm() {
        if (!confirm("确定要清空所有内容吗？")) return;
        resumeData = {
          template: "modern",
          basic: { name: "", title: "", email: "", phone: "", location: "" },
          summary: "",
          experiences: [],
          education: [],
          skills: ""
        };
        ["name", "title", "email", "phone", "location", "summary", "skills", "expCompany", "expPosition", "expStart", "expEnd", "expDesc", "eduSchool", "eduDegree", "eduMajor", "eduDate"].forEach((id) => {
          $(id).value = "";
        });
        $("templateSelect").value = "modern";
        renderExpList();
        renderEduList();
        updatePreview();
      }

      function exportHTML() {
        updatePreview();
        const content = $("resumePreview").outerHTML;
        const fullHtml = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${escapeHtml(resumeData.basic.name || "resume")}</title>
<style>
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8fafc;margin:0;padding:24px;color:#0f172a}
  .resume-preview{max-width:860px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
  h1{margin:0 0 4px;font-size:1.9rem}
  .p-title{color:#2563eb;font-weight:700;margin-bottom:8px}
  .contact-bar{color:#64748b;font-size:.92rem;margin-bottom:18px}
  .section-head{margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;font-weight:800}
  .item-header{display:flex;justify-content:space-between;gap:10px;font-weight:700}
  .item-meta{color:#64748b;font-size:.9rem;margin:2px 0 6px}
  .item-desc{color:#334155;font-size:.9rem;white-space:pre-wrap}
  .skill-list{display:flex;flex-wrap:wrap;gap:8px}
  .skill-chip{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:6px 10px;font-size:.85rem;font-weight:600}
  .template-classic .p-title{color:#0f172a}
  .template-classic .section-head{border-bottom-color:#0f172a}
  .template-creative .p-title{color:#7c3aed}
  .template-creative .section-head{border-bottom-color:#c4b5fd;color:#5b21b6}
</style>
</head>
<body>${content}</body>
</html>`;
        const blob = new Blob([fullHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (resumeData.basic.name || "resume") + ".html";
        a.click();
        URL.revokeObjectURL(url);
        showToast("HTML 已导出");
      }

      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        ["name", "title", "email", "phone", "location", "summary", "skills", "templateSelect"].forEach((id) => {
          $(id).addEventListener("input", updatePreview);
          $(id).addEventListener("change", updatePreview);
        });
        $("addExpBtn").addEventListener("click", addExperience);
        $("addEduBtn").addEventListener("click", addEducation);
        $("saveBtn").addEventListener("click", saveToLocal);
        $("loadBtn").addEventListener("click", loadFromLocal);
        $("exportBtn").addEventListener("click", exportHTML);
        $("printBtn").addEventListener("click", () => window.print());
        $("resetBtn").addEventListener("click", resetForm);
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        bind();
        renderExpList();
        renderEduList();
        updatePreview();
      });
    </script>
  </body>
</html>
