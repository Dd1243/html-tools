    <div id="toast"></div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const $ = (id) => document.getElementById(id);

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("text-card-theme", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("text-card-theme") || "light");
      }

      function setSize(w, h) {
        $("canvasWidth").value = w;
        $("canvasHeight").value = h;
        render();
      }

      function applyPreset(name) {
        const presets = {
          grad1: { bg: "#667eea", text: "#ffffff" },
          grad2: { bg: "#f5576c", text: "#ffffff" },
          grad3: { bg: "#4facfe", text: "#ffffff" },
          dark: { bg: "#1a1a2e", text: "#eeeeee" },
          light: { bg: "#ffffff", text: "#222222" }
        };
        const p = presets[name];
        if (!p) return;
        $("bgColor").value = p.bg;
        $("bgColorText").value = p.bg;
        $("textColor").value = p.text;
        $("textColorText").value = p.text;
        render();
      }

      function syncColor(type) {
        const val = $(type + "ColorText").value;
        if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
          $(type + "Color").value = val;
          render();
        }
      }

      function render() {
        const w = parseInt($("canvasWidth").value, 10) || 800;
        const h = parseInt($("canvasHeight").value, 10) || 600;
        canvas.width = w;
        canvas.height = h;

        const bgColor = $("bgColor").value;
        const textColor = $("textColor").value;
        const text = $("textContent").value || "";
        const fontFamily = $("fontFamily").value;
        const textAlign = $("textAlign").value;
        const enableShadow = $("enableShadow").checked;

        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, w, h);

        const lines = text.split("\n");
        const baseSize = Math.min(w, h) / 10;
        const fontSize = Math.max(16, baseSize);
        ctx.font = `600 ${fontSize}px ${fontFamily}`;
        ctx.fillStyle = textColor;
        ctx.textAlign = textAlign;
        ctx.textBaseline = "middle";

        if (enableShadow) {
          ctx.shadowColor = "rgba(0,0,0,0.25)";
          ctx.shadowBlur = 12;
          ctx.shadowOffsetY = 4;
        } else {
          ctx.shadowColor = "transparent";
          ctx.shadowBlur = 0;
          ctx.shadowOffsetY = 0;
        }

        const lineHeight = fontSize * 1.5;
        const totalHeight = lines.length * lineHeight;
        const startY = (h - totalHeight) / 2 + lineHeight / 2;
        let startX = w / 2;
        if (textAlign === "left") startX = w * 0.12;
        if (textAlign === "right") startX = w * 0.88;

        lines.forEach((line, i) => {
          ctx.fillText(line, startX, startY + i * lineHeight);
        });
      }

      function download(format) {
        const link = document.createElement("a");
        const quality = format === "jpg" ? 0.92 : 1.0;
        link.download = `text-card-${Date.now()}.${format}`;
        link.href = canvas.toDataURL(format === "jpg" ? "image/jpeg" : "image/png", quality);
        link.click();
      }

      async function copyImage() {
        try {
          const blob = await new Promise((r) => canvas.toBlob(r, "image/png"));
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          showToast("图片已复制");
        } catch (e) {
          showToast("复制失败，请改用下载");
        }
      }

      function showToast(m) {
        const t = $("toast");
        t.textContent = m;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        ["textContent", "bgColor", "textColor", "canvasWidth", "canvasHeight", "fontFamily", "textAlign", "enableShadow"].forEach((id) => {
          $(id).addEventListener("input", render);
          $(id).addEventListener("change", render);
        });
        $("bgColorText").addEventListener("input", () => syncColor("bg"));
        $("textColorText").addEventListener("input", () => syncColor("text"));
        document.querySelectorAll("[data-preset]").forEach((el) => {
          el.addEventListener("click", () => applyPreset(el.dataset.preset));
        });
        document.querySelectorAll(".size-btn").forEach((el) => {
          el.addEventListener("click", () => setSize(parseInt(el.dataset.w, 10), parseInt(el.dataset.h, 10)));
        });
        $("dlPng").addEventListener("click", () => download("png"));
        $("dlJpg").addEventListener("click", () => download("jpg"));
        $("copyImg").addEventListener("click", copyImage);
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        bind();
        render();
      });
    </script>
