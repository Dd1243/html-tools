    <script>
      const fonts = [
        { id: "dancing", label: "优雅舞动", family: "'Dancing Script', cursive" },
        { id: "greatvibes", label: "华丽草书", family: "'Great Vibes', cursive" },
        { id: "satisfy", label: "清新灵动", family: "'Satisfy', cursive" },
        { id: "caveat", label: "随性手书", family: "'Caveat', cursive" },
        { id: "yellowtail", label: "复古笔触", family: "'Yellowtail', cursive" },
        { id: "pacifico", label: "圆润涂鸦", family: "'Pacifico', cursive" },
        { id: "cursive", label: "标准草书", family: "cursive" },
        { id: "brush", label: "艺术毛笔", family: "Brush Script MT, cursive" }
      ];

      let currentTab = "text";
      let activeFont = "dancing";
      let drawHistory = [];
      let isDrawing = false;
      let lastX = 0;
      let lastY = 0;

      const textCanvas = document.getElementById("textCanvas");
      const drawCanvas = document.getElementById("drawCanvas");
      const tCtx = textCanvas.getContext("2d");
      const dCtx = drawCanvas.getContext("2d");
      const $ = (id) => document.getElementById(id);

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("sig-gen-theme", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("sig-gen-theme") || "light");
      }

      function initFontGrid() {
        const grid = $("fontGrid");
        fonts.forEach((f) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "font-btn" + (f.id === activeFont ? " active" : "");
          btn.textContent = f.label;
          btn.style.fontFamily = f.family;
          btn.addEventListener("click", () => {
            activeFont = f.id;
            document.querySelectorAll(".font-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderTextSig();
          });
          grid.appendChild(btn);
        });
      }

      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
        $("textControls").style.display = tab === "text" ? "block" : "none";
        $("drawControls").style.display = tab === "draw" ? "block" : "none";
        textCanvas.style.display = tab === "text" ? "block" : "none";
        drawCanvas.style.display = tab === "draw" ? "block" : "none";
        $("svgBtn").style.display = tab === "text" ? "inline-flex" : "none";
      }

      function renderTextSig() {
        const text = $("sigText").value || "签名";
        const size = parseInt($("fontSize").value, 10);
        const rotation = parseInt($("rotation").value, 10);
        const color = $("sigColor").value;
        const bg = $("bgColor").value;
        const transparent = $("transparentBg").checked;
        $("fontSizeVal").textContent = size + "px";
        $("rotationVal").textContent = rotation + "°";

        const w = textCanvas.width;
        const h = textCanvas.height;
        tCtx.clearRect(0, 0, w, h);
        if (!transparent) {
          tCtx.fillStyle = bg;
          tCtx.fillRect(0, 0, w, h);
        }

        const font = fonts.find((f) => f.id === activeFont).family;
        tCtx.save();
        tCtx.translate(w / 2, h / 2);
        tCtx.rotate((rotation * Math.PI) / 180);
        tCtx.font = `700 ${size}px ${font}`;
        tCtx.fillStyle = color;
        tCtx.textBaseline = "middle";

        let x = -tCtx.measureText(text).width / 2;
        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const cw = tCtx.measureText(char).width;
          const yOff = Math.sin(i * 0.5) * 4;
          const rOff = Math.sin(i * 0.3) * 0.05;
          tCtx.save();
          tCtx.translate(x + cw / 2, yOff);
          tCtx.rotate(rOff);
          tCtx.fillText(char, -cw / 2, 0);
          tCtx.restore();
          x += cw;
        }
        tCtx.restore();
      }

      function initDrawCanvas() {
        const bg = $("drawBgColor").value;
        const trans = $("drawTransparentBg").checked;
        dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        if (!trans) {
          dCtx.fillStyle = bg;
          dCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
        drawHistory = [];
        saveHistory();
      }

      function updateBrushSize() {
        $("brushSizeVal").textContent = $("brushSize").value + "px";
      }

      function getCoords(e) {
        const rect = drawCanvas.getBoundingClientRect();
        const scaleX = drawCanvas.width / rect.width;
        const scaleY = drawCanvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      function startDraw(e) {
        if (currentTab !== "draw") return;
        isDrawing = true;
        const coords = getCoords(e);
        lastX = coords.x;
        lastY = coords.y;
      }

      function doDraw(e) {
        if (!isDrawing || currentTab !== "draw") return;
        e.preventDefault();
        const coords = getCoords(e);
        dCtx.strokeStyle = $("drawColor").value;
        dCtx.lineWidth = parseInt($("brushSize").value, 10);
        dCtx.lineCap = "round";
        dCtx.lineJoin = "round";
        dCtx.beginPath();
        dCtx.moveTo(lastX, lastY);
        dCtx.lineTo(coords.x, coords.y);
        dCtx.stroke();
        lastX = coords.x;
        lastY = coords.y;
      }

      function stopDraw() {
        if (!isDrawing) return;
        isDrawing = false;
        saveHistory();
      }

      function saveHistory() {
        drawHistory.push(drawCanvas.toDataURL());
        if (drawHistory.length > 30) drawHistory.shift();
      }

      function undoDraw() {
        if (drawHistory.length <= 1) return;
        drawHistory.pop();
        const img = new Image();
        img.onload = () => {
          dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          dCtx.drawImage(img, 0, 0);
        };
        img.src = drawHistory[drawHistory.length - 1];
      }

      function clearDraw() {
        initDrawCanvas();
      }

      function downloadPNG() {
        const cvs = currentTab === "text" ? textCanvas : drawCanvas;
        const link = document.createElement("a");
        link.download = `signature-${Date.now()}.png`;
        link.href = cvs.toDataURL("image/png");
        link.click();
      }

      async function copyToClipboard() {
        const cvs = currentTab === "text" ? textCanvas : drawCanvas;
        try {
          const blob = await new Promise((resolve) => cvs.toBlob(resolve, "image/png"));
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          showToast("签名图片已复制");
        } catch (e) {
          showToast("复制失败，请改用下载");
        }
      }

      function downloadSVG() {
        if (currentTab !== "text") return;
        const text = $("sigText").value || "签名";
        const font = fonts.find((f) => f.id === activeFont).family;
        const size = parseInt($("fontSize").value, 10);
        const color = $("sigColor").value;
        const rotation = parseInt($("rotation").value, 10);
        const bg = $("bgColor").value;
        const trans = $("transparentBg").checked;
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.font = `700 ${size}px ${font}`;
        const tw = tempCtx.measureText(text).width;
        const svg = `<svg width="800" height="266" viewBox="0 0 800 266" xmlns="http://www.w3.org/2000/svg">
${trans ? "" : `<rect width="100%" height="100%" fill="${bg}"/>`}
<text x="400" y="133" fill="${color}" font-family="${font.replace(/'/g, "")}" font-size="${size}" font-weight="700" text-anchor="middle" dominant-baseline="middle" transform="rotate(${rotation} 400 133)">${text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</text>
</svg>`;
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `signature-${Date.now()}.svg`;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });
        ["sigText", "fontSize", "rotation", "sigColor", "bgColor", "transparentBg"].forEach((id) => {
          $(id).addEventListener("input", renderTextSig);
          $(id).addEventListener("change", renderTextSig);
        });
        $("brushSize").addEventListener("input", updateBrushSize);
        $("drawBgColor").addEventListener("input", initDrawCanvas);
        $("drawTransparentBg").addEventListener("change", initDrawCanvas);
        $("undoBtn").addEventListener("click", undoDraw);
        $("clearBtn").addEventListener("click", clearDraw);
        $("dlPng").addEventListener("click", downloadPNG);
        $("copyBtn").addEventListener("click", copyToClipboard);
        $("svgBtn").addEventListener("click", downloadSVG);
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });

        ["mousedown", "touchstart"].forEach((ev) => drawCanvas.addEventListener(ev, startDraw, { passive: false }));
        ["mousemove", "touchmove"].forEach((ev) => drawCanvas.addEventListener(ev, doDraw, { passive: false }));
        ["mouseup", "mouseleave", "touchend", "touchcancel"].forEach((ev) => drawCanvas.addEventListener(ev, stopDraw));
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        initFontGrid();
        bind();
        renderTextSig();
        initDrawCanvas();
        updateBrushSize();
      });
    </script>
  </body>
</html>
