    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const $ = (id) => document.getElementById(id);
      let uploadedLogo = null;
      let activeIcon = "🚀";

      const sizes = [
        { name: "OG / Twitter", w: 1200, h: 630 },
        { name: "Instagram 1:1", w: 1080, h: 1080 },
        { name: "Story 9:16", w: 1080, h: 1920 },
        { name: "LinkedIn", w: 1200, h: 627 },
        { name: "Twitter Header", w: 1500, h: 500 },
        { name: "Full HD", w: 1920, h: 1080 }
      ];
      const gradients = [
        ["#6366f1", "#ec4899"],
        ["#0ea5e9", "#22d3ee"],
        ["#f97316", "#ef4444"],
        ["#10b981", "#14b8a6"],
        ["#8b5cf6", "#6366f1"],
        ["#111827", "#4b5563"]
      ];
      const icons = ["", "🚀", "💡", "🎯", "🔥", "🎨", "📱", "💻", "⚡", "🌟", "📈", "🛠️"];

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("social-img-theme", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("social-img-theme") || "light");
      }

      function initSizes() {
        const grid = $("sizeGrid");
        sizes.forEach((s, i) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "size-btn" + (i === 0 ? " active" : "");
          btn.innerHTML = `<strong>${s.name}</strong><span>${s.w} × ${s.h}</span>`;
          btn.addEventListener("click", () => {
            document.querySelectorAll(".size-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            canvas.width = s.w;
            canvas.height = s.h;
            render();
          });
          grid.appendChild(btn);
        });
      }

      function initPresets() {
        const box = $("gradientPresets");
        gradients.forEach(([c1, c2]) => {
          const d = document.createElement("div");
          d.className = "preset";
          d.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
          d.addEventListener("click", () => {
            $("bgColor1").value = c1;
            $("bgColor2").value = c2;
            render();
          });
          box.appendChild(d);
        });
      }

      function initIcons() {
        const grid = $("iconGrid");
        icons.forEach((icon) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "icon-btn-item" + (icon === activeIcon ? " active" : "");
          btn.textContent = icon || "无";
          btn.addEventListener("click", () => {
            activeIcon = icon;
            document.querySelectorAll(".icon-btn-item").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            render();
          });
          grid.appendChild(btn);
        });
      }

      function wrapText(text, maxWidth, lineHeight) {
        const chars = String(text || "").split("");
        let line = "";
        const lines = [];
        chars.forEach((ch) => {
          const test = line + ch;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = ch;
          } else {
            line = test;
          }
        });
        if (line) lines.push(line);
        return lines;
      }

      function render() {
        const w = canvas.width;
        const h = canvas.height;
        const c1 = $("bgColor1").value;
        const c2 = $("bgColor2").value;
        const type = $("gradientType").value;
        const titleText = $("titleText").value;
        const titleSize = parseInt($("titleSize").value, 10);
        const titleColor = $("titleColor").value;
        const subText = $("subtitleText").value;
        const subSize = parseInt($("subtitleSize").value, 10);
        const subColor = $("subtitleColor").value;

        $("titleSizeVal").textContent = titleSize;
        $("subtitleSizeVal").textContent = subSize;

        ctx.clearRect(0, 0, w, h);
        if (type === "solid") {
          ctx.fillStyle = c1;
        } else if (type === "radial") {
          const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) / 1.2);
          g.addColorStop(0, c1);
          g.addColorStop(1, c2);
          ctx.fillStyle = g;
        } else {
          const g = ctx.createLinearGradient(0, 0, w, h);
          g.addColorStop(0, c1);
          g.addColorStop(1, c2);
          ctx.fillStyle = g;
        }
        ctx.fillRect(0, 0, w, h);

        // soft pattern
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        for (let i = 0; i < w; i += 40) {
          for (let j = 0; j < h; j += 40) {
            if ((i + j) % 80 === 0) ctx.fillRect(i, j, 20, 20);
          }
        }

        if (activeIcon) {
          ctx.font = `${Math.min(w, h) * 0.08}px sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(activeIcon, w / 2, h * 0.22);
        }

        ctx.fillStyle = titleColor;
        ctx.font = `800 ${titleSize}px Inter, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const titleLines = wrapText(titleText, w * 0.8, titleSize * 1.2);
        const titleStart = h * 0.48 - ((titleLines.length - 1) * titleSize * 1.15) / 2;
        titleLines.forEach((line, i) => ctx.fillText(line, w / 2, titleStart + i * titleSize * 1.15));

        if (subText) {
          ctx.fillStyle = subColor;
          ctx.globalAlpha = 0.92;
          ctx.font = `500 ${subSize}px Inter, sans-serif`;
          const subLines = wrapText(subText, w * 0.72, subSize * 1.3);
          const subStart = titleStart + titleLines.length * titleSize * 1.15 + 28;
          subLines.forEach((line, i) => ctx.fillText(line, w / 2, subStart + i * subSize * 1.3));
          ctx.globalAlpha = 1;
        }

        if (uploadedLogo) {
          const logoSize = Math.min(w, h) * 0.12;
          ctx.drawImage(uploadedLogo, w - logoSize - 40, h - logoSize - 40, logoSize, logoSize);
        }
      }

      function handleLogo(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            uploadedLogo = img;
            render();
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function downloadImage() {
        const a = document.createElement("a");
        a.download = `social-image-${canvas.width}x${canvas.height}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
        showToast("图片已下载");
      }

      function resetCanvas() {
        $("titleText").value = "创建精美的社交媒体图片";
        $("subtitleText").value = "提升内容在社交平台的点击率与视觉吸引力";
        $("titleSize").value = 60;
        $("subtitleSize").value = 28;
        $("bgColor1").value = "#6366f1";
        $("bgColor2").value = "#ec4899";
        $("titleColor").value = "#ffffff";
        $("subtitleColor").value = "#ffffff";
        $("gradientType").value = "linear";
        uploadedLogo = null;
        activeIcon = "🚀";
        document.querySelectorAll(".icon-btn-item").forEach((b, i) => b.classList.toggle("active", icons[i] === activeIcon));
        canvas.width = 1200;
        canvas.height = 630;
        document.querySelectorAll(".size-btn").forEach((b, i) => b.classList.toggle("active", i === 0));
        render();
      }

      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        ["bgColor1", "bgColor2", "gradientType", "titleText", "titleSize", "titleColor", "subtitleText", "subtitleSize", "subtitleColor"].forEach((id) => {
          $(id).addEventListener("input", render);
          $(id).addEventListener("change", render);
        });
        $("logoUpload").addEventListener("change", (e) => handleLogo(e.target.files[0]));
        $("downloadBtn").addEventListener("click", downloadImage);
        $("resetBtn").addEventListener("click", resetCanvas);
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        initSizes();
        initPresets();
        initIcons();
        bind();
        render();
      });
    </script>
  </body>
</html>
