    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const $ = (id) => document.getElementById(id);
      let state = {
        type: "circle",
        rough: true,
        transparent: false
      };

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("stamp-theme", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("stamp-theme") || "light");
      }

      function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
        let rot = (Math.PI / 2) * 3;
        const step = Math.PI / spikes;
        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
          ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
          rot += step;
          ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
          rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fill();
      }

      function drawTextOnArc(text, cx, cy, radius, startAngle, endAngle) {
        const chars = String(text || "").split("");
        if (!chars.length) return;
        const angleStep = (endAngle - startAngle) / (chars.length + 1);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        chars.forEach((char, i) => {
          const angle = startAngle + angleStep * (i + 1);
          const x = cx + radius * Math.cos(angle);
          const y = cy + radius * Math.sin(angle);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle + Math.PI / 2);
          ctx.fillText(char, 0, 0);
          ctx.restore();
        });
      }

      function applyRoughness() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] > 0) {
            if (Math.random() > 0.85) data[i + 3] = Math.floor(data[i + 3] * (0.3 + Math.random() * 0.7));
            const v = Math.floor(Math.random() * 20 - 10);
            data[i] = Math.max(0, Math.min(255, data[i] + v));
            data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + v));
            data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + v));
          }
        }
        ctx.putImageData(imageData, 0, 0);
      }

      function render() {
        const mainText = $("mainText").value;
        const centerText = $("centerText").value;
        const bottomText = $("bottomText").value;
        const color = $("stampColor").value;
        const size = parseInt($("stampSize").value, 10);
        const borderWidth = parseInt($("borderWidth").value, 10);
        $("sizeVal").textContent = size + "px";
        $("borderVal").textContent = borderWidth + "px";

        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        const radius = size / 2 - borderWidth;

        ctx.clearRect(0, 0, w, h);
        if (!state.transparent) {
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, w, h);
        }
        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = borderWidth;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (state.type === "circle" || state.type === "date" || state.type === "contract") {
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(cx, cy, radius - borderWidth - 3, 0, Math.PI * 2);
          ctx.stroke();

          const fontSize = Math.floor(radius / 6);
          ctx.font = `bold ${fontSize}px "Noto Serif SC", serif`;
          drawTextOnArc(mainText, cx, cy, radius - fontSize - 5, Math.PI * 0.2, Math.PI * 1.8);

          if (state.type === "date") {
            ctx.font = `bold ${fontSize * 0.7}px Inter, sans-serif`;
            ctx.fillText(new Date().toLocaleDateString("zh-CN"), cx, cy);
          } else {
            drawStar(cx, cy, 5, radius * 0.25, radius * 0.1);
            if (centerText) {
              ctx.font = `bold ${fontSize * 0.75}px "Noto Serif SC", serif`;
              ctx.fillText(centerText, cx, cy + radius * 0.45);
            }
          }
          if (bottomText) {
            ctx.font = `bold ${fontSize * 0.55}px Inter, sans-serif`;
            ctx.fillText(bottomText, cx, cy + radius * 0.72);
          }
        } else if (state.type === "oval") {
          const rx = radius;
          const ry = radius * 0.65;
          ctx.beginPath();
          ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.ellipse(cx, cy, rx - borderWidth - 2, ry - borderWidth - 2, 0, 0, Math.PI * 2);
          ctx.stroke();
          const fontSize = Math.floor(ry / 2.5);
          ctx.font = `bold ${fontSize}px "Noto Serif SC", serif`;
          ctx.fillText(mainText, cx, cy - ry * 0.2);
          ctx.fillText(centerText, cx, cy + ry * 0.3);
        } else {
          const s = size * 0.8;
          ctx.strokeRect(cx - s / 2, cy - s / 2, s, s);
          ctx.strokeRect(cx - s / 2 + 6, cy - s / 2 + 6, s - 12, s - 12);
          const chars = (mainText + (centerText || "")).split("");
          const grid = Math.max(1, Math.ceil(Math.sqrt(chars.length)));
          const cellSize = (s - 20) / grid;
          ctx.font = `bold ${cellSize * 0.7}px "Noto Serif SC", serif`;
          chars.forEach((c, i) => {
            const r = Math.floor(i / grid);
            const cl = i % grid;
            ctx.fillText(c, cx - s / 2 + 10 + cl * cellSize + cellSize / 2, cy - s / 2 + 10 + r * cellSize + cellSize / 2);
          });
        }

        if (state.rough) applyRoughness();
      }

      function downloadStamp() {
        const size = parseInt($("stampSize").value, 10);
        const downloadCanvas = document.createElement("canvas");
        downloadCanvas.width = size;
        downloadCanvas.height = size;
        const dCtx = downloadCanvas.getContext("2d");
        dCtx.drawImage(
          canvas,
          (canvas.width - size) / 2,
          (canvas.height - size) / 2,
          size,
          size,
          0,
          0,
          size,
          size
        );
        const a = document.createElement("a");
        a.download = `stamp-${$("mainText").value || "seal"}.png`;
        a.href = downloadCanvas.toDataURL("image/png");
        a.click();
        showToast("电子印章已下载");
      }

      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        document.querySelectorAll(".type-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".type-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            state.type = btn.dataset.type;
            if (state.type === "personal") {
              $("mainText").value = "张三";
              $("centerText").value = "印";
            } else if (state.type === "contract") {
              $("centerText").value = "合同专用章";
            }
            render();
          });
        });
        $("roughToggle").addEventListener("click", () => {
          state.rough = !state.rough;
          $("roughToggle").classList.toggle("active", state.rough);
          render();
        });
        $("transToggle").addEventListener("click", () => {
          state.transparent = !state.transparent;
          $("transToggle").classList.toggle("active", state.transparent);
          render();
        });
        ["mainText", "centerText", "bottomText", "stampColor", "stampSize", "borderWidth"].forEach((id) => {
          $(id).addEventListener("input", render);
        });
        $("downloadBtn").addEventListener("click", downloadStamp);
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        bind();
        render();
      });
    </script>
  </body>
</html>
