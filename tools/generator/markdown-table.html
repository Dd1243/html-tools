  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">вЖ?ињФеЫЮеЈ•еЕЈеИЧи°®</a>

      <div class="card">
        <div class="controls">
          <div class="control-group">
            <label for="input----">еИЧжХ∞:</label>
            <input
              type="number"
              id="cols"
              value="3"
              min="1"
              max="20"
              onchange="resizeTable()"
              aria-label="жХ∞е≠ЧиЊУеЕ•ж°?
              placeholder="иѓЈиЊУеЕ•жХ∞е≠ЧиЊУеЕ•ж°Ж"
            />
          </div>
          <div class="control-group">
            <label for="input----">и°МжХ∞:</label>
            <input
              type="number"
              id="rows"
              value="3"
              min="1"
              max="50"
              onchange="resizeTable()"
              aria-label="жХ∞е≠ЧиЊУеЕ•ж°?
              placeholder="иѓЈиЊУеЕ•жХ∞е≠ЧиЊУеЕ•ж°Ж"
            />
          </div>
          <button class="btn" onclick="addColumn()" aria-label="+ еИ?>+ еИ?/button>
          <button class="btn" onclick="addRow()" aria-label="+ и°?>+ и°?/button>
          <button class="btn" onclick="clearTable()" aria-label="жЄЕз©Ї">жЄЕз©Ї</button>
          <button class="btn" onclick="loadSample()" aria-label="з§ЇдЊЛ">з§ЇдЊЛ</button>
        </div>

        <div class="table-editor">
          <table id="editTable"></table>
        </div>

        <h4>зФЯжИРзЪ?Markdown</h4>
        <div class="output-code" id="output"></div>
        <div class="btn-row">
          <button class="btn primary" onclick="copyMarkdown()" aria-label="е§НеИґ Markdown">
            е§НеИґ Markdown
          </button>
        </div>

        <div class="preview-table">
          <h4>йҐДиІИ</h4>
          <div id="preview"></div>
        </div>
      </div>

      <footer>
        зЇѓеЙНзЂѓеЈ•еЕ?¬Ј жЧ†жЬНеК°еЩ® ¬Ј
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      let tableData = {
        headers: ["еИ?1", "еИ?2", "еИ?3"],
        aligns: ["left", "left", "left"],
        rows: [
          ["жХ∞жНЃ 1", "жХ∞жНЃ 2", "жХ∞жНЃ 3"],
          ["жХ∞жНЃ 4", "жХ∞жНЃ 5", "жХ∞жНЃ 6"],
          ["жХ∞жНЃ 7", "жХ∞жНЃ 8", "жХ∞жНЃ 9"]
        ]
      };

      function renderEditTable() {
        const table = document.getElementById("editTable");
        let html = "<thead><tr>";

        // Header row
        tableData.headers.forEach((h, i) => {
          html += `<th><input type="text" value="${escapeHtml(h)}" onchange="updateHeader(${i}, this.value)" aria-label="жЦЗжЬђиЊУеЕ•ж°? placeholder="иѓЈиЊУеЕ•жЦЗжЬђиЊУеЕ•ж°Ж"></th>`;
        });
        html += "</tr>";

        // Align row
        html += '<tr class="align-row">';
        tableData.aligns.forEach((a, i) => {
          html += `<td><select onchange="updateAlign(${i}, this.value)">
          <option value="left" ${a === "left" ? "selected" : ""}>еЈ¶еѓєйљ?/option>
          <option value="center" ${a === "center" ? "selected" : ""}>е±ЕдЄ≠</option>
          <option value="right" ${a === "right" ? "selected" : ""}>еП≥еѓєйљ?/option>
        </select></td>`;
        });
        html += "</tr></thead><tbody>";

        // Data rows
        tableData.rows.forEach((row, ri) => {
          html += "<tr>";
          row.forEach((cell, ci) => {
            html += `<td><input type="text" value="${escapeHtml(cell)}" onchange="updateCell(${ri}, ${ci}, this.value)" aria-label="жЦЗжЬђиЊУеЕ•ж°? placeholder="иѓЈиЊУеЕ•жЦЗжЬђиЊУеЕ•ж°Ж"></td>`;
          });
          html += "</tr>";
        });

        html += "</tbody>";
        table.innerHTML = html;

        generateMarkdown();
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function updateHeader(index, value) {
        tableData.headers[index] = value;
        generateMarkdown();
      }

      function updateAlign(index, value) {
        tableData.aligns[index] = value;
        generateMarkdown();
      }

      function updateCell(row, col, value) {
        tableData.rows[row][col] = value;
        generateMarkdown();
      }

      function addColumn() {
        const colNum = tableData.headers.length + 1;
        tableData.headers.push(`еИ?${colNum}`);
        tableData.aligns.push("left");
        tableData.rows.forEach((row) => row.push(""));
        document.getElementById("cols").value = tableData.headers.length;
        renderEditTable();
      }

      function addRow() {
        const newRow = tableData.headers.map(() => "");
        tableData.rows.push(newRow);
        document.getElementById("rows").value = tableData.rows.length;
        renderEditTable();
      }

      function resizeTable() {
        const cols = parseInt(document.getElementById("cols").value) || 1;
        const rows = parseInt(document.getElementById("rows").value) || 1;

        // Resize columns
        while (tableData.headers.length < cols) {
          tableData.headers.push(`еИ?${tableData.headers.length + 1}`);
          tableData.aligns.push("left");
          tableData.rows.forEach((row) => row.push(""));
        }
        while (tableData.headers.length > cols) {
          tableData.headers.pop();
          tableData.aligns.pop();
          tableData.rows.forEach((row) => row.pop());
        }

        // Resize rows
        while (tableData.rows.length < rows) {
          tableData.rows.push(tableData.headers.map(() => ""));
        }
        while (tableData.rows.length > rows) {
          tableData.rows.pop();
        }

        renderEditTable();
      }

      function clearTable() {
        const cols = tableData.headers.length;
        const rows = tableData.rows.length;
        tableData.headers = tableData.headers.map((_, i) => `еИ?${i + 1}`);
        tableData.aligns = tableData.aligns.map(() => "left");
        tableData.rows = tableData.rows.map(() => tableData.headers.map(() => ""));
        renderEditTable();
      }

      function loadSample() {
        tableData = {
          headers: ["еКЯиГљ", "еЕНиієзЙ?, "дЄУдЄЪзЙ?, "дЉБдЄЪзЙ?],
          aligns: ["left", "center", "center", "center"],
          rows: [
            ["е≠ШеВ®з©ЇйЧі", "5 GB", "100 GB", "жЧ†йЩР"],
            ["API и∞ГзФ®", "1000/жЬ?, "10000/жЬ?, "жЧ†йЩР"],
            ["жКАжЬѓжФѓжМ?, "з§ЊеМЇ", "йВЃдїґ", "24/7 дЄУе±Ю"],
            ["дїЈж†Љ", "еЕНиіє", "$9/жЬ?, "иБФз≥їйФАеФ?]
          ]
        };
        document.getElementById("cols").value = 4;
        document.getElementById("rows").value = 4;
        renderEditTable();
      }

      function generateMarkdown() {
        // Calculate column widths
        const widths = tableData.headers.map((h, i) => {
          let max = h.length;
          tableData.rows.forEach((row) => {
            if (row[i].length > max) max = row[i].length;
          });
          return Math.max(max, 3);
        });

        // Generate markdown
        let md = "| " + tableData.headers.map((h, i) => h.padEnd(widths[i])).join(" | ") + " |\n";

        // Separator row
        md +=
          "| " +
          tableData.aligns
            .map((a, i) => {
              const w = widths[i];
              if (a === "center") return ":" + "-".repeat(w - 2) + ":";
              if (a === "right") return "-".repeat(w - 1) + ":";
              return "-".repeat(w);
            })
            .join(" | ") +
          " |\n";

        // Data rows
        tableData.rows.forEach((row) => {
          md += "| " + row.map((cell, i) => cell.padEnd(widths[i])).join(" | ") + " |\n";
        });

        document.getElementById("output").textContent = md;

        // Preview
        let previewHtml = "<table><thead><tr>";
        tableData.headers.forEach((h, i) => {
          const align = tableData.aligns[i];
          previewHtml += `<th style="text-align: ${align}">${escapeHtml(h)}</th>`;
        });
        previewHtml += "</tr></thead><tbody>";
        tableData.rows.forEach((row) => {
          previewHtml += "<tr>";
          row.forEach((cell, i) => {
            const align = tableData.aligns[i];
            previewHtml += `<td style="text-align: ${align}">${escapeHtml(cell)}</td>`;
          });
          previewHtml += "</tr>";
        });
        previewHtml += "</tbody></table>";
        document.getElementById("preview").innerHTML = previewHtml;
      }

      function copyMarkdown() {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
      }

      renderEditTable();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "рЯМЩ" : "вШАпЄ?;
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "рЯМЩ" : "вШАпЄ?;
        }
      })();
    </script>
