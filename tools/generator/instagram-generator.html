          <!-- ж“ҚдҪңжҢүй’® -->
          <div class="action-buttons">
            <button class="action-btn secondary" onclick="resetForm()">рҹ”„ йҮҚзҪ®</button>
            <button class="action-btn primary" onclick="downloadImage()">рҹ“Ҙ дёӢиҪҪеӣҫзүҮ</button>
          </div>
        </div>

        <!-- йў„и§Ҳйқўжқҝ -->
        <div class="preview-panel">
          <div class="preview-container">
            <div class="preview-title">йў„и§Ҳ</div>

            <div class="ig-post" id="igPost">
              <div class="ig-header">
                <div class="ig-avatar">
                  <img
                    id="igAvatar"
                    src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23888'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E"
                    alt="avatar"
                  />
                </div>
                <div class="ig-user-info">
                  <div class="ig-username">
                    <span id="igUsername">webutils</span>
                    <svg
                      class="ig-verified"
                      id="igVerified"
                      style="display: none"
                      viewBox="0 0 40 40"
                      fill="#3897f0"
                    >
                      <path
                        d="M19.998 3.094L14.638 0l-2.972 5.15H5.432v6.354L0 14.64l3.094 5.36L0 25.36l5.432 3.137v6.353h6.234L14.638 40l5.36-3.094L25.358 40l2.97-5.149h6.239v-6.353L40 25.36l-3.094-5.36L40 14.64l-5.432-3.137V5.15h-6.239L25.358 0l-5.36 3.094z"
                      />
                      <path
                        d="M17.796 27.29l-6.035-6.036 2.828-2.828 3.207 3.207 8.414-8.414 2.828 2.828z"
                        fill="#fff"
                      />
                    </svg>
                  </div>
                  <div class="ig-location" id="igLocation"></div>
                </div>
                <div class="ig-more">вҖўвҖўвҖ?/div>
              </div>

              <div class="ig-image-container" id="igImageContainer">
                <span class="placeholder">зӮ№еҮ»е·Ұдҫ§дёҠдј еӣҫзүҮ</span>
              </div>

              <div class="ig-actions">
                <button class="ig-action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                    />
                  </svg>
                </button>
                <button class="ig-action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                  </svg>
                </button>
                <button class="ig-action-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                  </svg>
                </button>
                <button class="ig-action-btn ig-bookmark">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                  </svg>
                </button>
              </div>

              <div class="ig-likes" id="igLikes">1,234 ж¬Ўиөһ</div>

              <div class="ig-caption" id="igCaption">
                <span class="ig-caption-username">webutils</span>
                <span id="igCaptionText">иҝҷжҳҜдёҖдёӘз”Ё WebUtils з”ҹжҲҗзҡ„зӨәдҫӢеё–еӯ?вң?/span>
                <span class="ig-hashtag" id="igHashtags">#webutils #е·Ҙе…·</span>
              </div>

              <div class="ig-comments" id="igComments">жҹҘзңӢе…ЁйғЁ 56 жқЎиҜ„и®?/div>

              <div class="ig-time" id="igTime">2е°Ҹж—¶еү?/div>
            </div>

            <div class="disclaimer">
              <strong>е…ҚиҙЈеЈ°жҳҺпј?/strong>
              жӯӨе·Ҙе…·д»…дҫӣеЁұд№җе’Ңж•ҷиӮІзӣ®зҡ„гҖӮиҜ·еӢҝз”ЁдәҺеҶ’е……д»–дәәжҲ–дј ж’ӯиҷҡеҒҮдҝЎжҒҜгҖӮInstagram жҳ?Meta
              е…¬еҸёзҡ„жіЁеҶҢе•Ҷж ҮгҖ?
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
      let currentTheme = "light";
      let avatarData = null;
      let postImageData = null;

      // жӣҙж–°йў„и§Ҳ
      function updatePreview() {
        const username = document.getElementById("username").value || "username";
        const location = document.getElementById("location").value;
        const verified = document.getElementById("verified").checked;
        const caption = document.getElementById("caption").value;
        const hashtags = document.getElementById("hashtags").value;
        const likes = document.getElementById("likes").value || "0";
        const comments = document.getElementById("comments").value || "0";
        const postTime = document.getElementById("postTime").value || "еҲҡеҲҡ";

        // жӣҙж–° DOM
        document.getElementById("igUsername").textContent = username;
        document.getElementById("igLocation").textContent = location;
        document.getElementById("igVerified").style.display = verified ? "inline" : "none";
        document.getElementById("igCaptionText").textContent = caption;
        document.getElementById("igHashtags").textContent = hashtags;
        document.getElementById("igLikes").textContent = `${likes} ж¬Ўиөһ`;
        document.getElementById("igComments").textContent =
          comments !== "0" ? `жҹҘзңӢе…ЁйғЁ ${comments} жқЎиҜ„и®ә` : "";
        document.getElementById("igTime").textContent = postTime;

        // жӣҙж–°з”ЁжҲ·еҗ?
        document.querySelector(".ig-caption-username").textContent = username + " ";
      }

      // еӨ„зҗҶеӨҙеғҸдёҠдј 
      function handleAvatarUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          avatarData = e.target.result;
          const avatarPreview = document.getElementById("avatarPreview");
          avatarPreview.innerHTML = "";
          const img = document.createElement("img");
          img.src = avatarData;
          img.alt = "avatar";
          avatarPreview.appendChild(img);
          document.getElementById("igAvatar").src = avatarData;
        };
        reader.readAsDataURL(file);
      }

      // еӨ„зҗҶеё–еӯҗеӣҫзүҮдёҠдј 
      function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          postImageData = e.target.result;
          const uploadZone = document.getElementById("imageUploadZone");
          uploadZone.innerHTML = "";
          const previewImg = document.createElement("img");
          previewImg.src = postImageData;
          previewImg.alt = "post image";
          uploadZone.appendChild(previewImg);
          uploadZone.classList.add("has-image");

          const igContainer = document.getElementById("igImageContainer");
          igContainer.innerHTML = "";
          const postImg = document.createElement("img");
          postImg.src = postImageData;
          postImg.alt = "post";
          igContainer.appendChild(postImg);
        };
        reader.readAsDataURL(file);
      }

      // и®ҫзҪ®дё»йўҳ
      function setTheme(theme) {
        currentTheme = theme;
        const post = document.getElementById("igPost");

        if (theme === "dark") {
          post.classList.add("dark");
        } else {
          post.classList.remove("dark");
        }

        // жӣҙж–°жҢүй’®зҠ¶жҖ?
        document.querySelectorAll(".toggle-btn").forEach((btn) => {
          btn.classList.remove("active");
          if (btn.dataset.theme === theme) {
            btn.classList.add("active");
          }
        });
      }

      // дёӢиҪҪеӣҫзүҮ
      async function downloadImage() {
        const post = document.getElementById("igPost");

        try {
          const canvas = await html2canvas(post, {
            scale: 2,
            backgroundColor: currentTheme === "dark" ? "#000" : "#fff",
            useCORS: true
          });

          const link = document.createElement("a");
          link.download = "instagram-post.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        } catch (err) {
          console.error("еҜјеҮәеӨұиҙҘ:", err);
          alert("еҜјеҮәеӨұиҙҘпјҢиҜ·йҮҚиҜ•");
        }
      }

      // йҮҚзҪ®иЎЁеҚ•
      function resetForm() {
        document.getElementById("username").value = "webutils";
        document.getElementById("location").value = "";
        document.getElementById("verified").checked = false;
        document.getElementById("caption").value = "иҝҷжҳҜдёҖдёӘз”Ё WebUtils з”ҹжҲҗзҡ„зӨәдҫӢеё–еӯ?вң?;
        document.getElementById("hashtags").value = "#webutils #е·Ҙе…·";
        document.getElementById("likes").value = "1,234";
        document.getElementById("comments").value = "56";
        document.getElementById("postTime").value = "2е°Ҹж—¶еү?;

        // йҮҚзҪ®еӨҙеғҸ
        avatarData = null;
        document.getElementById("avatarPreview").innerHTML = '<span class="placeholder">рҹ‘Ө</span>';
        document.getElementById("igAvatar").src =
          "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23888'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

        // йҮҚзҪ®её–еӯҗеӣҫзүҮ
        postImageData = null;
        document.getElementById("imageUploadZone").innerHTML =
          '<span class="placeholder-text">зӮ№еҮ»дёҠдј еӣҫзүҮпј?:1 жҜ”дҫӢжңҖдҪіпјү</span>';
        document.getElementById("imageUploadZone").classList.remove("has-image");
        document.getElementById("igImageContainer").innerHTML =
          '<span class="placeholder">зӮ№еҮ»е·Ұдҫ§дёҠдј еӣҫзүҮ</span>';

        setTheme("light");
        updatePreview();
      }

      // еҲқе§ӢеҢ?
      updatePreview();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "вҳҖпё? : "рҹҢҷ";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "вҳҖпё?;
      }
    </script>
  </body>
</html>
