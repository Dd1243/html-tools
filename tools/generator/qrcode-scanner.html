    <div id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const video = $("video");
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const LS_KEY = "qr_scanner_history_v2";
      let stream = null;
      let isScanning = false;
      let lastResult = "";

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        $("themeBtn").textContent = theme === "dark" ? "🌙" : "☀️";
        localStorage.setItem("qr-scanner-theme", theme);
      }

      function initTheme() {
        setTheme(localStorage.getItem("qr-scanner-theme") || "light");
      }

      function switchTab(tab) {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
        $("cameraView").style.display = tab === "camera" ? "block" : "none";
        $("uploadView").style.display = tab === "upload" ? "block" : "none";
        if (tab !== "camera") stopCamera();
      }

      async function startCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } }
          });
          video.srcObject = stream;
          $("startBtn").style.display = "none";
          $("stopBtn").style.display = "inline-flex";
          isScanning = true;
          requestAnimationFrame(scanLoop);
          showToast("摄像头已就绪");
        } catch (err) {
          showToast("无法访问摄像头: " + err.message);
        }
      }

      function stopCamera() {
        isScanning = false;
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        video.srcObject = null;
        $("startBtn").style.display = "inline-flex";
        $("stopBtn").style.display = "none";
      }

      function scanLoop() {
        if (!isScanning) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code && code.data) {
            handleResult(code.data);
            stopCamera();
            return;
          }
        }
        requestAnimationFrame(scanLoop);
      }

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            $("previewImage").src = e.target.result;
            $("previewImage").style.display = "block";
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code && code.data) handleResult(code.data);
            else showToast("未检测到二维码");
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function handleResult(data) {
        lastResult = data;
        $("resultText").textContent = data;
        $("resultPanel").classList.add("show");
        $("openLinkBtn").style.display = /^(https?:\/\/)/i.test(data) ? "inline-flex" : "none";
        addToHistory(data);
        showToast("识别成功");
      }

      function copyResult() {
        if (!lastResult) return;
        navigator.clipboard.writeText(lastResult).then(() => showToast("已复制到剪贴板"));
      }

      function openLink() {
        if (!lastResult) return;
        window.open(lastResult, "_blank", "noopener,noreferrer");
      }

      function addToHistory(content) {
        let history = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
        history = history.filter((item) => item.content !== content);
        history.unshift({ content, time: new Date().toLocaleString() });
        if (history.length > 12) history = history.slice(0, 12);
        localStorage.setItem(LS_KEY, JSON.stringify(history));
        renderHistory();
      }

      function renderHistory() {
        const history = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
        const list = $("historyList");
        if (!history.length) {
          list.innerHTML = '<div class="empty">暂无历史记录</div>';
          return;
        }
        list.innerHTML = history.map((item, idx) => `
          <div class="history-item" data-idx="${idx}">
            <div class="history-text">${escapeHtml(item.content)}</div>
            <div class="history-time">${escapeHtml(item.time)}</div>
          </div>
        `).join("");
        list.querySelectorAll(".history-item").forEach((el) => {
          el.addEventListener("click", () => {
            const i = parseInt(el.dataset.idx, 10);
            handleResult(history[i].content);
          });
        });
      }

      function clearHistory() {
        localStorage.removeItem(LS_KEY);
        renderHistory();
        showToast("历史已清空");
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function bind() {
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });
        $("startBtn").addEventListener("click", startCamera);
        $("stopBtn").addEventListener("click", stopCamera);
        $("copyBtn").addEventListener("click", copyResult);
        $("openLinkBtn").addEventListener("click", openLink);
        $("clearHistoryBtn").addEventListener("click", clearHistory);
        $("uploadArea").addEventListener("click", () => $("fileInput").click());
        $("fileInput").addEventListener("change", (e) => handleFile(e.target.files[0]));
        ["dragenter", "dragover"].forEach((ev) => {
          $("uploadArea").addEventListener(ev, (e) => {
            e.preventDefault();
            $("uploadArea").style.borderColor = "var(--primary)";
          });
        });
        ["dragleave", "drop"].forEach((ev) => {
          $("uploadArea").addEventListener(ev, (e) => {
            e.preventDefault();
            $("uploadArea").style.borderColor = "";
          });
        });
        $("uploadArea").addEventListener("drop", (e) => {
          const file = e.dataTransfer.files && e.dataTransfer.files[0];
          handleFile(file);
        });
        $("themeBtn").addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        bind();
        renderHistory();
      });
    </script>
