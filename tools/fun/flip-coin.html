    <style>
        :root {
            --bg-deep: #ffffff;
            --accent-pink: #ff006e;
            --accent-purple: #8338ec;
            --accent-cyan: #06d6a0;
            --accent-yellow: #ffbe0b;
            --text-main: #1a1a1a;
            --brutalist-shadow: 8px 8px 0px 0px #000;
            --card-bg: #ffffff;
            --border-width: 3px;
        }

        @font-face {
            font-family: 'Space Grotesk';
            src: url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', 'PingFang SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden; /* 防止移动端回弹 */
            touch-action: none; /* 禁用系统手势 */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        header {
            padding: 1rem;
            text-align: center;
            border-bottom: var(--border-width) solid #000;
            background: #fff;
            position: relative;
            z-index: 10;
        }

        .back-link {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            border: 2px solid #000;
            padding: 4px 8px;
            background: var(--accent-cyan);
            box-shadow: 2px 2px 0px #000;
            font-size: 0.8rem;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            display: inline-block;
            background: var(--accent-yellow);
            padding: 2px 10px;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
        }

        #game-canvas {
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
            cursor: crosshair;
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            width: 80%;
        }

        .instructions p {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px #fff;
        }

        .instructions span {
            background: var(--accent-pink);
            color: #fff;
            padding: 2px 8px;
            border: 2px solid #000;
            font-size: 0.9rem;
        }

        /* 触碰反馈圆圈 */
        .touch-circle {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #000;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 5;
        }

        .touch-circle.active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* 结果弹窗 */
        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
            padding: 2rem;
        }

        .result-card {
            background: #fff;
            border: 4px solid #000;
            padding: 2rem;
            box-shadow: 12px 12px 0px #000;
            text-align: center;
            max-width: 90%;
        }

        .result-card h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-purple);
            text-transform: uppercase;
        }

        .result-card p {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .btn {
            background: var(--accent-cyan);
            border: 3px solid #000;
            padding: 10px 24px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* 下方功能栏 */
        .toolbar {
            padding: 1rem;
            background: #fff;
            border-top: var(--border-width) solid #000;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .tool-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 2px solid #000;
            background: #f0f0f0;
            cursor: pointer;
            text-align: center;
        }

        .tool-btn.active {
            background: var(--accent-yellow);
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        /* 特效线 */
        .connection-line {
            position: absolute;
            height: 4px;
            background: #000;
            transform-origin: left center;
            pointer-events: none;
            z-index: 1;
        }

        /* 广告占位 */
        .ad-mini {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #ccc;
            border: 1px dashed #ddd;
            padding: 2px 10px;
        }

</head>
<body>
    <div class="bg-grid"></div>

    <header>
        <a href="../../index.html" class="back-link">返回</a>
        <h1>指尖大冒险</h1>
    </header>

    <div id="game-canvas">
        <div class="instructions" id="hint">
            <p>每个玩家放下一个手指</p>
            <span>至少需要 2 人参与</span>
        </div>
        <div class="ad-mini">AD PLACEHOLDER</div>
    </div>

    <div class="toolbar">
        <button class="tool-btn active" onclick="setMode('single')">☝️ 单人中奖</button>
        <button class="tool-btn" onclick="setMode('group')">👥 随机分组</button>
        <button class="tool-btn" onclick="setMode('truth')">😈 真心话大冒险</button>
    </div>

    <div id="result-overlay">
        <div class="result-card">
            <h2 id="res-title">选中者！</h2>
            <p id="res-desc">就是你啦，别想逃！</p>
            <button class="btn" onclick="resetGame()">再次开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const hint = document.getElementById('hint');
        const overlay = document.getElementById('result-overlay');
        const resTitle = document.getElementById('res-title');
        const resDesc = document.getElementById('res-desc');
        
        let touches = new Map();
        let gameMode = 'single'; // single, group, truth
        let isSpinning = false;
        let countdownTimer = null;
        const COLORS = ['#ff006e', '#8338ec', '#3a86ff', '#06d6a0', '#ffbe0b', '#fb5607', '#ff0054', '#9ef01a'];

        const TRUTH_DARE = [
            "大冒险：去问路人要微信",
            "真心话：你最尴尬的一件事是什么？",
            "大冒险：模仿猩猩大喊三声",
            "真心话：你最后悔的一件事？",
            "大冒险：喝下一整杯不明液体",
            "真心话：在场你觉得谁最帅/美？",
            "大冒险：发朋友圈说“我好美”并保留10分钟",
            "真心话：你收过最奇葩的礼物是什么？"
        ];

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetGame();
        }

        function createTouchUI(id, x, y) {
            const el = document.createElement('div');
            el.className = 'touch-circle';
            el.id = `touch-${id}`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.borderColor = COLORS[id % COLORS.length];
            el.style.backgroundColor = `${COLORS[id % COLORS.length]}33`;
            canvas.appendChild(el);
            setTimeout(() => el.classList.add('active'), 10);
            return el;
        }

        function handleStart(e) {
            if (isSpinning) return;
            e.preventDefault();
            
            const changedTouches = e.changedTouches || [e];
            for (let t of changedTouches) {
                const id = t.identifier || 0;
                const x = t.clientX;
                const y = t.clientY - canvas.offsetTop;
                
                if (!touches.has(id)) {
                    const el = createTouchUI(id, x, y);
                    touches.set(id, { x, y, el });
                }
            }

            checkStart();
        }

        function handleMove(e) {
            if (isSpinning) return;
            e.preventDefault();
            const changedTouches = e.changedTouches || [e];
            for (let t of changedTouches) {
                const id = t.identifier || 0;
                if (touches.has(id)) {
                    const data = touches.get(id);
                    data.x = t.clientX;
                    data.y = t.clientY - canvas.offsetTop;
                    data.el.style.left = `${data.x}px`;
                    data.el.style.top = `${data.y}px`;
                }
            }
        }

        function handleEnd(e) {
            if (isSpinning) return;
            e.preventDefault();
            const changedTouches = e.changedTouches || [e];
            for (let t of changedTouches) {
                const id = t.identifier || 0;
                if (touches.has(id)) {
                    const data = touches.get(id);
                    data.el.remove();
                    touches.delete(id);
                }
            }
            checkStart();
        }

        function checkStart() {
            if (touches.size >= 2) {
                hint.style.opacity = '0.3';
                if (!countdownTimer) {
                    countdownTimer = setTimeout(runGame, 2000);
                }
            } else {
                hint.style.opacity = '1';
                clearTimeout(countdownTimer);
                countdownTimer = null;
            }
        }

        function runGame() {
            if (touches.size < 2) return;
            isSpinning = true;
            
            // 振动反馈
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            const touchArray = Array.from(touches.values());
            const winnerIdx = Math.floor(Math.random() * touchArray.length);

            // 闪烁特效
            let flashCount = 0;
            const flashInt = setInterval(() => {
                touchArray.forEach((t, i) => {
                    t.el.style.opacity = (flashCount % 2 === 0) ? '0.5' : '1';
                });
                flashCount++;
                if (flashCount > 6) {
                    clearInterval(flashInt);
                    showResult(touchArray, winnerIdx);
                }
            }, 100);
        }

        function showResult(touchArray, winnerIdx) {
            overlay.style.display = 'flex';
            
            if (gameMode === 'single') {
                resTitle.textContent = "中奖啦！";
                resDesc.textContent = "这位小伙伴，今晚的单就你买了吧！";
                touchArray[winnerIdx].el.style.transform = 'translate(-50%, -50%) scale(1.5)';
                touchArray[winnerIdx].el.style.borderWidth = '10px';
            } else if (gameMode === 'group') {
                resTitle.textContent = "分组完成";
                resDesc.textContent = "按照圆圈颜色，大家分成两组准备战斗！";
            } else if (gameMode === 'truth') {
                resTitle.textContent = "大挑战！";
                resDesc.textContent = TRUTH_DARE[Math.floor(Math.random() * TRUTH_DARE.length)];
            }
        }

        function resetGame() {
            overlay.style.display = 'none';
            touches.forEach(t => t.el.remove());
            touches.clear();
            isSpinning = false;
            countdownTimer = null;
            hint.style.opacity = '1';
        }

        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('touchcancel', handleEnd);

        // PC端模拟
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);

    </script>
</body>
