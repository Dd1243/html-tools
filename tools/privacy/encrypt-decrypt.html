    <script>
      var state = { mode: "encrypt" };
      var elements = {
        input: document.getElementById("input"),
        password: document.getElementById("password"),
        keyLength: document.getElementById("keyLength"),
        outputFormat: document.getElementById("outputFormat"),
        output: document.getElementById("output"),
        error: document.getElementById("error"),
        processBtn: document.getElementById("processBtn"),
        clearBtn: document.getElementById("clearBtn"),
        copyBtn: document.getElementById("copyBtn"),
        togglePassword: document.getElementById("togglePassword"),
        inputLabel: document.getElementById("input-label"),
        outputLabel: document.getElementById("output-label"),
        modeTabs: document.querySelectorAll(".mode-tab")
      };

      function arrayBufferToBase64(buffer) {
        var bytes = new Uint8Array(buffer),
          binary = "";
        for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
      }
      function base64ToArrayBuffer(base64) {
        var binary = atob(base64),
          bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes.buffer;
      }
      function arrayBufferToHex(buffer) {
        return Array.from(new Uint8Array(buffer))
          .map(function (b) {
            return b.toString(16).padStart(2, "0");
          })
          .join("");
      }
      function hexToArrayBuffer(hex) {
        if (hex.length % 2 !== 0) throw new Error("Hex 字符串长度必须为偶数");
        var bytes = new Uint8Array(hex.length / 2);
        for (var i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
        return bytes.buffer;
      }

      async function deriveKey(password, salt, keyLength) {
        var encoder = new TextEncoder();
        var passwordKey = await crypto.subtle.importKey(
          "raw",
          encoder.encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
          passwordKey,
          { name: "AES-GCM", length: keyLength },
          false,
          ["encrypt", "decrypt"]
        );
      }

      async function encrypt(plaintext, password, keyLength, format) {
        var encoder = new TextEncoder();
        var salt = crypto.getRandomValues(new Uint8Array(16));
        var iv = crypto.getRandomValues(new Uint8Array(12));
        var key = await deriveKey(password, salt, keyLength);
        var encrypted = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv: iv },
          key,
          encoder.encode(plaintext)
        );
        var combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return format === "hex"
          ? arrayBufferToHex(combined.buffer)
          : arrayBufferToBase64(combined.buffer);
      }

      async function decrypt(ciphertext, password, keyLength, format) {
        var combined = new Uint8Array(
          format === "hex" ? hexToArrayBuffer(ciphertext) : base64ToArrayBuffer(ciphertext)
        );
        var salt = combined.slice(0, 16),
          iv = combined.slice(16, 28),
          data = combined.slice(28);
        var key = await deriveKey(password, salt, keyLength);
        var decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
        return new TextDecoder().decode(decrypted);
      }

      function updateMode(mode) {
        state.mode = mode;
        elements.modeTabs.forEach(function (tab) {
          tab.classList.toggle("active", tab.dataset.mode === mode);
        });
        if (mode === "encrypt") {
          elements.inputLabel.textContent = "明文";
          elements.outputLabel.textContent = "密文";
          elements.input.placeholder = "输入要加密的文本...";
          elements.processBtn.textContent = "🔐 加密";
        } else {
          elements.inputLabel.textContent = "密文";
          elements.outputLabel.textContent = "明文";
          elements.input.placeholder = "输入要解密的密文...";
          elements.processBtn.textContent = "🔓 解密";
        }
        elements.output.textContent = "";
        elements.error.textContent = "";
      }

      elements.modeTabs.forEach(function (tab) {
        tab.addEventListener("click", function () {
          updateMode(tab.dataset.mode);
        });
      });

      elements.processBtn.addEventListener("click", async function () {
        var input = elements.input.value.trim();
        var password = elements.password.value;
        var keyLength = parseInt(elements.keyLength.value);
        var format = elements.outputFormat.value;
        if (!input) {
          elements.error.textContent = "请输入内容";
          return;
        }
        if (!password) {
          elements.error.textContent = "请输入密码";
          return;
        }
        try {
          var result =
            state.mode === "encrypt"
              ? await encrypt(input, password, keyLength, format)
              : await decrypt(input, password, keyLength, format);
          elements.output.textContent = result;
          elements.error.textContent = "";
        } catch (err) {
          elements.output.textContent = "";
          elements.error.textContent =
            state.mode === "decrypt"
              ? "解密失败：密码错误、密钥长度不一致或密文格式不正确"
              : "加密失败：" + err.message;
        }
      });

      elements.clearBtn.addEventListener("click", function () {
        elements.input.value = "";
        elements.password.value = "";
        elements.output.textContent = "";
        elements.error.textContent = "";
      });

      elements.copyBtn.addEventListener("click", async function () {
        var text = elements.output.textContent;
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          elements.copyBtn.textContent = "已复制";
          elements.copyBtn.classList.add("copied");
          setTimeout(function () {
            elements.copyBtn.textContent = "复制";
            elements.copyBtn.classList.remove("copied");
          }, 2000);
        } catch (err) {
          elements.error.textContent = "复制失败，请手动复制";
        }
      });

      elements.togglePassword.addEventListener("click", function () {
        var isPass = elements.password.type === "password";
        elements.password.type = isPass ? "text" : "password";
        elements.togglePassword.textContent = isPass ? "隐藏" : "显示";
      });

      updateMode("encrypt");
    </script>
<!-- FAQ（GEO 优化）-->
</body>
</html>
