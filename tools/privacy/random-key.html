    <script>
      var outputEl = document.getElementById("output");
      var lengthEl = document.getElementById("length");
      var formatEl = document.getElementById("format");
      var charsetEl = document.getElementById("charsetOptions");

      function generate() {
        var length = parseInt(lengthEl.value) || 32;
        var format = formatEl.value;
        var result = "";

        if (format === "hex") {
          var bytes = new Uint8Array(Math.ceil(length / 2));
          crypto.getRandomValues(bytes);
          result = Array.from(bytes)
            .map(function (b) {
              return b.toString(16).padStart(2, "0");
            })
            .join("")
            .substring(0, length);
        } else if (format === "base64") {
          var bytes = new Uint8Array(Math.ceil(length * 0.75));
          crypto.getRandomValues(bytes);
          result = btoa(String.fromCharCode.apply(null, bytes))
            .replace(/=/g, "")
            .substring(0, length);
        } else {
          var charset = "";
          if (document.getElementById("uppercase").checked) charset += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
          if (document.getElementById("lowercase").checked) charset += "abcdefghijklmnopqrstuvwxyz";
          if (document.getElementById("numbers").checked) charset += "0123456789";
          if (document.getElementById("symbols").checked) charset += "!@#$%^&*()_+-=[]{}|;:,.<>?";
          if (format === "ascii" && !document.getElementById("symbols").checked)
            charset += "!@#$%^&*()_+-=[]{}|;:,.<>?";
          if (!charset) charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
          var bytes = new Uint8Array(length);
          crypto.getRandomValues(bytes);
          for (var i = 0; i < length; i++) result += charset[bytes[i] % charset.length];
        }

        outputEl.textContent = result;
      }

      function generateUUID() {
        var bytes = new Uint8Array(16);
        crypto.getRandomValues(bytes);
        bytes[6] = (bytes[6] & 0x0f) | 0x40;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        var hex = Array.from(bytes)
          .map(function (b) {
            return b.toString(16).padStart(2, "0");
          })
          .join("");
        outputEl.textContent =
          hex.substr(0, 8) +
          "-" +
          hex.substr(8, 4) +
          "-" +
          hex.substr(12, 4) +
          "-" +
          hex.substr(16, 4) +
          "-" +
          hex.substr(20, 12);
      }

      // Preset buttons
      document.querySelectorAll(".preset").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".preset").forEach(function (p) {
            p.classList.remove("active");
          });
          btn.classList.add("active");
          var preset = btn.dataset.preset;
          switch (preset) {
            case "api":
              lengthEl.value = 32;
              formatEl.value = "alphanumeric";
              generate();
              break;
            case "secret":
              lengthEl.value = 64;
              formatEl.value = "alphanumeric";
              generate();
              break;
            case "token":
              lengthEl.value = 128;
              formatEl.value = "base64";
              generate();
              break;
            case "uuid":
              generateUUID();
              break;
            case "aes128":
              lengthEl.value = 32;
              formatEl.value = "hex";
              generate();
              break;
            case "aes256":
              lengthEl.value = 64;
              formatEl.value = "hex";
              generate();
              break;
          }
        });
      });

      document.getElementById("btnGenerate").addEventListener("click", function () {
        var activePreset = document.querySelector(".preset.active");
        if (activePreset && activePreset.dataset.preset === "uuid") generateUUID();
        else generate();
      });

      document.getElementById("btnCopy").addEventListener("click", async function () {
        var key = outputEl.textContent;
        if (!key || key === "点击「生成」按钮开始") return;
        try {
          await navigator.clipboard.writeText(key);
          var btn = document.getElementById("btnCopy");
          btn.textContent = "✓ 已复制！";
          setTimeout(function () {
            btn.textContent = "📋 复制密钥";
          }, 1500);
        } catch (e) {
          alert("复制失败，请手动选择复制");
        }
      });

      lengthEl.addEventListener("input", generate);
      formatEl.addEventListener("change", generate);
      document.querySelectorAll(".checkbox-group input").forEach(function (cb) {
        cb.addEventListener("change", generate);
      });

      generate();
    </script>
