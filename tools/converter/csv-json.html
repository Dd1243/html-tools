      window.toggleTheme = function () {

      // УДБТъљ CSV
      function parseCSV(csv) {
        const delimiter =
          document.getElementById("delimiter").value === "\\t"
            ? "\t"
            : document.getElementById("delimiter").value;
        const hasHeader = document.getElementById("hasHeader").checked;
        const trimValues = document.getElementById("trimValues").checked;
        const skipEmpty = document.getElementById("skipEmpty").checked;

        let lines = csv.split(/\r?\n/);
        if (skipEmpty) {
          lines = lines.filter((line) => line.trim() !== "");
        }

        if (lines.length === 0) return [];

        const result = [];
        let headers = [];

        // УДБТъљтЇЋУАї№╝їтцёуљєт╝ЋтЈ?
        function parseLine(line) {
          const values = [];
          let current = "";
          let inQuotes = false;

          for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];

            if (char === '"') {
              if (inQuotes && nextChar === '"') {
                current += '"';
                i++;
              } else {
                inQuotes = !inQuotes;
              }
            } else if (char === delimiter && !inQuotes) {
              values.push(trimValues ? current.trim() : current);
              current = "";
            } else {
              current += char;
            }
          }
          values.push(trimValues ? current.trim() : current);
          return values;
        }

        if (hasHeader && lines.length > 0) {
          headers = parseLine(lines[0]);
          lines = lines.slice(1);
        }

        lines.forEach((line, index) => {
          if (line.trim() === "" && skipEmpty) return;

          const values = parseLine(line);

          if (hasHeader) {
            const obj = {};
            headers.forEach((header, i) => {
              let value = values[i] || "";
              // т░ЮУ»ЋУйгТЇбТЋ░тГЌ
              if (value !== "" && !isNaN(value) && !isNaN(parseFloat(value))) {
                value = parseFloat(value);
              }
              obj[header] = value;
            });
            result.push(obj);
          } else {
            result.push(values);
          }
        });

        return result;
      }

      // CSV Уй?JSON
      function csvToJson() {
        const csv = document.getElementById("csvInput").value.trim();
        if (!csv) {
          showStatus("У»иУЙЊтЁ?CSV тєЁт«╣", "error");
          return;
        }

        try {
          const data = parseCSV(csv);
          const json = JSON.stringify(data, null, 2);
          document.getElementById("jsonInput").value = json;
          updateStats("json");
          renderPreviewTable(data);
          showStatus("CSV Рє?JSON УйгТЇбТѕљтіЪ№╝їтЁ▒ " + data.length + " ТЮАУ«░тй?, "success");
        } catch (e) {
          showStatus("CSV УДБТъљжћЎУ»»: " + e.message, "error");
        }
      }

      // JSON Уй?CSV
      function jsonToCsv() {
        const jsonStr = document.getElementById("jsonInput").value.trim();
        if (!jsonStr) {
          showStatus("У»иУЙЊтЁ?JSON тєЁт«╣", "error");
          return;
        }

        try {
          const data = JSON.parse(jsonStr);
          if (!Array.isArray(data)) {
            showStatus("JSON т┐ЁжА╗Тў»ТЋ░у╗ёТа╝т╝?, "error");
            return;
          }

          if (data.length === 0) {
            showStatus("JSON ТЋ░у╗ёСИ║уЕ║", "error");
            return;
          }

          const delimiter =
            document.getElementById("delimiter").value === "\\t"
              ? "\t"
              : document.getElementById("delimiter").value;
          const hasHeader = document.getElementById("hasHeader").checked;

          let csv = "";

          // УјитЈќТЅђТюЅжћ«
          const allKeys = new Set();
          data.forEach((item) => {
            if (typeof item === "object" && item !== null) {
              Object.keys(item).forEach((key) => allKeys.add(key));
            }
          });
          const headers = Array.from(allKeys);

          // УйгС╣ЅтЄйТЋ░
          function escapeValue(val) {
            if (val === null || val === undefined) return "";
            const str = String(val);
            if (str.includes(delimiter) || str.includes('"') || str.includes("\n")) {
              return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
          }

          // тдѓТъюТў»т»╣У▒АТЋ░у╗?
          if (typeof data[0] === "object" && !Array.isArray(data[0])) {
            if (hasHeader) {
              csv += headers.map(escapeValue).join(delimiter) + "\n";
            }
            data.forEach((item) => {
              const row = headers.map((key) => escapeValue(item[key]));
              csv += row.join(delimiter) + "\n";
            });
          } else {
            // тдѓТъюТў»у«ђтЇЋТЋ░у╗?
            data.forEach((item) => {
              if (Array.isArray(item)) {
                csv += item.map(escapeValue).join(delimiter) + "\n";
              } else {
                csv += escapeValue(item) + "\n";
              }
            });
          }

          document.getElementById("csvInput").value = csv.trim();
          updateStats("csv");
          renderPreviewTable(data);
          showStatus("JSON Рє?CSV УйгТЇбТѕљтіЪ№╝їтЁ▒ " + data.length + " ТЮАУ«░тй?, "success");
        } catch (e) {
          showStatus("JSON УДБТъљжћЎУ»»: " + e.message, "error");
        }
      }

      // ТИ▓ТЪЊжбёУДѕУАеТа╝
      function renderPreviewTable(data) {
        const container = document.getElementById("previewTable");
        if (!data || data.length === 0) {
          container.textContent = "";
          return;
        }

        const maxRows = 10;
        const displayData = data.slice(0, maxRows);

        const table = document.createElement("table");

        // УАетц┤
        if (typeof data[0] === "object" && !Array.isArray(data[0])) {
          const headers = Object.keys(data[0]);
          const thead = document.createElement("thead");
          const headerRow = document.createElement("tr");
          headers.forEach((h) => {
            const th = document.createElement("th");
            th.textContent = h;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);
          table.appendChild(thead);

          // ТЋ░ТЇ«УА?
          const tbody = document.createElement("tbody");
          displayData.forEach((row) => {
            const tr = document.createElement("tr");
            headers.forEach((h) => {
              const td = document.createElement("td");
              td.textContent = row[h] !== undefined ? String(row[h]) : "";
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
        }

        container.textContent = "";
        if (data.length > maxRows) {
          const info = document.createElement("p");
          info.style.fontSize = "0.75rem";
          info.style.color = "var(--muted-color)";
          info.textContent = "ТўЙуц║тЅ?" + maxRows + " ТЮА№╝їтЁ?" + data.length + " ТЮАУ«░тй?;
          container.appendChild(info);
        }
        container.appendChild(table);
      }

      // Та╝т╝Јтї?JSON
      window.formatJSON = function () {
        const jsonInput = document.getElementById("jsonInput");
        try {
          const obj = JSON.parse(jsonInput.value);
          jsonInput.value = JSON.stringify(obj, null, 2);
          updateStats("json");
        } catch (e) {
          showStatus("JSON Та╝т╝ЈжћЎУ»»", "error");
        }
      };

      // ТЏ┤Тќ░у╗ЪУ«А
      function updateStats(type) {
        const textarea = document.getElementById(type + "Input");
        const stats = document.getElementById(type + "Stats");
        const content = textarea.value;

        const chars = content.length;
        const lines = content ? content.split("\n").length : 0;
        stats.textContent = chars + " тГЌугд | " + lines + " УА?;

        if (type === "json") {
          const valid = document.getElementById("jsonValid");
          if (content.trim()) {
            try {
              JSON.parse(content);
              valid.textContent = "Рю?ТюЅТЋѕ";
              valid.style.color = "var(--accent-green)";
            } catch {
              valid.textContent = "Рю?ТЌаТЋѕ";
              valid.style.color = "var(--accent-red)";
            }
          } else {
            valid.textContent = "";
          }
        }
      }

      // ТќЄС╗ХСИіС╝а
      window.handleFileUpload = function (event, type) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const content = e.target.result;
          document.getElementById(type + "Input").value = content;
          updateStats(type);

          if (type === "csv") {
            csvToJson();
          } else {
            jsonToCsv();
          }
        };
        reader.readAsText(file);
      };

      // ТўЙуц║уіХТђ?
      function showStatus(message, type) {
        const bar = document.getElementById("statusBar");
        bar.textContent = message;
        bar.className = "status-bar " + type;
        setTimeout(() => {
          bar.className = "status-bar";
        }, 3000);
      }

      // тцЇтѕХТќЄТюг
      window.copyText = function (id) {
        navigator.clipboard.writeText(document.getElementById(id).value).then(() => {
          showStatus("ти▓тцЇтѕХтѕ░тЅфУ┤┤ТЮ?, "success");
        });
      };

      // ТИЁжЎцТќЄТюг
      window.clearText = function (id) {
        document.getElementById(id).value = "";
        updateStats(id.replace("Input", ""));
        document.getElementById("previewTable").textContent = "";
      };

      // СИІУййТќЄС╗Х
      window.downloadFile = function (type) {
        const content = document.getElementById(type + "Input").value;
        if (!content) {
          showStatus("Т▓АТюЅтєЁт«╣тЈ»СИІУй?, "error");
          return;
        }

        const ext = type === "csv" ? ".csv" : ".json";
        const mime = type === "csv" ? "text/csv;charset=utf-8" : "application/json";
        const blob = new Blob(["\ufeff" + content], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "data" + ext;
        a.click();
        URL.revokeObjectURL(url);
      };

      // тѕЮтДІтї?
      initTheme();
      loadSample("users");
    </script>
  </body>
</html>
