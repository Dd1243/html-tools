<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TOOL_NAME}} - 专业商业决策分析工具 - WebUtils</title>
    
    <!-- HTTP Headers Simulation / Meta Tags -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="{{TOOL_DESCRIPTION}}">
    <meta name="keywords" content="{{TOOL_KEYWORDS}}">
    <meta name="author" content="WebUtils">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://essays4u.net/tools/business/{{TOOL_SLUG}}">
    <meta property="og:title" content="{{TOOL_NAME}} - WebUtils">
    <meta property="og:description" content="{{TOOL_DESCRIPTION}}">
    <meta property="og:image" content="https://essays4u.net/assets/img/og-business.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://essays4u.net/tools/business/{{TOOL_SLUG}}">
    <meta property="twitter:title" content="{{TOOL_NAME}} - WebUtils">
    <meta property="twitter:description" content="{{TOOL_DESCRIPTION}}">
    <meta property="twitter:image" content="https://essays4u.net/assets/img/og-business.png">

    <!-- Canonical -->
    <link rel="canonical" href="https://essays4u.net/tools/business/{{TOOL_SLUG}}">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "{{TOOL_NAME}}",
      "url": "https://essays4u.net/tools/business/{{TOOL_SLUG}}",
      "description": "{{TOOL_DESCRIPTION}}",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-surface: #12121a;
            --bg-card: #1a1a24;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent-cyan: #00f5d4;
            --accent-magenta: #f72585;
            --accent-green: #10b981;
            --border-subtle: #2a2a3a;
            --radius-lg: 12px;
            --font-sans: 'Space Grotesk', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-subtle: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* AdSense Placeholder */
        .ad-slot {
            background: rgba(128, 128, 128, 0.05);
            border: 1px dashed var(--border-subtle);
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            min-height: 90px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Layout */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .tool-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent-cyan); outline: none; }

        .btn-primary {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); }

        /* Results Sidebar/Panel */
        .dashboard-item {
            background: var(--bg-surface);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid var(--accent-cyan);
        }
        .dashboard-label { font-size: 0.85rem; color: var(--text-secondary); }
        .dashboard-value { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); color: var(--accent-cyan); }

        /* Article Section */
        article {
            margin-top: 60px;
            padding: 40px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
        }
        article h2 { margin: 30px 0 20px; color: var(--accent-cyan); }
        article h3 { margin: 25px 0 15px; }
        article p { margin-bottom: 15px; color: var(--text-secondary); }
        article ul { margin: 15px 0 25px 20px; color: var(--text-secondary); }
        article li { margin-bottom: 10px; }

        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent-cyan); text-decoration: none; }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            z-index: 100;
            background: var(--bg-card);
            padding: 10px;
            border-radius: 50%;
            border: 1px solid var(--border-subtle);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="container">
        <a href="../../index.html" class="back-link">← 返回工具库</a>
        
        <div class="ad-slot">Google AdSense - Top Banner</div>

        <header>
            <h1>{{TOOL_NAME}}</h1>
            <p>{{TOOL_SUBTITLE}}</p>
        </header>

        <main class="tool-grid">
            <section class="card">
                <!-- Input Controls Area -->
                {{TOOL_INPUTS}}
            </section>

            <aside>
                <div class="card">
                    <h2 style="font-size: 1.2rem; margin-bottom: 20px;">📊 实时看板</h2>
                    {{TOOL_DASHBOARD}}
                    <div class="ad-slot" style="min-height: 250px;">Google AdSense - Sidebar</div>
                </div>
            </aside>
        </main>

        <div class="ad-slot">Google AdSense - In-Content</div>

        <article>
            <!-- SEO Article Content -->
            {{TOOL_ARTICLE}}
        </article>

        <div class="ad-slot">Google AdSense - Bottom</div>

        <footer style="text-align: center; margin-top: 60px; padding-bottom: 40px; color: var(--text-secondary);">
            <p>© 2026 WebUtils - 专业商业工具集合</p>
            <p><a href="https://github.com/chicogong/html-tools" style="color: var(--accent-cyan);">GitHub 源码</a></p>
        </footer>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
            localStorage.setItem('theme', current === 'light' ? 'dark' : 'light');
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        // Tool Logic Placeholders
        {{TOOL_JS_LOGIC}}
    </script>
</body>
</html>
