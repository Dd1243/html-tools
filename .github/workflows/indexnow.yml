name: IndexNow Submission

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Submit to IndexNow
        run: node scripts/indexnow.js https://essays4u.net/
