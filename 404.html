<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - 页面未找到 - WebUtils</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="抱歉，您访问的页面不存在。返回 WebUtils 首页，探索 1001+ 个实用工具。" />
    <meta name="robots" content="noindex, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="404 - 页面未找到 - WebUtils" />
    <meta property="og:description" content="抱歉，您访问的页面不存在。返回 WebUtils 首页，探索 1001+ 个实用工具。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://essays4u.net/404" />
    <meta property="og:site_name" content="WebUtils" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --font-sans: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: var(--text-primary);
      }

      .container {
        max-width: 600px;
        text-align: center;
        background: rgba(255, 255, 255, 0.95);
        padding: 60px 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .error-code {
        font-size: 120px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }

      h1 {
        font-size: 32px;
        color: #333;
        margin-bottom: 15px;
      }

      p {
        font-size: 18px;
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }

      .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .search-box {
        margin-bottom: 30px;
      }

      .search-input {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .search-input:focus {
        outline: none;
        border-color: #667eea;
      }

      .suggestions {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #e0e0e0;
      }

      .suggestions h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 15px;
      }

      .tool-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }

      .tool-link {
        padding: 12px;
        background: #f8f9fa;
        border-radius: 8px;
        text-decoration: none;
        color: #667eea;
        font-size: 14px;
        transition: all 0.3s;
      }

      .tool-link:hover {
        background: #667eea;
        color: white;
        transform: translateY(-2px);
      }

      @media (max-width: 600px) {
        .container {
          padding: 40px 20px;
        }

        .error-code {
          font-size: 80px;
        }

        h1 {
          font-size: 24px;
        }

        p {
          font-size: 16px;
        }

        .actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>页面未找到</h1>
      <p>抱歉，您访问的页面不存在或已被移动。<br>让我们帮您找到想要的内容。</p>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="搜索工具..."
          autofocus
        />
      </div>

      <div class="actions">
        <a href="/" class="btn btn-primary">
          🏠 返回首页
        </a>
        <button onclick="history.back()" class="btn btn-secondary">
          ← 返回上一页
        </button>
      </div>

      <div class="suggestions">
        <h2>热门工具推荐</h2>
        <div class="tool-links">
          <a href="/tools/dev/json-formatter" class="tool-link">JSON 格式化</a>
          <a href="/tools/time/timestamp" class="tool-link">时间戳转换</a>
          <a href="/tools/converter/base64" class="tool-link">Base64 编解码</a>
          <a href="/tools/generator/qrcode" class="tool-link">二维码生成</a>
          <a href="/tools/converter/color-converter" class="tool-link">颜色转换</a>
          <a href="/tools/dev/regex-tester" class="tool-link">正则测试</a>
        </div>
      </div>

      <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; font-size: 14px; color: #999;">
        <a href="/privacy-policy" style="color: #667eea; text-decoration: none; margin: 0 10px;">隐私政策</a>
        ·
        <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noopener" style="color: #667eea; text-decoration: none; margin: 0 10px;">GitHub</a>
      </div>
    </div>

    <script>
      // 搜索功能
      const searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const query = searchInput.value.trim();
          if (query) {
            window.location.href = `/?q=${encodeURIComponent(query)}`;
          }
        }
      });

      // 记录 404 错误（可选）
      if (window.location.pathname !== '/404') {
        console.log('404 Error:', window.location.pathname);
      }
    </script>
  </body>
</html>
