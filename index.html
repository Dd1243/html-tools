    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
        --transition: all 0.2s ease-in-out;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* Header */
      header {
        background-color: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
      }

      .logo {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: var(--text-primary);
      }

      .logo svg {
        width: 32px;
        height: 32px;
        margin-right: 12px;
      }

      .logo h1 {
        font-size: 20px;
        font-weight: 600;
      }

      .search-container {
        flex: 1;
        max-width: 600px;
        margin: 0 24px;
      }

      .search-input {
        width: 100%;
        background-color: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 10px 16px;
        color: var(--text-primary);
        font-size: 14px;
        transition: var(--transition);
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.1);
      }

      .search-input::placeholder {
        color: var(--text-muted);
      }

      .search-results-count {
        text-align: center;
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 16px;
        border-radius: var(--radius-md);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        transition: var(--transition);
        border: none;
        cursor: pointer;
      }

      .btn-primary {
        background-color: var(--accent-cyan);
        color: var(--bg-deep);
      }

      .btn-primary:hover {
        background-color: #00e0c2;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .btn-secondary {
        background-color: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border-subtle);
      }

      .btn-secondary:hover {
        background-color: #22222e;
        border-color: var(--border-strong);
      }

      /* Main Content */
      main {
        padding: 32px 0;
      }

      .hero {
        text-align: center;
        margin-bottom: 48px;
      }

      .hero h2 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 16px;
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero p {
        font-size: 16px;
        color: var(--text-secondary);
        max-width: 800px;
        margin: 0 auto;
      }

      /* Categories */
      .categories-section {
        margin-bottom: 32px;
      }

      .categories-wrapper {
        position: relative;
        overflow: hidden;
      }

      .categories-wrapper.expanded {
        max-height: none;
      }

      #categories {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .category-btn {
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 8px 16px;
        color: var(--text-primary);
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition);
      }

      .category-btn:hover {
        background-color: #22222e;
        border-color: var(--accent-cyan);
      }

      .category-btn.active {
        background-color: var(--accent-cyan);
        color: var(--bg-deep);
        border-color: var(--accent-cyan);
      }

      #categories-expand-btn,
      #categories-expand-btn-desktop {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background-color: transparent;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 8px 16px;
        color: var(--text-secondary);
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition);
        margin: 0 auto;
      }

      #categories-expand-btn:hover,
      #categories-expand-btn-desktop:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }

      /* Tools Grid */
      .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .tool-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: var(--transition);
        text-decoration: none;
        color: var(--text-primary);
        position: relative;
        overflow: hidden;
      }

      .tool-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--accent-cyan);
      }

      .tool-card h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .tool-card p {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      .tool-card .category-tag {
        display: inline-block;
        background-color: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 4px 8px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .tool-card .favorite-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        background-color: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        transition: var(--transition);
      }

      .tool-card .favorite-btn:hover {
        color: var(--accent-red);
      }

      .tool-card .favorite-btn.active {
        color: var(--accent-red);
      }

      /* No Results */
      .no-results {
        text-align: center;
        padding: 64px 20px;
        display: none;
      }

      .no-results.show {
        display: block;
      }

      .no-results-icon {
        font-size: 48px;
        margin-bottom: 16px;
        color: var(--text-muted);
      }

      .no-results p {
        font-size: 16px;
        color: var(--text-secondary);
      }

      /* Footer */
      footer {
        background-color: var(--bg-surface);
        border-top: 1px solid var(--border-subtle);
        padding: 32px 0;
        margin-top: 48px;
      }

      .footer-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 32px;
      }

      .footer-section h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
      }

      .footer-section ul {
        list-style: none;
      }

      .footer-section ul li {
        margin-bottom: 8px;
      }

      .footer-section ul li a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: var(--transition);
      }

      .footer-section ul li a:hover {
        color: var(--accent-cyan);
      }

      .footer-bottom {
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          gap: 12px;
          padding: 12px 0;
        }

        .search-container {
          margin: 0;
          width: 100%;
        }

        .hero h2 {
          font-size: 24px;
        }

        .tools-grid {
          grid-template-columns: 1fr;
        }

        .footer-content {
          grid-template-columns: 1fr;
          gap: 24px;
        }
      }

      /* Loading */
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 64px 20px;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid var(--border-subtle);
        border-top: 4px solid var(--accent-cyan);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>

      <div class="container">
        <section class="hero">
          <h2>1001+ 个纯前端实用工具</h2>
          <p>单文件架构，零构建，可离线使用。涵盖开发、文本、时间、生成器、隐私、媒体、安全、网络等多个类别。</p>
        </section>

        <section class="categories-section">
          <div id="categories-wrapper" class="categories-wrapper">
            <div id="categories"></div>
          </div>
          <button id="categories-expand-btn" class="btn btn-secondary">
            <span class="expand-text">更多分类</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="categories-expand-btn-desktop" class="btn btn-secondary">
            <span class="expand-text">更多分类</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </section>

        <div class="tools-grid" id="tools-grid"></div>

        <div class="no-results" id="no-results">
          <div class="no-results-icon">🔍</div>
          <p>没有找到匹配的工具</p>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="footer-content">
          <div class="footer-section">
            <h3>关于 WebUtils</h3>
            <ul>
              <li><a href="#">关于我们</a></li>
              <li><a href="#">使用条款</a></li>
              <li><a href="#">隐私政策</a></li>
              <li><a href="#">联系我们</a></li>
            </ul>
          </div>
          <div class="footer-section">
            <h3>热门工具</h3>
            <ul>
              <li><a href="/tools/dev/json-formatter.html">JSON 格式化</a></li>
              <li><a href="/tools/dev/base64.html">Base64 编解码</a></li>
              <li><a href="/tools/time/timestamp.html">时间戳转换</a></li>
              <li><a href="/tools/generator/qrcode-generator.html">二维码生成</a></li>
            </ul>

          <div class="footer-section">
            <h3>资源</h3>
            <ul>
              <li><a href="https://github.com/chicogong/html-tools">GitHub 仓库</a></li>

        <div class="footer-bottom">
          <p>&copy; 2026 WebUtils. 保留所有权利。</p>

      </div>

    <script>
      // 工具数据
      const tools = [
        {
          name: "JSON 格式化",
          description: "在线格式化和验证 JSON 数据",
          category: "开发工具",
          url: "/tools/dev/json-formatter.html"
        },
        {
          name: "Base64 编解码",
          description: "在线 Base64 编码和解码工具",
          category: "开发工具",
          url: "/tools/dev/base64.html"
        },
        {
          name: "时间戳转换",
          description: "Unix 时间戳与日期互转",
          category: "时间工具",
          url: "/tools/time/timestamp.html"
        },
        {
          name: "二维码生成",
          description: "在线生成二维码图片",
          category: "生成器",
          url: "/tools/generator/qrcode-generator.html"
        },
        {
          name: "图片压缩",
          description: "在线压缩图片大小",
          category: "媒体工具",
          url: "/tools/media/image-compressor.html"
        },
        {
          name: "正则表达式测试",
          description: "在线测试正则表达式",
          category: "开发工具",
          url: "/tools/dev/regex-tester.html"
        }
      ];

      // DOM 元素
      const searchInput = document.getElementById('search-input');
      const toolsGrid = document.getElementById('tools-grid');
      const noResults = document.getElementById('no-results');
      const searchResultsCount = document.getElementById('search-results-count');
      const categoriesContainer = document.getElementById('categories');

      // 提取所有分类
      const categories = [...new Set(tools.map(tool => tool.category))].sort();

      // 当前选中的分类
      let currentCategory = 'all';

      // 渲染分类
      function renderCategories() {
        // 添加"全部"分类
        const allCategoryBtn = document.createElement('button');
        allCategoryBtn.className = 'category-btn active';
        allCategoryBtn.textContent = '全部';
        allCategoryBtn.dataset.category = 'all';
        allCategoryBtn.addEventListener('click', () => {
          setActiveCategory('all');
        });
        categoriesContainer.appendChild(allCategoryBtn);

        // 添加其他分类
        categories.forEach(category => {
          const categoryBtn = document.createElement('button');
          categoryBtn.className = 'category-btn';
          categoryBtn.textContent = category;
          categoryBtn.dataset.category = category;
          categoryBtn.addEventListener('click', () => {
            setActiveCategory(category);
          });
          categoriesContainer.appendChild(categoryBtn);
        });
      }

      // 设置活跃分类
      function setActiveCategory(category) {
        currentCategory = category;
        
        // 更新按钮状态
        document.querySelectorAll('.category-btn').forEach(btn => {
          if (btn.dataset.category === category) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });

        // 重新渲染工具
        renderTools();
      }

      // 渲染工具
      function renderTools() {
        // 清空工具网格
        toolsGrid.innerHTML = '';

        // 过滤工具
        const filteredTools = tools.filter(tool => {
          const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
          const matchesSearch = !searchInput.value || 
            tool.name.toLowerCase().includes(searchInput.value.toLowerCase()) ||
            tool.description.toLowerCase().includes(searchInput.value.toLowerCase());
          return matchesCategory && matchesSearch;
        });

        // 计算可见工具数量
        const visibleCount = filteredTools.length;

        // 渲染工具卡片
        filteredTools.forEach(tool => {
          const card = document.createElement('a');
          card.className = 'tool-card';
          card.href = tool.url;
          
          card.innerHTML = `
            <button class="favorite-btn">⭐</button>
            <h3>${tool.name}</h3>
            <p>${tool.description}</p>
            <span class="category-tag">${tool.category}</span>
          `;

          toolsGrid.appendChild(card);
        });

        // 处理无结果情况
        const noResultsIcon = noResults.querySelector(".no-results-icon");
        const noResultsText = noResults.querySelector("p");

        if (visibleCount === 0) {
          if (currentCategory === "favorites" && !searchInput.value) {
            noResultsIcon.textContent = "⭐";
            noResultsText.textContent = "还没有收藏的工具";
          } else {
            noResultsIcon.textContent = "🔍";
            noResultsText.textContent = "没有找到匹配的工具";
          }
          noResults.classList.add("show");
        } else {
          noResults.classList.remove("show");
        }

        // 更新搜索结果计数
        if (searchInput.value || currentCategory !== "all") {
          searchResultsCount.textContent = visibleCount > 0 ? "找到 " + visibleCount + " 个工具" : "";
        } else {
          searchResultsCount.textContent = "";
        }
      }

      // 过滤工具
      function filterTools() {
        renderTools();
      }

      // 分类展开/收起
      function setupCategoriesExpand() {
        const wrapper = document.getElementById("categories-wrapper");
        const categories = document.getElementById("categories");
        const expandBtn = document.getElementById("categories-expand-btn");
        const expandBtnDesktop = document.getElementById("categories-expand-btn-desktop");
        if (!wrapper || !categories) return;

        // 桌面端展开按钮
        if (expandBtnDesktop) {
          expandBtnDesktop.addEventListener("click", () => {
            const isExpanded = wrapper.classList.toggle("expanded");
            expandBtnDesktop.querySelector(".expand-text").textContent = isExpanded
              ? "收起分类"
              : "更多分类";
          });
        }

        // 移动端展开按钮
        if (expandBtn) {
          const checkOverflow = () => {
            // 只在移动端检查
            if (window.innerWidth > 640) {
              expandBtn.style.display = "none";
              // 移动端收起时不影响桌面端状态
              return;
            }

            // 如果已展开，保持按钮显示
            const isExpanded = wrapper.classList.contains("expanded");
            if (isExpanded) {
              expandBtn.style.display = "flex";
              return;
            }

            // 检查是否溢出
            const isOverflowing = categories.scrollHeight > categories.clientHeight + 5;
            expandBtn.style.display = isOverflowing ? "flex" : "none";
          };

          expandBtn.addEventListener("click", () => {
            const isExpanded = wrapper.classList.toggle("expanded");
            expandBtn.querySelector(".expand-text").textContent = isExpanded ? "收起" : "更多分类";
            if (expandBtnDesktop) {
              expandBtnDesktop.querySelector(".expand-text").textContent = isExpanded
                ? "收起分类"
                : "更多分类";
            }
          });

          // 初始检查 + resize 监听
          setTimeout(checkOverflow, 100);
          window.addEventListener("resize", checkOverflow);
        }
      }

      // 初始化
      function init() {
        renderCategories();
        renderTools();
        setupCategoriesExpand();

        // 绑定搜索事件
        searchInput.addEventListener("input", filterTools);

        // 键盘快捷键
        document.addEventListener("keydown", (e) => {
          if (e.key === "/" && document.activeElement !== searchInput) {
            e.preventDefault();
            searchInput.focus();
          }
          if (e.key === "Escape" && document.activeElement === searchInput) {
            searchInput.blur();
          }
        });
      }

      // 页面加载完成后初始化
      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
